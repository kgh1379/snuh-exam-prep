 "6_11", "s": 6, "q": 11, "text": "다음 중 성희롱‧성폭력예방지침에 대하여 잘못된 내용은?", "opts": ["양성평등기본법 제31조 및 성폭력방지 및 피해자 보호 등에 관한 법률 제5조를 근거로 한다.", "이 지침의 피해자 보호는 피해자 본인에게만 적용된다.", "성희롱‧성폭력예방교육은 매년 각 1시간 이상 최소 1회 실시한다.", "성희롱‧성폭력 사건 발생 시 기관장은 재발방지를 위하여 재발방지대책을 수립하 여야 한다."], "ans": 2}, {"id": "6_12", "s": 6, "q": 12, "text": "다음 중 폭력예방교육 운영에 대한 사항으로 틀린 것은?", "opts": ["폭력예방교육에는 성희롱예방교육, 성매매예방교육, 성폭력예방교육, 가정폭력예 방교육이 포함된다.", "영업 등과 연계한 무료교육 실시기관을 통해 시행한 교육은 인정되지 아니한다.", "기관장이 교육에 불참한 경우에는 부진기관으로 분류하여 부진기관 관리자 특별 교육, 언론공표 등의 조치를 한다.", "교육대상 인원은 연말을 기준으로 기관에 재직중인 정규직의 총 수로 계산한다."], "ans": 4}, {"id": "6_13", "s": 6, "q": 13, "text": "성희롱예방교육의 내용으로 맞지 않는 것은?", "opts": ["성희롱 예방에 관한 법령", "성희롱 발생 시 처리절차 및 조치기준", "성희롱 피해를 피할 수 있는 방법", "성희롱을 한 자에 대한 징계 등 제재조치 양성평등기본법 시행령 제19조제1항에 의거, 성희롱 예방에 관한 법령, 성희롱 발생 시 처리"], "ans": 3}, {"id": "6_14", "s": 6, "q": 14, "text": "성매매예방교육 내용으로 맞지 않는 것은?", "opts": ["건전한 성매매에 대한 가이드라인 제시", "성매매 방지 및 처벌에 관한 법령의 내용", "성매매방지법 시행령 제2조제3항에 의거함", "성매매 목적의 인신매매 예방에 관한 사항 성매매방지법 시행령 제2조제3항에 의거, 성평등 관점에 따른 건전한 성의식 및 성문화에 관"], "ans": 1}, {"id": "6_15", "s": 6, "q": 15, "text": "성폭력예방교육 내용으로 맞지 않는 것은?", "opts": ["건전한 성의식 및 성문화의 창달에 관한 사항", "성인지 관점에서의 성폭력 예방에 관한 사항", "성폭력 피해를 입지 않는 방법에 관한 사항", "그 밖에 성에 대한 건전한 가치관 함양과 성폭력 예방에 필요한 사항 성폭력방지법 시행령 제2조제3항에 의거, 건전한 성의식 및 성문화의 창달에 관한 사항, 성인"], "ans": 3}, {"id": "6_16", "s": 6, "q": 16, "text": "가정폭력예방교육 내용으로 맞지 않는 것은?", "opts": ["정상적인 가정생활의 영위와 가족구성원 관계의 유지 및 발전에 관한 사항", "성인지 관점과 무관한 가정폭력 예방에 관한 사항", "가정폭력 방지를 위한 관련 법령의 소개 및 홍보에 관한 사항", "그 밖에 정상적인 가정생활을 위한 건전한 가치관 함양과 가정폭력 예방에 필요 한 사항 가정폭력방지법 시행령 제1조의2제3항에 의거, 정상적인 가정생활의 영위와 가족구성원 관계"], "ans": 2}, {"id": "6_17", "s": 6, "q": 17, "text": "다음 중 폭력예방교육 평가 가점에 해당하는 사항으로 짝지어진 것은? ㉠ 기관 내 사례 토론, 세미나 등 교육 실시 ㉡ 추천 교육 콘텐츠 사용 또는 자체 교육자료 제작 ㉢ 기관 내 폭력예방교육 이수 의무화 제도 마련 ㉣ 신종 범죄 등 폭력예방교육 추가 실시 ㉤ 각 교육 반기별 1회 이상 교육 실시", "opts": ["㉠, ㉡, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣", "㉠, ㉢, ㉤", "㉣, ㉤ 우리병원에서는 여성가족부에서 추천하는 교육콘텐츠를 활용하여 SNUH eLearning을 통한 온"], "ans": 2}, {"id": "6_18", "s": 6, "q": 18, "text": "폭력예방교육으로 인정되는 경우는?", "opts": ["회의 시 훈시 등 단순고지", "기관 내부 게시판에 단순 게재 또는 유인물 배포", "PPT, 동영상등을 활용한 병원 내부직원의 강의", "개인 이메일로 송부하는 경우 - 교육 인정사항 : 전문강사에 의한 교육(20점), 일반강사(전문강사로 인정되지 않는 외부 초 청 강사)에 의한 교육(15점), 내부직원에 의한 교육(10점), 사이버 교육(8점), 시청각 교육 등"], "ans": 3}, {"id": "6_19", "s": 6, "q": 19, "text": "성희롱 고충상담 관련 틀린 것은?", "opts": ["우리병원 성희롱 고충 상담 창구는 인권센터 내에 있다.", "우리병원 성희롱 사건 발생 시 사건 접수 번호는 원내 7647번이다.", "원내 성희롱 사건 발생 시 외부기관에서 상담은 불가하다.", "고충상담원은 3년 이내 고충상담원 교육을 이수한 자를 1명 이상 포함하여 지정"], "ans": 3}, {"id": "6_20", "s": 6, "q": 20, "text": "다음 폭력예방교육 세부 이행사항 중 맞지 않는 것은?", "opts": ["폭력예방교육 연간 기본계획에는 예방교육의 실시 시기, 내용, 방법, 성희롱 방지 조치 항목 등이 포함된다.", "폭력예방교육은 각 개별법에서 정한 교육 내용에 한하여만 교육으로 인정된다.", "2025년 기준, 직원의 교육 이수율이 80% 미만일 경우 부진기관으로 분류된다.", "실적 제출 시, 교육 시행 여부를 알 수 있는 결과보고서를 증빙으로 제출해야 한 다."], "ans": 2}, {"id": "6_21", "s": 6, "q": 21, "text": "인권침해를 당했을 때 인권센터에 신고하는 방법에 대한 것으로 틀린 것은?", "opts": ["인권침해를 신고하려는 자는 신고서를 이메일, 팩스 혹은 직접 방문을 통해 인권 센터에 제출하여야 한다.", "신고인이 자신의 성명 등을 기재하기를 원하지 않더라도 익명으로 신고를 할 수 는 없다.", "“인권침해등 행위 신고서”에 들어가야 하는 내용으로는 신고 취지 및 이유, 행위 내용, 증거 목록 등이 있다.", "인권센터에 신고 후 신고인이 필요한 경우 정신건강상담을 받을 수 있다."], "ans": 2}, {"id": "6_22", "s": 6, "q": 22, "text": "다음 중 인권침해 사건에 대하여 인권심위위원회에서 의결할 수 있는 구제조치가 아닌 것은?", "opts": ["피해자와 가해자의 분리조치와 가해자에 대한 접근금지, 연락금지 명령", "사과문 또는 재발방지서약서 작성명령", "피해자에 대한 벌금이나 합의금 지불 명령", "교육 프로그램 이수 명령"], "ans": 3}, {"id": "6_23", "s": 6, "q": 23, "text": "인권침해 신고 사항에 대한 인권센터의 조사 진행 절차로 틀린 것은?", "opts": ["초기상담 진행 : 그룹웨어 접수, 이메일, 전화를 통해 문제 해결의 방법과 절차에 관한 정보를 제공받을 수 있다. 내담자는 상담을 통해 상담으로 문제를 해결할 것인지 아니면 공식적인 신고절차를 밟을 것인지 결정할 수 있다.", "신고 : 내담자가 신고절차를 밟아 신고를 원한다면 직원상담실에 있는 신고서와 진술서 양식을 작성하여 반드시 직접 방문하여 제출해야 한다.", "조사 : 신고가 접수되면 인권센터에서는 공정한 사건 처리를 위해 신고인, 피신고 인의 진술, 관련자료와 증거를 수집하고 이에 기반하여 사실 관계를 조사한다.", "인권위원회 심의 : 위 과정을 거쳐 조사가 완료되면 인권센터는 사건의 최종적인 심의와 해결을 위해 필요시 인권위원회에 사안을 회부하여 심의한다."], "ans": 2}, {"id": "6_24", "s": 6, "q": 24, "text": "다음 중 인권침해 사례에 해당되지 않는 것은?", "opts": ["A교수는 환자에 대한 수술을 하던 중 보조를 하던 전공의 B가 집중을 하지 못하 고 지속적으로 실수를 하자 정신을 차리라며 뒤통수를 때렸다.", "C간호사는 평소 사이가 좋지 않던 D간호사가 환자를 간호하는 과정에서 실수를 하자 수간호사 및 타 간호사들에게 이에 대한 소문을 퍼트렸다.", "E수간호사는 F간호사가 환자를 돌보는 과정에서 실수를 저지르자 근무가 끝난 후 에 F간호사와 따로 만나 면담을 하여 이에 대하여 훈계하였다.", "전공의 G는 간호사 H가 환자 오더를 지속적으로 요구를 하자 짜증을 내며 H간호 사에게 갑자기 큰 소리를 질렀다."], "ans": 3}, {"id": "6_25", "s": 6, "q": 25, "text": "다음 중 틀린 것은?", "opts": ["“인권”이란 대한민국헌법 및 법률에서 보장하거나 대한민국이 가입, 비준한 국제 인권조약 및 국제관습법에서 인정하는 인간으로서의 존엄과 가치 및 자유와 권리 를 말한다.", "“차별행위”란 합리적인 이유 없이 성별, 종교, 나이, 사회적 신분, 출신지역, 출신 국가, 출신 민족, 신체 조건, 혼인 여부, 임신 또는 출산 여부 등에 따라 특정한 사람을 우대하거나 배제하는 행위를 말한다.", "국가인권위원회법은 모든 개인이 가지는 불가침의 기본적 인권을 보호하고 그 수 준을 향상시킴으로써 인간으로서의 존엄과 가치를 실현하고 민주적 기본질서의 확립에 이바지함을 목적으로 한다.", "국가인권위원회법은 대한민국 국민에 대해서만 적용한다."], "ans": 4}, {"id": "6_26", "s": 6, "q": 26, "text": "용어의 뜻이 틀린 것은?", "opts": ["“폭언”이란 상대방에게 인격적 모욕감 또는 수치심을 일으키는 표현이나 욕설 등 「대한민국 헌법」 제10조에서 보장하는 인격권을 침해하는 언행을 말한다.", "“성폭력”이란 「성폭력방지 및 피해자보호 등에 관한 법률」에 따른 성폭력에 해당 하는 행위를 말한다.", "인권 침해를 당한 사람만이 “신고인”이 될 수 있다.", "“당사자”란 피해자, 가해자, 신고인과 피신고인 모두를 뜻한다."], "ans": 3}, {"id": "6_27", "s": 6, "q": 27, "text": "인권센터의 사건조사 결과 신고를 기각할 수 있는 사유에 해당하지 않는 것은?", "opts": ["신고의 내용이 사실이 아니라고 판단되는 경우", "피해자가 가해자의 협박이나 보복을 두려워하여 조사를 망설일 경우", "조사 결과 인권침해 등에 해당하지 않는 경우", "이미 피해 회복이 이루어지고 있는 경우 등 별도의 구제 조치가 필요하지 아니하 다고 인정되는 경우 인권센터 운영규정 제19조(신고의 기각) ① 인권센터장은 사건 조사 결과 다음 각 호의 어느 하나에 해당하는 경우에는 그 신고를 기각한다."], "ans": 2}, {"id": "6_28", "s": 6, "q": 28, "text": "인권센터장이 인사위원회에 징계요청을 할 수 있는 경우가 아닌 것은?", "opts": ["누구라도 인권센터의 조사와 구제를 방해하는 경우", "당사자가 부당하게 상대방의 신원을 노출하거나 상대방의 명예를 훼손한 경우", "당사자가 사건과 관련하여 상대방에게 보복을 가하거나 부당하게 불이익을 끼친 경우", "당사자가 피해자 보호를 위한 조치를 따른 경우 인권센터 운영규정 제21조(징계의 요청 등) ① 인권센터장은 다음 각 호 어느 하나의 사유에 해당하는 경우 인사위원회에 해당 사안을 회부할 수 있다. 단, 제1호의 경우에는 징계 사유와 징계의 정도에 관한 의견을 첨부하여 인사위원회에 사안을 회부하여야 한다."], "ans": 4}, {"id": "6_29", "s": 6, "q": 29, "text": "다음 중 인권침해에 해당하지 않는 것은?", "opts": ["A관리자는 육아휴직 후 복직한 B직원에게 전에 담당하던 업무가 아닌 보조업무를 주고 다른 직원들에게 B직원을 따돌릴 것을 지시했다.", "C직원은 신규 D직원의 질문에 “넌 학교에서 뭘 배운거야? 적성에 안 맞으면 그 만 둬.”라고 큰 소리를 쳤다.", "E관리자는 새로운 사업을 진행하며 F직원이 작성한 보고서에 대해 수차례 보완을 지시했다.", "G과장은 여자인 H직원의 옷차림을 훑으며 “오늘 밤에 남자친구 만나러 가나 봐? 내일 이 옷차림 그대로 출근하는건가?”라고 말했다."], "ans": 3}, {"id": "6_30", "s": 6, "q": 30, "text": "인권침해 방지를 위하여 할 수 있는 내용으로 적절하지 않은 것은?", "opts": ["서로의 존중을 위하여 모든 부서원 간에 서로 존댓말을 사용한다.", "친근한 사이라도 과도한 신체접촉을 하여 상대방을 불쾌하게 만들지 않는다.", "부서의 단합을 위하여 근무 중인 직원이라도 모든 부서원이 회식에 참석해야 한 다.", "부서원이 실수를 하더라도 욕설, 폭행은 하지 않도록 한다."], "ans": 3}, {"id": "6_31", "s": 6, "q": 31, "text": "병원 내 긴급 대응팀(SAVER team)이나 RRT(rapid response team)은 병원 내 생존 사슬의 고리 중 무엇과 가장 관계 있는가?", "opts": ["조기인지 · 소생팀호출", "고품질 심폐소생술", "제세동", "전문소생술"], "ans": 1}, {"id": "6_32", "s": 6, "q": 32, "text": "다음 중 심폐소생술이 필요한 경우는?", "opts": ["의식이 있고 맥박도 있으나 호흡곤란이 있는 환자", "의식이 없고 호흡과 맥박이 비정상인 환자", "의식이 없으나 맥박과 호흡이 있는 환자", "의식은 있으나 호흡곤란과 어지럼증을 호소하는 환자"], "ans": 2}, {"id": "6_33", "s": 6, "q": 33, "text": "병원 복도에 쓰러져있는 성인을 발견하였을 때, 가장 먼저 해야 할 일은?", "opts": ["일단 환자를 응급실로 옮긴다.", "어깨를 두드리며 큰소리로 환자를 깨워 반응을 확인하고, 반응이 없다면 CPR팀 (원내3000번)을 호출한다.", "도와줄 누군가가 올 때까지 기다린다.", "환자의 혀와 턱을 들어 기도를 열고, 음식물이 기도를 막고 있으면 두 손가락으 로 훑어낸다."], "ans": 2}, {"id": "6_34", "s": 6, "q": 34, "text": "심정지 상황을 인지할 수 있는 가장 중요한 두 가지는 무엇인가?", "opts": ["심장리듬 모니터, 무반응", "얼굴색, 입술색", "무반응, 무호흡", "무반응, 얼굴색"], "ans": 3}, {"id": "6_35", "s": 6, "q": 35, "text": "흉부압박은 심장, 뇌, 기타 필수 장기로 혈액을 공급하며, 심폐소생술의 여러 단계 중 가장 강조되고 있는 부분이다. 성인 환자 흉부압박 시 환자의 어느 부위에 손꿈 치를 놓고 압박을 시행해야 하는가?", "opts": ["명치 부위", "유두연결선 바로 위", "가슴의 왼쪽 심장 위", "가슴뼈 아래쪽 1/2 지점"], "ans": 4}, {"id": "6_36", "s": 6, "q": 36, "text": "성인 환자에 대한 심폐소생술 시행 시 흉부압박의 깊이와 속도가 올바르게 짝지어 진 것은?", "opts": ["4-5cm 깊이, 분당 80회 속도", "5-6cm 깊이, 분당 80-100회 속도", "5-6cm 깊이, 분당 100-120회 속도", "4-5cm 깊이, 분당 80-100회 속도"], "ans": 3}, {"id": "6_37", "s": 6, "q": 37, "text": "심폐소생술을 시행할 때 완전한 가슴이완이 필요한 이유는 무엇인가?", "opts": ["갈비뼈 골절 위험을 낮춘다.", "구조자의 피로도가 줄어든다.", "가슴압박 속도를 정확하게 맞출 수 있다.", "매 압박 시 심장으로 혈액을 적절하게 재공급할 수 있다."], "ans": 4}, {"id": "6_38", "s": 6, "q": 38, "text": "자동제세동기(자동심장충격기)를 사용 시, 가장 첫 번째 단계는 무엇인가?", "opts": ["환자의 가슴에 패드를 부착한다.", "제세동기의 전원을 켠다.", "가슴압박을 중단하도록 한다.", "자동제세동기를 충전하고 제세동 버튼을 누른다."], "ans": 2}, {"id": "6_39", "s": 6, "q": 39, "text": "자동제세동기(자동심장충격기)의 지시에 따라 제세동을 시행하였다. 제세동 직후 시 행해야하는 것은 무엇인가?", "opts": ["가슴압박", "인공호흡", "의료진의 도착", "패드의 재 부착"], "ans": 1}, {"id": "6_40", "s": 6, "q": 40, "text": "심폐소생술에서 제세동을 하는 중요한 이유는 무엇인가?", "opts": ["심정지 재발을 예방한다.", "규칙적인 심장리듬을 복원한다.", "전기 충격으로 환자를 깨어나게 한다.", "정상 심장리듬으로 100% 되돌릴 수 있다."], "ans": 2}, {"id": "6_41", "s": 6, "q": 41, "text": "사무실 천장 등에 설치되어 화재가 발생하였을 때 자동으로 물을 분사하여 화재를 진압하는 소방설비의 이름은? ②\n① 옥내소화전설비 ② 스프링클러설비 ③ 연결살수설비 ④ 이산화탄소소화설비", "opts": ["옥내소화전설비 : 화재 발생 시 건물관계자가 이를 사용하여 발화초기에 신속하게 진화할 수 있도록 건물내에 설치하는 소화설비로, 개폐밸브, 호스, 관창 등이 내장되어 있다.", "스프링클러설비 : 건물의 천장에 설치하여 화재로 인해 일정 온도에 도달하게 되면 자동", "연결살수설비 : 지하층에서 화재 발생 시 소방차로부터 송수구를 통해 압력수를 보내고 살수 헤드로 소화하는 설비", "이산화탄소소화설비 : 이산화탄소를 분사 헤드에서 방사하여 연소물이 있는 실내의 산소 농도를 낮추어 연소공기 공급을 차단하는 등 질식작용에 의해 소화하는 설비"], "ans": 2}, {"id": "6_42", "s": 6, "q": 42, "text": "자동화재탐지설비 구성품 중 천장에 설치되어 화재 발생을 인식하는 소방기구의 명칭은? ④\n① 발신기 ② 수신기 ③ 사이렌 ④ 감지기", "opts": ["발신기 : 화재발생 신호를 수신기에 수동으로 발신하는 장치", "수신기 : 감지기나 발신기에서 발하는 화재신호를 직접 수신하거나 중계기를 통하여 수신 하여 화재의 발생을 표시 및 경보하여 주는 장치", "사이렌 : 화재발생 상황을 사이렌으로 경보하는 설비", "감지기 : 화재시 발생하는 열, 연기, 불꽃 또는 연소생성물을 자동적으로 감지하여 수신기 에 발신하는 장치 근거 : 자동화재탐지설비 및 시각경보장치의 화재안전기준(NFSC203)"], "ans": 4}, {"id": "6_43", "s": 6, "q": 43, "text": "화재발생시 행동요령으로 가장 바람직하지 못한 것은?", "opts": ["초기소화를 위해 소화기 등을 사용한다.", "화재발견자는 신속히 소방서에 신고한다.", "초기소화 실패 시 신속하게 대피한다.", "방송 안내 또는 피난유도자의 지시에 따라 침착하게 대피한다."], "ans": 4}, {"id": "6_44", "s": 6, "q": 44, "text": "소화기 사용요령의 순서가 맞는 것은? 가. 소화기를 불이 난 곳으로 옮긴다. 나. 안전핀을 뽑는다. 다. 탈출구를 확보하고, 바람을 등지고 호스를 불쪽으로 향한다. 라. 손잡이를 힘껏 쥐고, 불을 향해 빗자루로 쓸 듯이 골고루 뿌린다.", "opts": ["가-다-나-라", "나-가-다-라", "다-가-나-라", "가-나-다-라"], "ans": 4}, {"id": "6_45", "s": 6, "q": 45, "text": "화재 시 올바른 피난방법으로 틀린 것은?", "opts": ["젖은 수건으로 코, 입을 가리고 낮은 자세로 이동한다.", "인근의 엘리베이터, 에스컬레이터를 이용하여 신속하게 대피한다.", "계단을 이용하여 대피한다.", "건물 곳곳에 설치된 유도등을 따라 대피한다."], "ans": 2}, {"id": "6_46", "s": 6, "q": 46, "text": "평상시 피난구역 관리로 옳은 것 두 가지는? ③,", "opts": ["방화문은 항시 열어두어 화재 시 신속하게 피난할 수 있도록 한다.", "계단실에 적치된 물건은 화재 경보 시 신속하게 정리하여 재실자들의 피난을 돕 는다.", "방화셔터가 내려오는 주변에는 물건을 적재하지 않는다.", "방화문에 말발굽을 설치하면 안 된다."], "ans": 3}, {"id": "6_47", "s": 6, "q": 47, "text": "올바른 소화기 사용법이 아닌 것은?", "opts": ["사용 전에 흔들어 사용한다.", "바람을 등지고 서서 호스가 불을 향하게 사용한다.", "손잡이를 힘껏 움켜쥐고 빗자루로 쓸 듯이 뿌린다.", "너무 가까이 접근하여 화상을 입지 않도록 주의한다."], "ans": 1}, {"id": "6_48", "s": 6, "q": 48, "text": "올바른 소화전 사용법이 아닌 것은?", "opts": ["2인 1조로 소화전을 사용하는 것이 좋다.", "한사람은 소화전 호스를 가지고 불이 난 곳으로 가고, 나머지 사람은 밸브를 개 방한다.", "소화전 개폐밸브 개방 시 개폐 밸브를 오른쪽방향(시계방향)으로 돌려 개방한다.", "물을 분사할 때는 소방호스를 겨드랑이에 끼고, 무릎을 약간 굽혀 낮은 자세로 방사한다."], "ans": 3}, {"id": "6_49", "s": 6, "q": 49, "text": "화재 시 행동요령으로 옳지 않은 것은?", "opts": ["가스화재는 폭발성이 있으므로 갑자기 문을 열거나 전기스위치 등을 조작하면 안 된다.", "기름 종류의 화재에는 물을 사용하면 안된다.", "전기 기기에 화재가 났을 때 물을 사용하여 화재를 진압한다.", "전기 기기에 화재가 났을 경우 전기스위치를 내려 화재확산을 방지한다."], "ans": 3}, {"id": "6_50", "s": 6, "q": 50, "text": "다음 보기의 소방시설의 이름을 정확하게 순서대로 나열한 것은?", "opts": ["피난구 유도등 - 통로유도등 - 스프링클러 - 화재감지기", "통로유도등 - 피난구유도등 - 스프링클러 - 시각경보기", "통로유도등 - 피난구유도등 - 스프링클러 - 화재발신기", "피난구 유도등 - 통로유도등 - 스프링클러 - 화재수신기"], "ans": 1}, {"id": "7_1", "s": 7, "q": 1, "text": "우리나라 최초 서양식 국립병원은?", "opts": ["광제원", "제중원", "혜민서", "대한의원"], "ans": 2}, {"id": "7_2", "s": 7, "q": 2, "text": "제중원은 조선 정부의 어느 부처에 소속된 병원이었는가?", "opts": ["육영공원", "군국기무처", "통리기무아문", "통리교섭통상사무아문 통리교섭통상사무아문(약칭 외아문)은 오늘날의 외교부에 해당한다. 당시에는 보건복지부가"], "ans": 4}, {"id": "7_3", "s": 7, "q": 3, "text": "다음 사료는 제중원 개원을 알리는 방문(榜文)이다. ( ) 안에 들어갈 인물은? ② 본 아문(외아문)에서 시의원(施醫院) 한 곳을 설치하고 미국 의사 ( )을 초빙했으 며, 학도(學徒)와 의약(醫藥) 및 도구들을 갖추었다. 오늘부터 매일 미시(未時)부터 신 시(申時)까지 문을 열고 약을 제공할 것이다. 무릇 질병이 있는 자는 와서 치료를 받 아라. 약값은 나라에서 지급할 것이다.", "opts": ["헤론", "알렌", "에비슨", "스크랜턴 알렌, 스크랜턴, 헤론, 에비슨 등은 모두 제중원 의사로 일했다. 그중에서 최초 의사는 미국북 장로회 소속 의료선교사인 알렌이었다."], "ans": 2}, {"id": "7_4", "s": 7, "q": 4, "text": "제중원에 대해 잘못 설명한 문항은?", "opts": ["조선 정부는 당초 명칭인 광혜원을 법적 절차에 따라 취소하고 제중원이라 명명 했다.", "제중원은 홍영식의 집이었다가 갑신정변 후 나라에 귀속된 곳에서 개원했다.", "제중원 개원 당시 한국인 의사가 없어서 한의사들이 환자를 진료했다.", "제중원은 갑신정변 발발 후 4개월 만에 개원했는데, 이 사실을 통해 고종과 조선 정부의 서양식 국립병원 설립 의지가 강했음을 알 수 있다."], "ans": 3}, {"id": "7_5", "s": 7, "q": 5, "text": "1885년 4월 서울의 재동에서 개원한 제중원은 1886년 10~11월 좀 더 넓은 곳으로 이전했다. 그곳은 어디인가?", "opts": ["구리개", "진고개", "동대문 밖", "남대문 밖"], "ans": 1}, {"id": "7_6", "s": 7, "q": 6, "text": "제중원에 대해 잘못 설명한 문항은?", "opts": ["통리교섭통상사무아문의 독판(장관)이나 협판(차관)이 제중원 운영을 감독했다.", "정부에서 파견한 주사들이 운영을 맡았다.", "운영비는 알렌 등 의료선교사들이 미국 선교본부에서 조달했다.", "피부병, 소화불량, 말라리아 환자들이 많았다."], "ans": 3}, {"id": "7_7", "s": 7, "q": 7, "text": "제중원에 대해 잘못 설명한 문항은?", "opts": ["개원 당시의 제중원은 지금의 서울시청 자리에 있었다.", "외래진료실, 수술실, 병동들을 갖춘 소규모 종합병원이었다.", "빈민구호사업과 전염병 퇴치에 힘쓰는 등 공공의료 활동을 벌였다.", "개원 후 만 1년 동안 1만여 명의 환자를 진료했다."], "ans": 1}, {"id": "7_8", "s": 7, "q": 8, "text": "제중원의 설립 배경과 거리가 먼 문항은?", "opts": ["19세기 조선에서는 콜레라, 두창, 말라리아 등 전염병 피해가 극심했다.", "문호개방 이후 고종과 조선 정부는 근대화를 추진하며 서양 문물을 도입했다.", "갑신정변 당시 알렌이 서양 의술로 민영익을 치료했다.", "만민공동회에서 서양식 국립병원의 설립 필요성을 제기했다."], "ans": 4}, {"id": "7_9", "s": 7, "q": 9, "text": "제중원의학당의 실패 원인으로 가장 거리가 먼 것은?", "opts": ["알렌, 헤론 등 교사들(의료선교사들)의 이탈", "학생들의 기독교에 대한 반감", "조선 정부의 의학 경시(輕視)", "조선 정부의 재정난 교사인 알렌은 외교관이 되었고, 헤론은 개인진료소의 운영에 치중했다. 학생들 가운데 기독"], "ans": 3}, {"id": "7_10", "s": 7, "q": 10, "text": "1894년 9월 고종과 조선 정부는 국가의 총체적 위기를 맞아 고육지책으로 제중원 의 운영을 미국북장로회에 위탁했다. 그 계기가 된 사건이 아닌 것은?", "opts": ["아관파천", "청일전쟁", "동학농민운동", "일본군의 경복궁 점령 사건"], "ans": 1}, {"id": "7_11", "s": 7, "q": 11, "text": "‘의학교(醫學校)’에 대한 설명으로 잘못된 것은?", "opts": ["1899년 대한제국 정부가 설립한 의학 교육기관이었다.", "국내 최초로 종두법을 보급한 지석영이 교장을 역임했다.", "1902년에 국내 두 번째로 의사를 배출했다.", "졸업생들은 장병 진료와 서양의학 보급에 공헌했다."], "ans": 3}, {"id": "7_12", "s": 7, "q": 12, "text": "다음 내용과 모두 관계있는 인물은? 가. 종두법 보급 나. 의학교 교장 다. 한글 연구", "opts": ["백인제", "지석영", "김익남", "김윤식"], "ans": 2}, {"id": "7_13", "s": 7, "q": 13, "text": "다음 사진은 어느 병원의 모습인가?", "opts": ["광제원", "제중원", "대한의원", "의학교부속병원 사진 속 건물은 1908년 준공된 대한의원 본관이다. 지금도 서울대학교병원 관내에 남아 있으 며, 사적 제248호로 지정되어 있다."], "ans": 3}, {"id": "7_14", "s": 7, "q": 14, "text": "다음 중 대한의원과 관계가 없는 것은?", "opts": ["의학교", "광제원", "한성병원", "대한국적십자병원 의학교와 그 부속의원, 광제원, 대한국적십자병원은 1907년에 하나로 통합되어 대한의원이 되 었다. 한성병원은 일본인들이 설립하고 운영한 병원이다."], "ans": 3}, {"id": "7_15", "s": 7, "q": 15, "text": "대한의원에 대한 설명으로 잘못된 것은?", "opts": ["대한제국의 전염병 환자 전문 국립병원이었다.", "부지는 ‘함춘원(含春苑)’이었다.", "환자 진료는 물론 위생행정까지 담당했다.", "의학교육을 위해 차례로 ‘교육부’, ‘의육부(醫育部)’, ‘부속 의학교’를 두었다."], "ans": 1}, {"id": "7_16", "s": 7, "q": 16, "text": "3.1운동 초기에 서울에서 만세 시위에 참여했다가 체포되어 재판을 받은 학생들을 소속 학교별로 분류했을 때 가장 많았던 학교는?", "opts": ["경성의학전문학교", "경성법학전문학교", "경성고등공업학교", "경성고등상업학교"], "ans": 1}, {"id": "7_17", "s": 7, "q": 17, "text": "경성의학전문학교에 대한 설명으로 잘못된 것은?", "opts": ["1916년에 개교한 국내 최고 의학 교육기관이었다.", "서울대학교 의과대학의 전신이다.", "1928년 서울시 종로구 소격동에 부속의원을 설립했다.", "조선인과 일본인 공학이었으며, 민족차별은 없었다."], "ans": 4}, {"id": "7_18", "s": 7, "q": 18, "text": "민족차별의 장벽을 극복하고 경성의학전문학교 외과의 주임교수가 되었으며, 일제 강점기 최고 실력의 외과 의사로 활약한 인물은?", "opts": ["지석영", "장기려", "유일준", "백인제"], "ans": 4}, {"id": "7_19", "s": 7, "q": 19, "text": "경성제국대학 의학부와 그 부속의원에 대한 설명으로 잘못된 것은?", "opts": ["일제의 민족융화조치로 인해 한국인 교수들이 적지 않았다.", "축구부는 한국인 학생회 역할을 했다.", "한국인 졸업생들은 해방 후 한국 의학계를 주도했다.", "시료(施療)외래진료소는 한국인 서민 환자들이 많이 이용했다."], "ans": 1}, {"id": "7_20", "s": 7, "q": 20, "text": "해방 후 1946년에 통합하여 서울대학교 의과대학이 된 두 학교는?", "opts": ["경성의학전문학교, 경성여자의학전문학교", "경성의학전문학교, 경성(제국)대학 의학부", "경성여자의학전문학교, 경성(제국)대학 의학부", "경성의학전문학교, 경성치과의학전문학교"], "ans": 2}, {"id": "7_21", "s": 7, "q": 21, "text": "다음에서 설명하는 것은 무엇인가? 가. 미국 정부는 1954년부터 1961년까지 서울대학교에 교육 원조를 시행했다. 나. 교수진과 조교들이 미국에서 연수 또는 유학하는 교환교수 프로그램이 있었다.", "opts": ["‘뉴욕 프로젝트’", "‘시카고 프로젝트’", "‘미네소타 프로젝트’", "‘샌프란시스코 프로젝트’ ‘미네소타 플랜’(또는 ‘미네소타 프로젝트’)은 1954년 9월부터 1961년까지 미국 정부가 서울대"], "ans": 3}, {"id": "7_22", "s": 7, "q": 22, "text": "‘미네소타 프로젝트’에 대한 설명 중 잘못된 것은?", "opts": ["교수진은 물론 대학원생(조교)들도 연수에 참여했다.", "장단기 연수자 77명 중 3명을 제외한 전원이 복귀했다.", "현대의학의 새로운 동향이 한국에 소개되었다.", "임상 및 실험 중심에서 이론 중심으로 의학교육 방식이 전환되었다."], "ans": 4}, {"id": "7_23", "s": 7, "q": 23, "text": "다음 중 1950~1970년대 서울대학교 의과대학과 부속병원에서 일어난 일을 모두 고르면? ③ 가. 인턴 제도의 시행 나. 외과의 통합 다. 흉부외과의 개심술 라. 수련의 파동", "opts": ["가, 나, 다", "가, 나, 라", "가, 다, 라", "가, 나, 다, 라 인턴 제도는 1958년에 시작되었다. 흉부외과 이영균 교수는 1959년 국내 최초로 개심술을 시"], "ans": 3}, {"id": "7_24", "s": 7, "q": 24, "text": "1978년은 서울대학교병원 역사의 한 획을 긋는 해였다. 어떤 사건들 때문인가?", "opts": ["법인화, 신축 본관 완공", "법인화, 특진제도 시행", "법인화, 독립채산제 시행", "특진제도 시행, 신축 본관 완공"], "ans": 1}, {"id": "7_25", "s": 7, "q": 25, "text": "1980년대 서울대병원의 의학적 성과로 짝지어진 것은?", "opts": ["간이식, 시험관아기 탄생", "간이식, B형간염 백신 개발", "개심술, 시험관아기 탄생", "개심술, B형간염 백신 개발 산부인과 장윤석 교수팀은 1985년 국내 최초로 시험관아기 출산에 성공했다. 외과 김수태 교"], "ans": 1}, {"id": "7_26", "s": 7, "q": 26, "text": "다음 중 잘못 연결된 것은?", "opts": ["서울대학교어린이병원 : 아시아 최초의 어린이 전문 대학병원", "서울대학교병원 강남센터 : 한국 제일의 모범 공공병원", "서울대학교병원 임상시험센터 : 국내 최초 임상시험기관", "서울대학교병원 의생명연구원 : 서울대학교병원이 세계 최고 수준의 연구중심 병 원으로 도약하는 데 공헌"], "ans": 2}, {"id": "7_27", "s": 7, "q": 27, "text": "2000년 이후 진료과의 명칭 변경에 대한 설명으로 잘못된 것은?", "opts": ["정신과 → 정신건강의학과", "비뇨기과 → 비뇨의학과", "핵의학과 → 방사선종양학과", "진단방사선과 → 영상의학과"], "ans": 3}, {"id": "7_28", "s": 7, "q": 28, "text": "서울대학교병원은 2014년부터 중동의 셰이크 칼리파 전문병원을 수탁 운영하고 있 다. 이 병원은 어느 나라의 왕립병원인가?", "opts": ["이라크", "쿠웨이트", "사우디아라비아", "아랍에미리트연합국"], "ans": 4}, {"id": "7_29", "s": 7, "q": 29, "text": "2000년 이후 서울대학교 의과대학 및 서울대학교병원의 세계적 경쟁력 구축과 관 계없는 것은?", "opts": ["SCI 논문 1,000편 시대 개척", "‘미네소타 프로젝트’ 시행", "국제진료센터 개소", "강남센터의 검진 시스템 해외 수출"], "ans": 2}, {"id": "7_30", "s": 7, "q": 30, "text": "2019년 서울대학교병원이 개원한 새 외래진료센터의 명칭은?", "opts": ["박시제중 한국외래", "박시제중 대한외래", "인술제중 한국외래", "인술제중 대한외래"], "ans": 4}, {"id": "8_1", "s": 8, "q": 1, "text": "의료전달체계에 의한 설명으로 옳은 것은?", "opts": ["의료기관 종별로 의료보험 수가를 조정하기 위한 것이다.", "보건의료수요자에게 적정한 의료를 효과적으로 제공하는 것이다.", "국민의료비의 증가를 억제하기 위한 대책을 수립하는 것이다.", "국민이 의료기관을 선택할 자유를 최대한 보장하는 것이다."], "ans": 2}, {"id": "8_2", "s": 8, "q": 2, "text": "의료기관 종별 구분 기준으로 옳은 것은?", "opts": ["의원 : 의사, 치과의사 또는 한의사가 주로 입원환자를 대상으로 각각 그 의료 행위를 하는 의료기관", "병원 : 30개미만의 병상을 갖춘 의료기관", "종합병원 : 100병상 미만의 병상을 갖춘 의료기관", "상급종합병원 : 중증질환에 대하여 난이도가 높은 의료행위를 전문적으로 하여 특정 요건을 갖춘 보건복지부 장관 지정 의료기관 의원 : 병상 수가 30개 미만인 작은 규모의 의료기관"], "ans": 4}, {"id": "8_3", "s": 8, "q": 3, "text": "다음 상급종합병원의 표준 업무가 아닌 것은?", "opts": ["희귀·난치성 질환을 가진 환자의 치료", "수술·시술 등 고난이도의 치료기술을 필요로 하는 중한 진료", "장기치료가 필요한 만성질환을 가진 환자로서 입원할 필요가 있는 환자의 진료", "치사율이 높고 합병증 발생 가능성이 높은 질환을 가진 환자의 진료 상급종합병원의 표준업무는 중증 질환에 대한 치료와 고도화된 의료 서비스에 초점이 맞춰져"], "ans": 3}, {"id": "8_4", "s": 8, "q": 4, "text": "의료기관 종별 가산율로 옳은 것은?", "opts": ["의원 3%", "병원 6%", "종합병원 8%", "상급종합병원 15% 의원 : 0%"], "ans": 4}, {"id": "8_5", "s": 8, "q": 5, "text": "의료법 상 의료인에 해당하지 않는 자는?", "opts": ["의사", "한의사", "조산사", "약사 약사의 주된 업무는 약물 조제, 약물 관리, 복약 지도임. 이들은 의사나 한의사가 처방한 약물"], "ans": 4}, {"id": "8_6", "s": 8, "q": 6, "text": "의료법상 의료인에 해당되는 자는?", "opts": ["조산사", "임상병리사", "간호조무사", "작업치료사 의료법 제2조에 따르면 의료인은 의사, 치과의사, 한의사, 간호사, 조산사, 물리치료사, 작업치"], "ans": 1}, {"id": "8_7", "s": 8, "q": 7, "text": "‘의료인은 진료나 조산 요청을 받으면 정당한 사유 없이 거부하지 못한다’고 규정하고 있는데 정당한 사유로 볼 수 없는 것은?", "opts": ["의사가 부재중이거나 신병으로 진료를 행할 수 없는 경우", "병상, 의료인력, 시설 등이 부족하여 새로운 환자를 받아들일 수 없는 경우", "예약환자 진료 일정 때문에 당일 방문 환자에게 타 의료기관 이용을 권유할 수밖에 없는 경우", "진료비 청구가 곤란한 경우 의료인은 진료나 조산 요청을 받으면, 정당한 사유 없이 이를 거부할 수 없음. 이는 환자의 건강권을 보호하고, 의료 서비스의 공정한 제공을 보장하기 위한 법적 규정임. 다만, 거부할"], "ans": 4}, {"id": "8_8", "s": 8, "q": 8, "text": "의료법인·의료기관 또는 의료인의 의료광고 금지에 해당되지 않는 것은?", "opts": ["신의료기술 평가를 받은 신의료기술에 관한 광고", "다른 의료기관·의료인의 기능 또는 진료 방법과 비교하는 내용의 광고", "의료인의 기능, 진료 방법과 관련하여 심각한 부작용 등 중요한 정보를 누락하는 광고", "신문, 방송, 잡지 등을 이용하여 기사(記事) 또는 전문가의 의견 형태로 표현되는 광고 의료법 제56조에 따르면 의료법인, 의료기관 또는 의료인은 불법적인 의료광고를 금지하고 있음. 일반적으로 광고는 과장되거나 허위 정보를 전달하지 않도록 제한됨. 하지만 ‘신의료기"], "ans": 1}, {"id": "8_9", "s": 8, "q": 9, "text": "「국민건강보험법」에 따른 본인확인 수단으로 인정하는 신분증의 종류가 아닌 것은?", "opts": ["국가보훈등록증", "외국인등록증", "사진 및 주민등록번호가 없는 모바일 건강보험증", "사진으로 촬영된 주민등록증 사본 본인확인 수단으로 인정하는 규정 신분증은 행정기관이나 공공기관이 발행한 증명서로서 사 진이 붙어있고, 주민등록번호 또는 외국인등록번호가 포함되어 본인임을 확인할 수 있는 증"], "ans": 4}, {"id": "8_10", "s": 8, "q": 10, "text": "「국민건강보험법」에 따른 본인확인 예외 대상으로 적절하지 않은 것은?", "opts": ["18세 미만", "진료의뢰‧회송환자", "「응급의료에 관한 법률」에 따른 응급환자", "「모자보건법」에 따른 임산부"], "ans": 1}, {"id": "8_11", "s": 8, "q": 11, "text": "1단계 요양기관을 거치지 않고 2단계 진료를 받을 수 있는 환자는?", "opts": ["8세미만 소아", "재활의학과 환자", "당해 요양기관근무자의 가족", "혈우병환자 의료기관에서 1단계 요양기관을 거치지 않고 2단계 진료를 받을 수 있는 환자는 특수한 경우 에 한정됨. ‘혈우병 환자’는 질병 특성상 긴급한 치료나 전문적인 관리가 필요하므로, 1단계"], "ans": 4}, {"id": "8_12", "s": 8, "q": 12, "text": "국민건강보험법 상 가입자 또는 피부양자가 2단계 요양기관에서 1단계 요양급여를 받을 수 있는 예외 대상이 아닌 경우는?", "opts": ["가정의학과", "혈우병 환자", "일반적인 경증 환자", "치과 일반적인 경증 환자는 1단계 요양기관에서 치료받는 것이 원칙임. 경미한 질병이나 증상을 가진 환자가 2단계 요양기관을 바로 방문하여 1단계 요양급여를 받을 수 없음."], "ans": 3}, {"id": "8_13", "s": 8, "q": 13, "text": "다음 중 요양급여 의뢰서에 관한 내용 중 옳은 것은?\n① 요양급여 의뢰서는 ‘상급종합병원에서의 요양급여가 필요하다는 의사소견이 기재된 건강검진결과지’ 로 대체할 수 없다. ② 요양급여 의뢰서는 상급종합병원의 치과에 갈 때에는 필요 없다. ③ 요양급여 의뢰서는 일정 수가를 지불하고 발급받는다. ④ 군의관은 요양급여 의뢰서를 작성할 수 있다.", "opts": ["요양급여 의뢰서는 환자가 1단계 요양기관에서 2단계 이상의 요양기관으로 진료를 의뢰받 을 때 필요한 서류임. 건강검진결과지는 검진을 통해 건강 상태를 파악하는 문서로, ‘상급종합 병원에서의 요양급여가 필요하다는 의사소견이 기재된 건강진단ㆍ건강검진결과서에 한해 요 양급여 의뢰서를 대체할 수 있음.", "상급종합병원의 치과를 방문하는 경우, 의뢰서 없이 직접 방문할 수 있기 때문에 요양급", "요양급여 의뢰서는 환자가 진료를 받는 과정에서 필요한 서류일 뿐, 발급을 위해 별도로 수가를 지불하는 것은 아님.", "군의관은 요양급여 의뢰서를 발급할 수 없음. 군의료체계에서는 민간의료기관과는 다른 규정과 절차가 적용되기 때문에, 군의료기관에서 치료를 받는 경우에는 군의료기관 내에서 필요한 절차가 따로 존재함. 만약 민간 의료기관에서 치료를 받아야 할 경우에는 군의료체계 외의 절차에 따라 요양급여 의뢰서를 발급받아야함."], "ans": 2}, {"id": "8_14", "s": 8, "q": 14, "text": "다음 중 상급종합병원에서 건강보험환자가 1단계 요양급여를 받을 수 없는 경우 는?", "opts": ["분만, 응급 진료", "상급종합병원 근무자가 당해 기관에서 받는 진료", "안과, 이비인후과, 피부과의 진료", "치과, 가정의학과 진료 상급종합병원에서 1단계 요양급여를 받을 수 없는 경우는 보통 진료 과목에 따라 다름. 일반 적으로 1단계 요양급여는 1차 의료기관에서 제공되는 기본적인 진료에 해당하는 서비스임."], "ans": 3}, {"id": "8_15", "s": 8, "q": 15, "text": "급여비용 산정지침 진찰료 설명 중 옳지 않은 것은?", "opts": ["동일 의사가 동시에 2가지 이상의 상병에 대하여 진찰을 한 경우에는 진찰료를 1회 산정한다.", "동일한 상병에 대하여 2인 이상의 의사가 동일한 날에 진찰을 한 경우에는 진찰 료를 1회 산정한다.", "동일한 날에 내분비대사내과의 당뇨분야, 갑상선분야의 의사에게 각각 진찰을 한 경우에는 진찰료를 각각 산정할 수 있다.", "하나의 상병에 대한 진료를 계속 중에 다른 상병이 발생하여 동일 의사가 동시에 진찰을 한 경우에는 진찰료를 1회 산정한다."], "ans": 3}, {"id": "8_16", "s": 8, "q": 16, "text": "다음 중 산정특례에 관한 설명으로 적절하지 않은 것은?", "opts": ["산정특례는 진료비 본인부담이 높은 암 등 중증질환자와 희귀질환자, 중증난치질 환자에 대하여 본인부담률을 경감해주는 제도이다.", "산정특례 등록 신청서상의 진단확진일로부터 30일 경과 후 신청한 경우에는 ‘신청일’ 로부터 적용된다.", "산정특례 적용으로 인한 본인부담률 경감은 비급여 검사비에도 적용된다.", "산정특례 재등록 신청 가능기간은 적용기간 종료일로부터 3개월 전부터이다."], "ans": 3}, {"id": "8_17", "s": 8, "q": 17, "text": "산업재해보험을 관장하는 정부기관은?", "opts": ["보건복지부", "고용노동부", "국토교통부", "산업통상자원부 산업재해보험은 근로자가 업무 중 발생한 사고나 질병에 대해 보상하는 보험으로, 이를 관장 하는 것은 고용노동부임. 고용노동부는 근로자의 안전과 권리를 보호하기 위해 산업재해보험"], "ans": 2}, {"id": "8_18", "s": 8, "q": 18, "text": "비용대비 치료 효과가 낮아 필수적 의료는 아니지만 사회적 수요가 큰 의료를 본 인부담률 적용을 달리하면서 단계적으로 급여화 하는 제도는?", "opts": ["필수급여", "선별급여", "전액본인부담", "비급여 선별급여제도는 국민건강보험에서 일부 의료서비스를 선별적으로 급여 대상으로 인정하는 제 도임. 즉, 모든 의료 서비스가 건강보험에서 전액 지원되는 것이 아니라, 특정 조건을 만족하"], "ans": 2}, {"id": "8_19", "s": 8, "q": 19, "text": "원무 실무 환자용어 설명 중 옳은 것은?", "opts": ["신환 : 해당 상병으로 의료기관에 처음 내원하여 진료를 보는 환자", "초진 : 해당 상병으로 동일 의료기관의 동일 진료과목 의사에게 계속해서 진료 받고 있는 환자", "재진 : 해당 상병으로 동일 의료기관의 동일 진료과목 의사에게 진료받은 경험이 없는 환자", "낮병동 환자 : 입원에 준하는 상태에서 항암제 투여, 처치 및 수술 등 관찰에만 최소한 6시간 이상 소요되는 환자 신환은 병원이나 진료소에 처음 방문하여 진료를 받는 환자를 의미함. 이전에 같은 의료기관 에서 진료를 받은 적이 없는 환자임."], "ans": 1}, {"id": "8_20", "s": 8, "q": 20, "text": "낮병동 입원료는 응급실, 수술실 등에서 몇 시간 이상을 머물러야 산정할 수 있는 가?", "opts": ["4시간", "6시간", "8시간", "12시간 낮병동 입원료는 환자가 병원에서 하루 동안 치료를 받기 위해 일정 시간 이상 머물렀을 때 산정됨. 통상적으로 낮병동 입원료를 산정하기 위해서는 6시간 이상 병원에 머물러야 함."], "ans": 2}, {"id": "8_21", "s": 8, "q": 21, "text": "환자진료실적을 측정하는 지표에 대한 설명으로 옳은 것은? 이는 병원의 환자 유인력의 변화를 의미하며, 연외래환자수가 증가하면서 이 비율이 높아지는 것은 병원진료권인구가 증가되고 지역병원 신뢰도가 커지고 있다는 점을 간접적으로 시사하는 지표이다.", "opts": ["초진율", "평균재원일수", "응급환자율", "입원 대 외래환자비율 평균재원일수는 환자가 입원한 기간의 평균을 의미함. 즉 입원 환자들이 병원에 머문 평균 일수임."], "ans": 1}, {"id": "8_22", "s": 8, "q": 22, "text": "아래 입원환자 통계 지표에 대한 설명으로 옳은 것은? 입원기간중 병원에서 가동한 병상이 평균적으로 1병상당 몇 명의 입원환자를 수용 하였는가를 나타내는 지표임", "opts": ["평균재원일수", "병상이용률", "병상가동률", "병상회전율 평균재원일수는 입원한 환자들이 병원에 머문 평균 기간을 의미함."], "ans": 4}, {"id": "8_23", "s": 8, "q": 23, "text": "외래 고객의 이동 동선을 최적화하고 수납 대기 감소를 통한 환자 편의 증진을 위해 2021년 10월 14일부터 서울대학교병원에서 실시하고 있는 ‘진료·검사·치료 시행 후 귀가 전 1회 결제’ 하는 원무 프로세스의 명칭으로 알맞은 것은?", "opts": ["진료비 하이패스 시스템", "후불제", "진료비 한번결제 시스템", "원패스결제 시스템 진료비 하이패스 시스템 : 병원에서 진료비 결제를 보다 빠르고 편리하게 처리하도록 도와주 는 시스템"], "ans": 3}, {"id": "8_24", "s": 8, "q": 24, "text": "‘진료비 하이패스 (자동결제 시스템)’ 에 대한 설명 중 옳지 않은 것은?", "opts": ["진료비 하이패스란, 환자나 보호자가 신용카드를 미리 병원에 등록시켜 놓아, 진료비나 검사비 발생 시 원무창구에 직접 수납하지 않아도 자동으로 결제가 가 능한 시스템이다.", "하이패스를 이용하면 환자들이 병원에서 대기하는 시간을 크게 줄일 수 있어 고객 만족도 증대가 기대된다.", "신용카드를 등록하는 방법(진료비 하이패스 이용 목적)은 ‘원무창구 방문’과 ‘서울 대학교병원 모바일 앱 접속‘ 2가지 방법이 있다. (2023년 1분기 기준)", "진료비 하이패스 결제는 외래 진료비만 가능하고, 입원료 등은 결제가 불가능 하다."], "ans": 4}, {"id": "8_25", "s": 8, "q": 25, "text": "서울대학교병원에서 이용 가능한 비대면 결제서비스로 옳지 않은 것은?", "opts": ["병원 홈페이지 결제", "진료비 하이패스", "키오스크 결제", "모바일앱 결제 서울대학교병원에서 제공하는 비대면 결제 서비스는 환자들에게 보다 편리하고 빠른 결제 방"], "ans": 1}, {"id": "8_26", "s": 8, "q": 26, "text": "우리나라는 사회보장제도의 일환으로 국민건강보험제도를 시행하고 있는데, 국민 건강보험제도에 대한 설명으로 옳는 것은? ③ ㄱ. 생활상의 질병・부상에 대해 보험급여를 실시하는 제도이다. ㄴ. 소득수준에 따라 보험료를 차등부과 한다. ㄷ. 강제가입 제도로 법률에 의해 보험료를 강제징수 할 수 있다. ㄹ. 보험료의 부담수준에 따라 보험급여에 대해서 차별화된 보장을 받는다. ㅁ. 국민보건을 향상시키고 사회보장을 증진하여 국민생활 안정을 도모한다.", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄴ, ㅁ", "ㄱ, ㄴ, ㄷ, ㅁ", "ㄱ, ㄷ, ㄹ, ㅁ 국민건강보험제도는 보험료 납부액과 무관하게 균등한 보헙급여를 실시한다."], "ans": 3}, {"id": "8_27", "s": 8, "q": 27, "text": "우리나라의 건강보험 진료비 지불제도에 해당하는 것은? ㄱ. 인두제 ㄴ. 행위별수가제 ㄹ. 포괄수가제 ㅁ. 봉급제", "opts": ["ㄱ, ㄴ", "ㄴ, ㄷ", "ㄴ, ㄷ, ㄹ ㄷ. 정액수가제", "ㄱ, ㄴ, ㄷ, ㄹ 행위별수가제(fee-for-service)는 의료기관에서 의료인이 제공한 의료서비스(행위, 약제, 치료재 료 등)에 대해 서비스 별로 가격을 정하여 사용량과 가격에 의해 진료비를 지불하는 제도로"], "ans": 3}, {"id": "8_28", "s": 8, "q": 28, "text": "우리나라 진료비 지불제도 중 행위별수가제에 대한 설명으로 옳은 것은? ㄱ. 의료서비스별로 가격을 정해 사용량에 따라 진료비를 지불하는 제도이다. ㄴ. 의료서비스별 수가를 산정할 수 있으므로 의료서비스의 질이 높아진다. ㄷ. 환자 당 자원사용량을 최소화하여 건강보험재정의 안정적 운영이 가능하다. ㄹ. 필요 이상의 의료서비스 제공으로 건강보험의 과다 지출이 생길 수 있다. ㅁ. 진료비 산정과 청구방법이 간단하고, 행정처리가 용이하다.", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄴ, ㄹ", "ㄱ, ㄴ, ㅁ ㄷ - 포괄수가제 ㅁ – 인두제, 봉급제, 포괄수가제", "ㄱ, ㄷ, ㄹ, ㅁ"], "ans": 2}, {"id": "8_29", "s": 8, "q": 29, "text": "우리나라 진료비 지불제도 중 포괄수가제에 대한 설명으로 옳은 것은? ㄱ. 환자 진단군에 근거한 지불제도 방식이다. ㄴ. 더 높은 진료비를 받기 위해 검사나 처치를 더 많이 시행하게 된다. ㄷ. 환자 당 자원사용량을 최소화하여 건강보험재정의 안정적 운영이 가능하다. ㄹ. 필요 이상의 의료서비스 제공으로 건강보험의 과다 지출이 생길 수 있다. ㅁ. 환자가 부담하는 진료비가 예측 가능하다.", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄴ, ㅁ", "ㄱ, ㄷ, ㅁ", "ㄱ, ㄹ, ㅁ ㄴ, ㄹ – 행위별수가제"], "ans": 3}, {"id": "8_30", "s": 8, "q": 30, "text": "행위별수가제도에서 의료서비스에 대한 수가인 「요양급여비용」에 대한 설명으로 옳지 않은 것은?", "opts": ["행위수가는 「행위 급여ㆍ비급여 목록표 및 급여 상대가치점수」로 보건복지부 장관이 수가목록을 정하여 고시한다.", "행위수가는 개별 행위마다 대부분 상대가치점수로 고시되며, 일부 행위에 대해서는 정액수가나 금액으로 고시된다.", "새로운 행위가 도입된 경우에는 가장 유사한 급여 행위 수가로 준용하여 산정한다.", "약제는 「약제 급여목록표 및 급여 상한금액」으로 보건복지부 장관이 비용효과적인 약제 목록을 고시하며, 급여 고시 목록에 없는 허가된 약제는 비급여로 수가를 산정할 수 있다."], "ans": 3}, {"id": "8_31", "s": 8, "q": 31, "text": "요양급여비용을 구성하는 「상대가치점수」는 을(를) 고려하여 산정한 요양급여의 가치를 각 항목 간에 상대적인 점수로 나타낸 것으로, 실제 수 가는 이 점수에 당해 연도의 1점당 단가를 곱하여 금액으로 산정한다. 빈 칸에 알 맞은 내용은?", "opts": ["업무량, 자원의 양", "소요시간, 비용", "업무량, 자원의 양, 위험도", "소요시간, 비용, 난이도 건강보험 행위수가는 「행위 급여ㆍ비급여 목록표 및 급여 상대가치점수」 로 보건복지부 장관 이 그 목록과 금액을 고시하며, 대부분의 행위수가는 금액이 아닌 상대가치점수로 고시된다."], "ans": 3}, {"id": "8_32", "s": 8, "q": 32, "text": "의료보장 유형 - 관련법규 – 보험자(보장기관)에 대한 연결이 옳지 않은 것은?", "opts": ["건강보험 - 국민건강보험법 - 국민건강보험공단", "의료급여 - 국민건강보험법 – 지방자치단체(시·군·구)", "산업재해보상보험 - 산업재해보상보험법 - 근로복지공단", "자동차(손해보상)보험 – 자동차손해배상보장법 – 손해보험협회"], "ans": 2}, {"id": "8_33", "s": 8, "q": 33, "text": "국민건강보험의 요양급여 대상에 해당하지 않는 ‘비(非)급여대상’으로 옳은 것은? ㄱ. 건강검진 ㄴ. 안경, 콘택트렌즈 등을 대체하기 위한 시력교정술 ㄷ. 예방접종(국가필수예방접종 제외) ㄹ. 미용이나 성형목적의 수술과 그로 인한 후유증 치료", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ", "ㄴ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "ans": 4}, {"id": "8_34", "s": 8, "q": 34, "text": "국민건강보험에서 정하는 요양급여의 대상에 대한 설명으로 옳지 않은 것은?", "opts": ["질병, 부상, 출산 등에 대하여 요양급여를 실시하며 자동차사고는 해당하지 않는다.", "약제 및 치료재료의 지급이 요양급여의 대상에 해당하나, 보험적용이 되지 않는 치료재료는 환자에게 직접 구매해오도록 하여 사용할 수 있다.", "국민건강보험법 요양급여에 사용하는 장비, 약제, 치료재료 등은 각각의 법에서 규정하는 허가와 신고사항을 준수하여야 한다.", "요양급여의 범위(요양급여대상)는 보건복지부장관이 정하여 고시하며, 고시된 항목 외에는 법적 근거 없이 임의로 수가를 책정하여 산정할 수 없다."], "ans": 2}, {"id": "8_35", "s": 8, "q": 35, "text": "다음에서 설명하고 있는 요양급여에 해당하는 것은? 요양급여를 결정함에 있어 경제성 또는 치료효과성이 불확실하여 추가적인 근거가 필요하거나, 경제성이 낮아도 건강회복에 잠재적인 이득이 있는 경우 등에 예비적인 요양급여로 지정하고, 본인부담률을 달리 적용하면서, 주기적인 재평가 과정을 통해 요양급여 여부를 재검토하고 요양급여기준 조정하는 요양급여의 한 종류", "opts": ["급여", "선별급여", "전액본인부담", "비급여 · 급여 : 건강보험혜택이 적용되는 진료항목으로 일부본인부담과 전액본인부담으로 나뉘며, 일부 본인부담 항목의 경우 건강보험법 시행령 제19조 본인부담률 산정방법을 따른다."], "ans": 2}, {"id": "8_36", "s": 8, "q": 36, "text": "건강보험 일반 환자의 상급종합병원 진찰료 부담률은?", "opts": ["30%", "50%", "60%", "100% 국민건강보험법 시행령 제19조 상급종합병원 건강보험 일반환자 본인부담률"], "ans": 4}, {"id": "8_37", "s": 8, "q": 37, "text": "입원료에 대한 설명으로 옳은 것은?", "opts": ["입원과 퇴원이 24시간 이내에 이루어진 경우에는 전체 입원 시간이 8시간 이상인 경우에 한하여 1일의 입원료를 산정한다.", "입원료 기본점수는 의학관리료 40%, 간호관리료 25%, 병원관리료 35%가 포함되어 있고, 여기에 간호인력 확보수준에 따라 가감산을 적용하여 산정한다.", "0-6시 사이에 입원하거나(이른 입원), 18-24시 사이에 퇴원한 경우에는(늦은 퇴원) 입원료 소정점수의 50%를 추가로 산정한다.", "중환자실 입원 시 이중방으로 사용한 일반병상 입원료에 대해서는 환자가 전액본인부담 할 수 있다."], "ans": 2}, {"id": "8_38", "s": 8, "q": 38, "text": "상급종합병원의 외래 진료비 요양급여비용(진찰료, 약제비 제외)의 본인부담률이 알 맞게 짝지어진 것은? ④ ㄱ. 건강보험 일반(정상급여) 환자 – 60% ㄴ. 건강보험 산정특례 적용 암환자 – 5% ㄷ. 건강보험 산정특례 적용 희귀질환자 – 10% ㄹ. 건강보험 차상위 1종 – 0% ㅁ. 건강보험 경증질환 재진 – 100%", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄴ, ㄷ, ㄹ", "ㄷ, ㄹ, ㅁ", "ㄱ, ㄴ, ㄷ, ㄹ, ㅁ ・국민건강보험법 시행령 제19조 상급종합병원 건강보험 일반환자의 본인부담률 (일반) 진찰료비용의 100% + 나머지 요양급여비용의 60%"], "ans": 4}, {"id": "8_39", "s": 8, "q": 39, "text": "신의료기술평가제도에 대한 설명으로 옳지 않은 것은?", "opts": ["신의료기술평가는 새로운 기술 도입되거나 기존 의료기술의 목적·대상·방법이 변 경된 경우 해당 기술이 국민에게 사용하여도 안전하고 유효한지를 평가하는 제도 이다.", "신의료기술평가는 건강보험심사평가원에서 수행한다.", "신의료기술평가는 국민건강을 보호하고 의료기술의 발전을 촉진하기 위한 제도로 의료법에 근거한다.", "신의료기술평가결과 안전하고 유효한 기술로 평가되어 보건복지부장관 고시로 공 포되면 환자에게 의료행위를 시행하고 수가를 산정할 수 있다."], "ans": 2}, {"id": "8_40", "s": 8, "q": 40, "text": "비급여 진료비용에 관한 설명으로 옳지 않은 것은?", "opts": ["의료법 제45조 근거, 요양기관은 비급여 진료비용을 환자와 보호자가 쉽게 알 수 있도록 접수창구 등에 비치하여야 하며, 고지·게시한 금액을 초과하여 비급여 진 료비용을 징수할 수 없다.", "인터넷 홈페이지를 운영하는 요양기관은 인터넷 홈페이지에도 비급여 대상을 쉽 게 볼 수 있도록 표시해야 한다.", "보건복지부 장관이 별도로 정하여 고시한 비급여 항목은 그 비용을 건강보험심사 평가원에 제출하여야 하며, 건강보험심사평가원은 이를 국민이 항목별, 병원별로 조회할 수 있도록 홈페이지에 공개하고 있다.", "보건복지부장관이 별도로 정하여 고시하는 비급여 항목은 어떠한 경우라도 진료 전에 비급여 가격을 환자 또는 보호자에게 직접 설명하여야 한다."], "ans": 4}, {"id": "8_41", "s": 8, "q": 41, "text": "요양급여 적정성평가에 대한 설명으로 옳지 않은 것은?", "opts": ["건강보험으로 제공되는 의료서비스 전반에 대하여 요양기관별, 상병별, 진료과목 별로 구분하여 의약학적 측면과 비용·효과적 측면에서 요양급여를 적정하게 행하 였는지를 평가한다.", "적정성평가의 목적은 의료의 질적 수준 향상 및 비용부담의 적정화 도모에 있다.", "적정성평가는 진료내역, 평가자료의 조작 위험이 있으므로 사전고지 없이 수시평 가로 진행된다.", "적정성평가 결과는 성과기반지불(가감지급 및 수가), 질 향상 지원, 정책적 목적과 국민홍보로 활용된다."], "ans": 3}, {"id": "8_42", "s": 8, "q": 42, "text": "2014~2018년 건강보험 중기 보장성 강화 계획에 따라 3대 고액 비급여 항목으로 지적된 선택진료비의 문제점을 해결하고 국민에게 수준 높은 의료서비스를 제공할 목적으로 의료의 질을 높이는데 기여한 의료기관을 지원하기 위한 평가는?", "opts": ["상급종합병원 지정평가", "의료질평가", "지역거점공공병원 운영평가", "의료기관 인증평가"], "ans": 2}, {"id": "8_43", "s": 8, "q": 43, "text": "국가 단위의 의료 질 향상을 위해 보건복지부에서 여러 평가를 관장하고 있는데, 이 중 요양급여 적정성 평가, 의료질평가, 상급종합병원 지정평가, 전문병원 지정평가 등을 수행하는 기관은?", "opts": ["국립중앙의료원", "의료기관인증원", "대한병원협회", "건강보험심사평가원"], "ans": 4}, {"id": "8_44", "s": 8, "q": 44, "text": "상병, 시술, 기능 상태 등을 이용하여 환자를 임상적 의미와 의료자원소모 측면에 서 유사한 그룹으로 분류하는 것을 환자분류체계라 한다. 이 중 진료비 지불단위로 사용, 병원 간 진료비 등의 비교를 위한 상대지표 산출 시 환자구성을 보정하는 도 구로 사용, 상급종합병원 지정평가와 의료질평가 등에서 활용되고 있는 분류체계 는?", "opts": ["입원환자분류체계", "재활환자분류체계", "외래환자분류체계", "한의입원환자분류체계"], "ans": 1}, {"id": "8_45", "s": 8, "q": 45, "text": "질병군별 환자의 구성을 나타내는 것으로 원내 HIS 환자리스트에 A로 표기되며, 상급종합병원지정평가, 의료질평가, 상급종합병원 구조전환 시범사업에 반영되는 지표로 활용되는 질병군은?", "opts": ["복합질병군", "복잡질병군", "중증질병군", "전문질병군 전문진료질병군은 보건복지부 고시「상급종합병원의 지정 및 평가규정」의거 [별표 1] 로 고지."], "ans": 4}, {"id": "8_46", "s": 8, "q": 46, "text": "국민건강보험공단에 등록된 산정특례 대상자의 본인부담률이 옳게 연결된 것은?\n① 결핵 – 5%", "opts": ["면제", "암 5%", "중증치매 10%", "희귀 10%"], "ans": 2}, {"id": "8_47", "s": 8, "q": 47, "text": "산정특례에 대한 설명으로 옳은 것은?\n① 등록 신청서상 진단확진일로부터 30일 이내 신청시 확진일부터 적용한다. ② 진단을 위한 생검후 퇴원하여 외래에서 병리결과 암으로 확진된 경우 진단 목적의 입원에 대해 소급 적용 가능하다. ③ 산정특례기간 종료 시점 항암치료 받지 않고 재발, 전이여부 등 검사만 정기적으로 추적 검사시에도 재등록 가능하다. ④ 진료비 부담이 높은 암, 희귀질환 등에 대해 본인부담률을 경감해주는 제도로 2인실 입원료도 경감 대상에 포함한다.", "opts": ["확진일로부터 30일 이내 신청시 확진일부터, 30일 이후 신청시 신청일부터 적용", "종양제거술 등 치료목적의 내역이 있어야 소급가능", "항암치료없이 정기적인 검사만 하는 경우 재등록 대상에서 제외", "2인실 입원료는 경감 대상 아님"], "ans": 1}, {"id": "8_48", "s": 8, "q": 48, "text": "요양급여비용에 대한 청구시기에 대한 설명으로 옳은 것은?\n① 입원진료는 퇴원일이 속한 날의 익일부터 청구할 수 있다. ② 30일 초과 장기 입원하더라도 퇴원해야만 청구할 수 있다. ③ 외래진료는 내원일이 속한 날의 다음 달 초일부터 월별로 청구한다. ④ 월의 말일과 초일이 모두 포함된 주의 입원진료 청구시는 월별로 구분하지 않고 청구 가능하다.", "opts": ["입원청구는 퇴원일이 속한 날의 다음주 월요일부터 청구 가능", "30일 초과 장기입원시 퇴원하지 않더라고 월단위로 분할 청구 가능", "외래청구는 월단위로 다음달 청구로 정답임", "월별로 구분하여 청구해야 함"], "ans": 3}, {"id": "8_49", "s": 8, "q": 49, "text": "다음 설명에 해당하는 것은? 충수절제술을 받고 퇴원한 환자의 진료비를 청구하였으나, 주민등록번호 불일치로 반송되어 정정 후 다시 청구하는 것", "opts": ["추가청구", "보완청구", "분리청구", "누락청구"], "ans": 2}, {"id": "8_50", "s": 8, "q": 50, "text": "요양급여비용에 관한 건강보험심사평가원의 처분에 대한 이의제기 절차가 순서대 로 연결된 것은?", "opts": ["심판청구 – 이의신청 – 행정소송", "심판청구 – 행정소송- 이의신청", "이의신청 – 심판청구 - 행정소송", "이의신청 – 행정소송 – 심판청구"], "ans": 3}, {"id": "8_51", "s": 8, "q": 51, "text": "진찰료에 대한 설명으로 옳은 것은?\n① 주사제를 처방한 당일이 아닌 다른 날에 의사의 진찰 없이 주사를 실시한 경우 진찰료를 산정할 수 없다. ② 동일한 날에 내분비대사내과의 당뇨분야, 갑상선분야의 의사에게 각각 진찰을 한 경우에는 진찰료를 각각 산정할 수 있다. ③ 해당 상병의 치료 종결후 동일 상병이 재발하여 내원한 경우 초진환자로 보나, 치료종결후 30일 이내 내원시 재진환자로 본다. ➃ 진료의와 상담후 의료법에 따라 대리수령자가 처방전 및 약제를 수령한 경우 재진 진찰료 소정점수의 100% 산정 가능하다.", "opts": ["일부 소정점수 산정 가능", "분야가 달라도 동일진료과목이므로 진찰료는 1회 산정", "정답", "재진료 50% 산정 가능"], "ans": 3}, {"id": "8_52", "s": 8, "q": 52, "text": "격리실 입원료는 일반 환자를 보호하기 위하여 전염력이 강한 전염성 환자를 일반 환자와 격리하여 치료한 경우에 산정하는 입원료이다. 다음 중 상급종합병원에서 격리실 입원료를 산정할 수 있는 경우로 옳은 것은? ② ㄱ. 결핵, 수두, 홍역, 백일해 ㄴ. E형간염 ㄷ. 카바페넴내성장내세균목(CRE) 감염증 ㄹ. 대상포진 ㅁ. 코로나바이러스감염증-19", "opts": ["ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㅁ", "ㄷ, ㄹ, ㅁ", "ㄱ, ㄴ, ㄷ, ㄹ, ㅁ ㄴ. E형간염 – 격리대상 제외 ㄹ. 대상포진 중 파종성 대상포진이 격리실 입원료 급여대상에 해당 [ 격리실 입원료 급여기준(일반원칙)] 1) 「감염병의 예방 및 관리에 관한 법률」에 따른 제1급감염병 다만, 신종감염병증후군 및 신종인플루엔자는 유행시 별도 관리지침에 따라 적용"], "ans": 2}, {"id": "8_53", "s": 8, "q": 53, "text": "전문의 시행시 수술료에 대한 가산이 가능한 진료과로만 조합된 경우는?", "opts": ["외과, 성형외과, 정형외과", "외과, 신경외과, 산부인과", "외과, 성형외과, 심장혈관흉부외과", "외과, 정형외과, 심장혈관흉부외과"], "ans": 3}, {"id": "8_54", "s": 8, "q": 54, "text": "수술료에 대한 야간가산이 가능한 경우는?\n① 전치태반으로 예정된 평일 오전 11시에 제왕절개술 시행 ② 복통으로 응급실 방문후 충수염 진단하 토요일 오후 5시에 충수절제술 시행 ③ 예정된 고관절치환술이었으나, 이전 수술로 지연되어 오후 7시에 시행 ④ 입원중 갑작스런 두통으로 뇌출혈 진단하 평일 오후 8시에 개두술 시행 야간가산은 응급진료가 불가피하여 18 ~ 09시 에 시행한 경우 가능", "opts": ["야간시간 및 응급수술이 아님", "응급수술이나 토요일 여부에 상관없이 야간시간 아님", "야간시간이나, 예정된 수술로 응급진료가 아님", "응급수술로 야간시간에 시행으로 정답"], "ans": 4}, {"id": "8_55", "s": 8, "q": 55, "text": "다음의 설명에 해당하는 제도는? 요양기관에서 착오 등 부당청구의 개연성이 높은 항목에 대해 사전에 그 내용을 요 양기관에 통보하고 자발적으로 부당·착오청구 내용을 시정하여 청구행태를 개선할 수 있도록 하는 제도", "opts": ["선별급여 제도", "자율점검 제도", "자율형 분석심사 제도", "요양기관 현지조사 제도"], "ans": 2}, {"id": "9_1", "s": 9, "q": 1, "text": "재무제표의 종류에 해당하지 않은 것은?", "opts": ["재무상태표", "손익계산서", "현금출납부", "현금흐름표 현금출납부는 현금의 입출금 사항을 기록하는 장부임."], "ans": 3}, {"id": "9_2", "s": 9, "q": 2, "text": "회계의 원칙에 대한 설명으로 바르지 않은 것은?", "opts": ["발생주의에서 수익과 비용은 현금유출입 시기가 아닌 거래발생 시기로 인식한다.", "수익과 비용은 서로 차감하여 계상한다.", "세무회계는 재무회계에서 얻어진 결과를 세법에 의하여 조정하는 회계이다.", "현금주의는 현금 유입 시 수익으로 인식하고 현금 유출 시 비용으로 인식한다."], "ans": 2}, {"id": "9_3", "s": 9, "q": 3, "text": "재무회계와 관리회계의 차이점에 대하여 바르지 않은 것은?", "opts": ["재무회계는 일반적으로 인정된 회계원칙을 적용한다.", "재무회계는 정형화된 보고서(재무제표)를 사용한다.", "관리회계는 회계원칙의 제한이 없다.", "관리회계는 주로 과거의 정보를 다룬다."], "ans": 4}, {"id": "9_4", "s": 9, "q": 4, "text": "다음 재무 비율지표 중 기업의 안정성을 평가하는 비율에 속하지 않은 것은?", "opts": ["부채비율", "당좌비율", "유동비율", "매출액증가율 순이익증가율은 성장성비율에 속한다."], "ans": 4}, {"id": "9_5", "s": 9, "q": 5, "text": "재무상태표에 대한 설명 중 옳지 않은 것은?", "opts": ["재무상태표는 일정 시점의 기업의 재무 상태를 나타낸다.", "재무상태표 등식은 [자산=부채+자본]이다.", "재무상태효의 자산은 자금의 조달, 부채와 자본은 자금의 운용을 의미한다.", "유동자산은 보통 1년 내에 현금으로 회수 가능한 자산이다."], "ans": 3}, {"id": "9_6", "s": 9, "q": 6, "text": "다음 설명 중 옳은 것은?", "opts": ["의료이익(손실)과 당기순이익(손실)은 같다.", "건강검진수익은 의료외수익이다.", "직원진료비감면은 복리후생비에 포함된다.", "고유목적사업준비금 관련 계정은 병원의 당기순이익과 무관하다."], "ans": 3}, {"id": "9_7", "s": 9, "q": 7, "text": "다음 중 의료비용에 속하지 않은 것은?", "opts": ["인건비", "의료부대비용", "관리운영비", "재료비 의료부대비용은 의료외비용이다."], "ans": 2}, {"id": "9_8", "s": 9, "q": 8, "text": "다음 설명 중 옳지 않은 것은?", "opts": ["모든 비용 계정의 지출은 원칙적으로 예산 합의를 거쳐야 한다.", "건당 1백만원을 초과하는 경비의 지출은 감사를 거쳐야 한다.", "건당 50만원 이하의 업무추진비, 회의비, 기타잡비는 감사를 거치지 않아도 된다.", "인건비, 공공요금 등은 감사를 거치지 않는다."], "ans": 3}, {"id": "9_9", "s": 9, "q": 9, "text": "지방세가 아닌 세금은?", "opts": ["취득세", "등록세", "부가가치세 부가가치세는 국세이다.", "재산세"], "ans": 3}, {"id": "9_10", "s": 9, "q": 10, "text": "다음 중 자본적 지출에 해당하는 것이 아닌 것은?", "opts": ["엘리베이터, 냉난방장치의 설치", "건물, 벽의 도장", "전기, 설비 등의 증축", "빌딩의 피난시설 등의 설치 자본적 지출은 1)비유동자산의 증설과 개량으로 인하여 기존 비유동자산의 내용연수가 연장"], "ans": 2}, {"id": "9_11", "s": 9, "q": 11, "text": "다음 중 재고자산에 해당하지 않은 것은?", "opts": ["약품", "진료재료", "일반비품", "급식재료 일반비품은 유형자산이다."], "ans": 3}, {"id": "9_12", "s": 9, "q": 12, "text": "다음은 회계규정에 대한 내용과 다른 것은?", "opts": ["서울대학교병원의 회계연도는 정부의 회계연도와 같이 한다.", "수익 및 비용의 계상과 자산, 부채 및 자본의 증감변동에 관하여는 그 원인이 되는 사실이 발생한 날 또는 실현된 날을 기준으로 한다.", "회계처리는 의료기관회계기준규칙과 재무제표세부작성방법에 대한 고시에 따라 처리 한다.", "원장은 회계업무를 위임할 수 없다."], "ans": 4}, {"id": "9_13", "s": 9, "q": 13, "text": "국고보조금에 대한 설명 중 옳지 않은 것은?", "opts": ["정부보조금이므로 전액 기타기본금으로 계상한다.", "병원 증축 등을 위해 정부로부터 받는 출연금은 기타기본금으로 계상한다.", "수익적 지출 또는 결손보전에 충당하는 경우에는 기부금수익으로 계상한다.", "자본적 지출에 충당 할 목적으로 받은 국고보조금은 취득자산에서 차감하는 형식 으로 표시한다."], "ans": 1}, {"id": "9_14", "s": 9, "q": 14, "text": "우리병원의 감가상각방법은?", "opts": ["정률법", "정액법", "생산량비례법 현재 병원 자산의 감가상각은 정액법을 적용하고 있다.", "이중체감법"], "ans": 2}, {"id": "9_15", "s": 9, "q": 15, "text": "다음 중 세법상 인정되는 법정지출증빙 서류가 아닌 것은?", "opts": ["세금계산서", "거래명세서", "신용카드영수증", "현금영수증 세금계산서, 계산서, 신용카드매출전표, 현금영수증 등이 법정 지출 증빙이며, 거래명서세는 포함되지 않는다."], "ans": 2}, {"id": "9_16", "s": 9, "q": 16, "text": "세무회계에 관한 내용 중 타당하지 않은 것은?", "opts": ["재무회계 결산", "법인세 파악 목적", "조세를 신고 및 납부하기 위함", "기업이익을 세법의 규정에 따라 과세소득으로 측정"], "ans": 1}, {"id": "9_17", "s": 9, "q": 17, "text": "회계의 기본원리에 해당하지 않은 것은?", "opts": ["대차평균의 원리", "거래의 8요소", "이익 실현", "거래의 이중성 이익실현은 회계의 기본원리에 해당하지 않는다."], "ans": 3}, {"id": "9_18", "s": 9, "q": 18, "text": "고유목적사업준비금은 설정 후 몇 년 이내 사용해야 하는가?", "opts": ["1년", "3년", "5년", "10년 고유목적사업준비금은 적립 후 5년 이내에 목적사업에 사용해야 한다."], "ans": 3}, {"id": "9_19", "s": 9, "q": 19, "text": "부외자산의 설명에 해당하지 않은 것은?", "opts": ["재무상태표에 계상되어 있음", "수익적 지출로 처리", "현실적으로 점유하고 있음", "재무상태표에 계상되지 아니한 자산"], "ans": 1}, {"id": "9_20", "s": 9, "q": 20, "text": "세금계산서 필요적 기재사항에 해당하지 않은 것은?", "opts": ["작성년월일", "부가가치세액", "관할 세무서", "공급하는 사업자의 등록번호"], "ans": 3}, {"id": "9_21", "s": 9, "q": 21, "text": "고유목적사업준비금에 대한 설명 중 타당하지 않은 것은?", "opts": ["고유목적사업준비금 전입은 의료비용 및 의료외비용과 구분하여 별도 표시한다.", "의료발전준비금환입은 비용으로 반영된다.", "고유목적사업준비금 전입 금액만큼 실제 현금을 적립하는 것은 아니다.", "추후 수익으로 환입되므로 일정 시기가 되면 손익효과는 동일하다."], "ans": 2}, {"id": "9_22", "s": 9, "q": 22, "text": "의료보험환자의 외래 진료 후 회계처리 프로세스에 대해 적합하지 않은 것은?", "opts": ["진료비총액 중 환자 본인부담액을 징수하였다.", "후불액(공단 및 계약업체청구액)은 전산으로 조정된다.", "수납 시 원무전산으로 처리되므로 행정 행위는 종료된다.", "후불액은 해당기관에 청구하며 회계처리 한다."], "ans": 3}, {"id": "9_23", "s": 9, "q": 23, "text": "부가가치세 면세물품에 적용되는 계산서에 대한 설명으로 적합하지 않은 것은?", "opts": ["공급가액만 표시된다.", "부가세액은 표시되지 않는다.", "공급자, 공급받는 자의 사업자등록번호는 존재한다.", "간이세금계산서이다."], "ans": 4}, {"id": "9_24", "s": 9, "q": 24, "text": "출연재산(기부금)에 대한 설명 중 적합하지 않은 것은?", "opts": ["출연 받은 재산은 고유목적사업에 사용한다.", "병원의 관리운영경비에 사용하면 된다.", "출연 받은 날로부터 3년 이내에 사용해야 한다.", "3년 이내에 고유목적사업에 미사용한 경우 증여세를 과세한다."], "ans": 2}, {"id": "9_25", "s": 9, "q": 25, "text": "계약상대자가 정당한 이유 없이 계약상의 의무를 기한 내에 이행하지 못하고 지체 한 때에는 징수하는 것은?", "opts": ["벌과금", "보증금", "지체상금 손해배상액의 예정액으로 본다.", "연체료"], "ans": 3}, {"id": "9_26", "s": 9, "q": 26, "text": "일시적이고 우발적으로 발생하는 인적용역에 대해 기타소득으로 100만원을 지급하 고자 한다. 이럴 경우 용역제공자가 실제로 지급받는 금액은 얼마인가? (2025년 12 월 지급을 기준으로 한다.)", "opts": ["912,000원", "934,000원", "956,000원", "967,000원 2025년 12월 기준 기타소득의 실효세율은 8.8%로 100만원 지급 시 8만 8천원을 제하고 지 급한다."], "ans": 1}, {"id": "9_27", "s": 9, "q": 27, "text": "다음 중 고유목적사업준비금에 대한 설명으로 옳은 것은?", "opts": ["고유목적사업준비금은 병원의 자산으로 관리된다.", "의료기기구입을 위해서 고유목적사업준비금을 사용 할 수 없다.", "의료발전준비금환입금액이 클수록 병원 당기순이익이 좋아진다.", "고유목적사업준비금전입 시 해당 금액만큼 현금을 따로 보관해야 한다."], "ans": 3}, {"id": "9_28", "s": 9, "q": 28, "text": "20X1년 12월 병원에서 20X2년 1년 임차료 1,200만원을 선지급한 경우 20X1년의 비용으로 처리될 임차료는 얼마인가?", "opts": ["0원", "100만원 2026. UPDATE", "300만원", "1,200만원 20X2년도에 반영될 비용이므로 20X1년은 선급임차료로 처리하며 비용은 0원이다."], "ans": 1}, {"id": "9_29", "s": 9, "q": 29, "text": "다음 중 20X1년의 수익으로 반영할 수 없는 것은?", "opts": ["20X1년 진료가 완료된 환자의 공단부담금이 20X1년 말 현재 미입금되었다.", "임대업체의 20X1년 12월 임대료가 20X2년 입금되었다.", "20X1년 납품기일을 준수하지 못한 업체에게 지체상금을 수령하였다.", "20X2년부터 자문 용역을 제공하기로 하고 20X1년 12월 자문료를 선지급 받았다."], "ans": 4}, {"id": "9_30", "s": 9, "q": 30, "text": "다음 중 재무상태표 상 병원의 자산으로 계상할 수 있는 항목이 아닌 것은?", "opts": ["의료서비스를 제공하고 환자에게 받지 못한 의료미수금", "공간 임차 후 임차인에게 지급한 임차보증금", "물류팀에 보관중인 약품재고", "급여 지급 시 원천세 납부를 위해 공제한 예수금"], "ans": 4}, {"id": "9_31", "s": 9, "q": 31, "text": "다음 중 병원의 자금을 감소시키는 거래는?", "opts": ["건강보험공단에서 요양급여비용 지급일을 단축하여 지급하기로 하였다.", "전년도에 비해 의료수익은 증가한 반면 의료미수금은 크게 감소하였다.", "시설투자 확대로 인해 시설공사에 대한 대금 지급이 증가하였다.", "소송 증가로 인해 기타충당금이 크게 증가하였다."], "ans": 3}, {"id": "9_32", "s": 9, "q": 32, "text": "다음 중 법인세비용에 관한 설명으로 올바르지 않은 것은?", "opts": ["회계상 이익은 세무상 소득과 차이가 있을 수 있다.", "일반적으로 중간예납기간에 직전년도 산출세액의 일부를 미리 납부한다.", "서울대학교병원은 모든 법인세 비용을 면제받는다.", "회계상 당기순손실을 기록하더라도 법인세를 납부 할 수 있다."], "ans": 3}, {"id": "9_33", "s": 9, "q": 33, "text": "수익적 지출 또는 결손보전에 충당하는 국고보조금 입금 시 회계처리 방법은?", "opts": ["의료외수익 중 기부금 수익으로 처리한다.", "의료수익으로 처리한다.", "기본금 항목으로 처리한다.", "국고보조금은 병원 돈이 아니므로 부채항목으로 처리한다."], "ans": 1}, {"id": "9_34", "s": 9, "q": 34, "text": "다음 중 감가상각을 하지 않는 자산은?", "opts": ["병원 토지", "건물", "의료장비", "병원이 개발한 소프트웨어 비유동자산 중 토지, 골동품 및 미술품 등은 감가상각의 대상이 아니다."], "ans": 1}, {"id": "9_35", "s": 9, "q": 35, "text": "다음 중 퇴직급여충당금에 대한 설명으로 옳은 것은?", "opts": ["퇴직급여충당금은 회계연도말 현재 퇴직금 지급대상인 전직원이 일시에 퇴직할 경우 지급하여야 할 퇴직금에 상당하는 금액이다.", "퇴직급여충당금은 자산계정에 해당한다.", "퇴직급여충당금이 증가할수록 부채비율은 감소한다.", "퇴직급여충당금 전액은 병원 통장에 현금 보관하여야 한다."], "ans": 1}, {"id": "9_36", "s": 9, "q": 36, "text": "다음 중 감가상각에 대한 설명으로 틀린 것은?", "opts": ["유형자산 및 무형자산의 잔존가액은 자산가액의 10%로 한다.", "연도 중에 취득한 비유동자산에 대한 상각은 사업에 사용한 날부터 월수에 따라 계산한다.", "감가상각 월수 계산 시 1월 미만은 1월로 한다.", "매도계약을 체결한 비유동자산에 대하여는 감가상각하지 아니할 수 있다."], "ans": 1}, {"id": "9_37", "s": 9, "q": 37, "text": "다음 중 이사회 승인을 생략하고 결손처리 할 수 있는 항목이 아닌 것은?", "opts": ["관련법규에 의해 심사 청구 된 금액 중 진료비심사지급기관에서 삭감 처리된 국 민건강보험진료비·의료급여진료비·자동차보험진료비 등을 결손 처리할 경우", "채무자의 소재가 불명하고 압류할 수 있는 재산의 가격이 강제집행비용 또는 우 선채권의 합계액을 초과하지 아니할 경우", "채무자가 사망하고 그 상속재산의 가액이 강제집행비용 또는 우선채권의 합계액 을 초과하지 아니할 경우", "10년 이상 악성 채무로 남아 있는 경우"], "ans": 4}, {"id": "9_38", "s": 9, "q": 38, "text": "다음 중 당기순이익을 감소시키는 거래는 무엇인가?", "opts": ["병원의 공간이 부족하여 외부 공간을 임차하고 임차보증금 지급", "차입금의 상환기일이 도래하여 차입금 상환", "자금 부족 사태에 대응하기 위해 마이너스 통장 개설", "업무량 증가로 인해 발생한 시간외수당 지급"], "ans": 4}, {"id": "9_39", "s": 9, "q": 39, "text": "일반약품 100만원 만큼 물품검수 완료 후 병원 물류창구에 보관하였고, 대금은 6 개월 후 지급하기로 하였다. 이러한 경우 올바른 회계처리는?", "opts": ["차)일반약품 100만원 대)일반약품비 100만원", "차)일반약품 100만원 대)외상매입금 100만원", "차)일반약품비 100만원 대)일반약품 100만원", "차)일반약품비 100만원 대)외상매입금 100만원"], "ans": 2}, {"id": "9_40", "s": 9, "q": 40, "text": "우리병원 계약의 개요에 설명으로 바르지 않은 것은?", "opts": ["계약은 사법상 계약이며 쌍무 계약이다.", "계약담당자의 자의적 집행을 방지할 필요가 있어 민법으로 계약관련규정을 운영 한다.", "계약자유의 원칙, 신의성실의 원칙, 사정변경의 원칙 및 권리남용금지의 원칙이 적용된다.", "상호 대등한 입장에서 당사자의 합의에 따라 체결되어야 한다."], "ans": 2}, {"id": "9_41", "s": 9, "q": 41, "text": "경쟁계약에 해당하지 않은 것은?", "opts": ["일반경쟁입찰", "제한경쟁입찰", "수의계약", "지명경쟁입찰 수의계약은 경쟁입찰에 부치지 않고 특정의 상대를 선정하여 체결."], "ans": 3}, {"id": "9_42", "s": 9, "q": 42, "text": "본원의 계약 관련규정 및 법령과 거리가 먼 것은?", "opts": ["본원회계규정", "기타공공기관계약사무운영규정", "국가를당사자로하는계약에관한법률", "민법 및 상법"], "ans": 4}, {"id": "9_43", "s": 9, "q": 43, "text": "시설공사 계약방법에 대한 설명이다 옳지 않은 것은?", "opts": ["2천만원미만 시설공사는 1인에 의한 수의계약에 의할 수 있다.", "지명경쟁입찰은 계약의 목적, 성질, 규모 등을 고려 필요하다고 인정되는 경우 가 능하다.", "소액수의 견적입찰은 견적서를 제출받는 방법으로 가격입찰 방식으로 진행한다.", "시설공사는 낙찰자 결정방법으로 협상에 의한 계약을 적용할 수 있다."], "ans": 4}, {"id": "9_44", "s": 9, "q": 44, "text": "계약용어 설명 중 옳지 않은 것은?", "opts": ["기초금액은 부실공사 또는 부실입찰을 방지하기 위해 적용된 금액이다.", "거래실례가격은 시중에서 적정한 거래가 형성된 경우 거래가격이다.", "계약보증금은 계약 체결 후 계약이행이 완료될 때까지의 계약이행을 계약자로부 터 보증받기 위한 물적 담보이다.", "과업지시서는 용역계약에 있어 계약당사자가 이행하여야 할 업무를 정해 놓은 문 서로서 계약서의 효력을 가진다."], "ans": 1}, {"id": "9_45", "s": 9, "q": 45, "text": "계약용어 설명 중 옳지 않은 것은?", "opts": ["예정가격은 입찰 또는 계약체결 전에 낙찰자 및 계약금액의 결정기준으로 삼기 위해 미리 작성·비치하여 두는 가액", "낙찰은 개찰결과 낙찰자가 없는 경우 입찰이 성사되지 않는 상황이다.", "장기계속계약은 그 성질상 수년을 계속하여 존속할 필요가 있거나 이행에 수년 을 요하는 계약이다.", "적격심사는 입찰자의 계약이행능력을 심사하여 우량업체를 낙찰자로 결정하는 제도이다."], "ans": 2}, {"id": "9_46", "s": 9, "q": 46, "text": "수의계약에 의할 수 있는 경우가 아닌 것은?", "opts": ["원자재의 가격급등 등 경쟁에 부칠 여유가 없을 때", "지방자치단체와 계약을 할 경우", "1회 경쟁 입찰 결과 무 응찰로 인해 유찰된 경우", "특정인의 기술 또는 특정한 품질로 인해 경쟁을 할 수 없는 경우 회계규정 제204조 (재공고입찰과 수의계약) ① 경쟁입찰을 실시한 결과 다음 각 호의 1에 해 당하는 경우에는 수의계약에 의할 수 있다."], "ans": 3}, {"id": "9_47", "s": 9, "q": 47, "text": "「국가를당사자로하는계약에관한법률시행령」 에 따르면 청구를 받은 날로부터 며칠 이내 대금을 지급해야 하는가?", "opts": ["5일", "15일", "1개월", "3개월 「국가계약법 시행령」제58조에 따르면 검사를 완료한 후 계약상대방의 요청을 받은 날부터 5 일이내에 지급해야 한다."], "ans": 1}, {"id": "9_48", "s": 9, "q": 48, "text": "경쟁입찰의 성립을 위한 최소한의 참여 인원은 몇 명인가?", "opts": ["2인", "3인", "4인", "5인 경쟁입찰은 2인 이상이면 유효한 입찰로 성립한다."], "ans": 1}, {"id": "9_49", "s": 9, "q": 49, "text": "전문 공사의 도급계약에 있어서 계약상대자로 하여금 그 공사의 하자보수를 보증 하기 위하여 하자보수보증금을 납부하게 하여야 하는데, 하자보증금률은 최소 얼마 로 하여야 하는가?", "opts": ["100분의 2 이상", "100분의 5 이상", "100분의 10 이상", "100분의 15 이상"], "ans": 1}, {"id": "9_50", "s": 9, "q": 50, "text": "공사, 제조 또는 용역 계약의 대가로서 선금을 지급 할 경우 계약금액의 몇%까지 지급 할 수 있는가?", "opts": ["10%", "30%", "50%", "70% 「정부 입찰·계약 집행기준」에 의거, 공사, 제조 또는 용역 계약의 대가로서 계약금액의 100분 의 70을 초과하지 아니하는 금액."], "ans": 4}, {"id": "10_1", "s": 10, "q": 1, "text": "인증평가에 대한 설명으로 맞는 것을 모두 고르면? 가. 인증평가의 주목적은 환자안전과 의료의 질 향상이다. 나. 인증평가는 구조지표, 과정지표, 결과지표로 평가한다. 다. 환자의 입장에서 진료의 전 과정을 추적조사 할 수 있도록 구성되어 있다. 라. 의료기관 평가 인증은 상급종합병원 지정의 필수요건이다. 마. 인증의 유효기간은 3년, 조건부인증은 1년이다.", "opts": ["가, 나, 다, 라", "나, 다, 라, 마", "가, 나, 라, 마", "가, 나, 다, 마 인증의 유효기간은 4년, 조건부인증의 경우에는 1년이다."], "ans": 1}, {"id": "10_2", "s": 10, "q": 2, "text": "환자확인 방법으로 틀린 것은? 가. 환자 확인과정에 환자를 참여시키기 위해 “성함이 어떻게 되세요?”라고 개방형 질문을 한다. 나. 환자이름과 등록번호를 모두 확인한다. 다. 입원환자는 병실번호와 침대 위치로 확인한다. 라. 외래환자는 이름과 생년월일로 확인한다. 마. 환자가 의사표현이 어려운 경우, 개방형 질문으로 확인하는 절차는 생략한다. 바. 환자확인이 필요한 시점은 입원 시, 외래진료 전, 의약품 투여 전, 혈액제제 투 여 전, 검사 시행 전, 수술, 시술 및 처치 전이다. 사. 투약/수혈/채혈/이송 전 PDA를 활용하여 환자확인을 시행하는 경우에도 환자 이름을 개방형으로 확인해야 한다.", "opts": ["가, 나", "다, 라", "마, 바", "가, 사 ※ 환자확인 방법 가. 환자 확인과정에 환자를 참여시키기 위해 “성함이 어떻게 되세요?”라고 개방형 질문을 한 다."], "ans": 2}, {"id": "10_3", "s": 10, "q": 3, "text": "원내 낙상관리절차에 대한 아래의 내용 중 틀린 것은?", "opts": ["직원은 낙상위험평가, 낙상예방활동, 낙상 발생 시 대처 및 보고방법 등에 대한 교육을 받는다.", "입원환자의 낙상 초기평가는 입원 시 시행한다.", "응급실, 중환자실 입원 환자, 외래환자는 낙상고위험으로 분류한다.", "낙상위험 재평가는 주 1회 이상 실시하며 전신마취 수술 후 병실 입실 시, 중환 자실에서 병동으로 전동 후, 낙상 발생 후 등 환자상태 변화 시 수행한다."], "ans": 3}, {"id": "10_4", "s": 10, "q": 4, "text": "낙상고위험 환자를 위한 낙상예방활동을 모두 고르면? 가. 낙상고위험 환자용 ID band를 착용하게 한다. 나. HIS 환자정보에 [낙상]을 표시하여 직원 간 정보를 공유한다. 다. 환자, 보호자에게 낙상예방을 위한 주의사항(보호자 동반 거동, 침대 난간 올리 기 등)을 교육한다. 라. 15세 이상 환자에게는 낙상예방에 도움이 되는 근력강화운동을 격려한다. 마. 급성 뇌졸중 등 기동성에 영향을 미치는 질환으로 입원 시 재활의학과에 의뢰할 수 있다. 바. 기동성에 직접적으로 영향을 미치는 수술 시 물리치료를 처방할 수 있다. 사. 오후 9시 이후 이뇨제 처방 및 투여를 지양한다.", "opts": ["가, 나", "가, 나, 다", "가, 나, 다, 라", "이상 모두"], "ans": 4}, {"id": "10_5", "s": 10, "q": 5, "text": "반드시 손위생을 해야 하는 상황이 아닌 것은?", "opts": ["혈압 측정 전", "유치도뇨관 삽입 전", "주사수액을 만진 후 소변백을 비우기 전", "환자용 보조테이블을 만진 후 주사수액을 만진 후 소변백을 비우기 전은 연속동작으로 청결한 구역에서 오염구역으로의 이 동이므로 손위생 필요 없음."], "ans": 3}, {"id": "10_6", "s": 10, "q": 6, "text": "올바른 손위생 방법이 아닌 것은?", "opts": ["장갑 착용 전이나 후에도 손위생을 시행한다.", "눈에 보이는 오염이 있을 때에는 알코올 핸드럽을 사용한다.", "알콜 손소독제를 사용하는 경우 20~30초 동안 시행한다.", "물로 하는 경우 40~60초 동안 시행한다."], "ans": 2}, {"id": "10_7", "s": 10, "q": 7, "text": "주사침 찔림 예방활동이 아닌 것은?", "opts": ["사용한 주사바늘은 사용 직후 바로 주사침 통에 버린다.", "사용한 주사바늘은 다시 뚜껑(Recapping)을 씌우지 않는다.", "손상성 폐기물통(주사침 통)은 90% 차면 폐기한다.", "가능한 진공채혈 시스템을 이용하여 채혈한다."], "ans": 3}, {"id": "10_8", "s": 10, "q": 8, "text": "직원안전 관련 사항 중 틀린 것은?", "opts": ["주사침찔림 사고 발생 시 연락하는 곳은 감염관리팀이다.", "주말에 감염노출사고 발생 시 응급실 진료를 먼저 본 후, 주중 안전보건관리팀에 연락한다.", "유해위험물질 노출 시 연락하는 곳은 안전보건관리팀이다.", "유해위험물질 노출 시 부서의 관리감독자(부서장)은 노출보고서를 작성한다."], "ans": 1}, {"id": "10_9", "s": 10, "q": 9, "text": "화재예방 점검사항에 틀린 것은?", "opts": ["유도등/안내표지판/대피로/비상탈출구/비상전원 감지스위치의 정상 작동을 확인한다.", "대피로에 린넨, 쓰레기통, 의료기기, 이송카 등 물건이 적재되지 않도록 한다.", "소화기, 소화전이 예방점검 주기에 따라 관리되고 있는지 확인한다.", "화재 시 신속하게 대피할 수 있도록 방화문은 항상 열어두어야 한다."], "ans": 4}, {"id": "10_10", "s": 10, "q": 10, "text": "화기 단속 책임자의 업무가 아닌 것은?", "opts": ["소속 직원의 소방교육 및 금연에 관한 사항을 관리한다.", "실내 및 책임구역 내의 화기단속(전열기구 등)에 관한 사항을 관리한다.", "실내 및 책임구역 내의 소방시설(비상조명등, 소화기 등)의 유지관리를 한다.", "최종퇴실자 점검기록부를 매일 작성한다."], "ans": 4}, {"id": "10_11", "s": 10, "q": 11, "text": "금연 관련 사항 중 틀린 것은?", "opts": ["장례식장 앞 흡연구역을 제외한 병원 내 전 지역은 금연구역이다.", "흡연자 발견 시 비상계획과로 신고한다.", "교직원이 금연구역에서 흡연을 한 경우 인사규정에 의한 징계대상이 될 수 있다.", "유관기관(종로구청) 합동단속 중 흡연 적발 시 과태료(10만원)를 부과한다."], "ans": 2}, {"id": "10_12", "s": 10, "q": 12, "text": "화재 시 환자유형별 대피 계획 및 환자 후송방법으로 틀린 것은?", "opts": ["A급 : 중환자, 거동불능환자, 수술환자 등으로 의료진이 동반하여 대피한다.", "B급 : 경환자로 직원 또는 보호자 도움으로 대피한다.", "C급 : 자력으로 대피 가능한 환자, 보호자로 질서를 유지하며 대피한다.", "A급 환자는 엘리베이터를 이용하여 아래층으로 신속히 대피한다."], "ans": 4}, {"id": "10_13", "s": 10, "q": 13, "text": "환자안전 보고체계 관련 틀린 것은?", "opts": ["환자안전사건은 적신호사건, 위해사건, 환자안전제안(근접오류)로 나뉜다.", "적신호사건은 직속 상급자에게 즉시 의무보고하고, 보고서는 2일 이내 제출한다.", "위해사건은 직속 상급자에게 즉시 의무보고하고, 보고서는 7일 이내 제출한다.", "환자안전사건 보고서는 환자안전사건을 일으킨 당사자만 작성할 수 있다."], "ans": 4}, {"id": "10_14", "s": 10, "q": 14, "text": "적신호사건이 아닌 것은? 가. 예상치 못한 사망, 영구적 기능 손상 나. 입원환자의 자살 다. 수술/시술 후 이물질 잔류 라. 다른 사람 또는 다른 신체부위에 시행된 수술 마. 전기수술기에 의한 화상 바. 낙상으로 인한 골절 사. 유괴, 납치 아. 혈액형 부적합에 의한 용혈성 수혈 반응", "opts": ["가, 나", "다, 라", "마, 바", "사, 아 전기수술기에 의한 화상, 낙상으로 인한 골절은 적신호사건이 아닌 위해사건에 해당한다."], "ans": 3}, {"id": "10_15", "s": 10, "q": 15, "text": "위해사건이 아닌 것은?", "opts": ["A환자에게 줄 소화제를 B환자에게 투약했다.", "오른쪽 팔에 X-ray 촬영해야 하는 환자에게 왼쪽 팔 촬영으로 처방을 냈다.", "검사실에 접수 예정인 환자의 혈액검체를 분실하였다.", "Infusion Pump로 주입되는 수액이 과량 투여되었다."], "ans": 2}, {"id": "10_16", "s": 10, "q": 16, "text": "서울대병원이 규정한 환자의 권리가 아닌 것은?", "opts": ["안전한 의료환경에서 의료서비스를 제공받을 권리", "알 권리 및 자기결정 권리", "비밀을 보호받을 권리", "존엄 및 평등의 권리"], "ans": 4}, {"id": "10_17", "s": 10, "q": 17, "text": "서울대병원이 규정한 환자의 의무가 아닌 것은?", "opts": ["의료인에 대한 신뢰·존중 의무", "부정한 방법으로 진료 받지 않을 의무", "공공질서 준수의 의무", "진료정보 제공의 의무"], "ans": 4}, {"id": "10_18", "s": 10, "q": 18, "text": "환자 사생활 및 의료정보 보호에 관해 틀린 사항은?", "opts": ["외래진료실 내에 다른 환자가 같이 있지 않도록 한다.", "입원수속 시 사생활 보호(입원사실 비공개) 여부를 확인한다.", "간호사실 내 의료진간 공유할 현황판(환자이름, 병명, 등록번호) 게시는 허용한다.", "환자가 자신의 정보를 진료목적 이외 용도로 사용하기를 원하지 않는다면, 진료 정보 열람 및 사본발급 제한 신청서를 작성하여 정보화실에 제출해야 한다."], "ans": 3}, {"id": "10_19", "s": 10, "q": 19, "text": "원내 지침에 정의된 취약환자가 아닌 경우는?", "opts": ["노인 환자", "의사소통이 어려운 환자(외국인, 시각/청각/언어 장애인)", "유괴 가능성이 있는 신생아와 소아, 청소년 환자", "학대(아동, 노인, 장애인 학대 등) 및 폭력(성폭력, 가정폭력 등) 피해자 원내 지침에 정의된 취약환자"], "ans": 1}, {"id": "10_20", "s": 10, "q": 20, "text": "신생아, 영유아 유괴 예방 관련 틀린 사항은?", "opts": ["입원 시 보호자에게 인식표를 제공한다.", "유괴 발생 시 총무과(원내 T. 0112)에 신고한다.", "환자 이동 시 반드시 보호자가 동행한다.", "환자 이동 시 지정된 유니폼과 신분증을 착용한 허가된 직원만 동행 가능하다."], "ans": 2}, {"id": "10_21", "s": 10, "q": 21, "text": "다음은 폭언, 폭행 등의 문제상황에 대한 설명이다. 틀린 것은?", "opts": ["폭언, 폭행 시 비상계획과(원내 T. 1120)에 신고한다.", "부서장 및 동료에게 도움을 요청하고, 증거(녹취, 녹화, 증인)를 확보한다.", "부서장은 진단서에 근거하여 업무 교체 및 휴식을 지원한다.", "법무 담당에게 증거를 제출하고 고발, 고소 등의 조치를 취할 수 있다."], "ans": 3}, {"id": "10_22", "s": 10, "q": 22, "text": "장애환자의 편의를 위한 지원체계로 틀린 것은?", "opts": ["장애인 전용 주차구역을 설치하고, 출입구의 높이 차이를 제거한다.", "요청 시 안전요원 동반 지원서비스를 제공한다.", "보행이 어려운 환자는 내원 시 꼭 휠체어를 가져오도록 한다.", "안과 외래에 저시력자용 문자 확대기를 비치한다."], "ans": 3}, {"id": "10_23", "s": 10, "q": 23, "text": "불만 및 고충처리 절차에 대해 틀린 것은?", "opts": ["불만·고충사항 접수는 고객의 소리함, 병원 홈페이지, 모바일 등을 통해 가능하다.", "환자가 직접 본관 2층에 위치한 고객상담실에 방문하기도 한다.", "고객의 소리가 접수되면 CS조직문화팀은 내용을 확인하고, 해당 부서장은 신속하 고 정확한 답변을 한다.", "고객의 소리에 대한 답변은 반드시 서면으로 회신한다."], "ans": 4}, {"id": "10_24", "s": 10, "q": 24, "text": "개인 직무기술서 및 부서별 업무범위표에 관한 설명 중 틀린 것은?", "opts": ["직무기술서는 해당 직원의 자격요건, 교육현황, 업무 관련 요구교육, 직무의 세부 내용과 직무량, 정기적인 평가항목 등을 포함한다.", "부서장은 소속 직원의 변동 또는 직무 상의 변동이 있을 경우 즉시 직무기술서를 수정하도록 안내하고, 변동 사항이 없을 경우 3년마다 직무기술서를 검토한다.", "업무범위표는 업무범위, 업무대상, 주요자원(공간, 장비, 인력), 필요 인력의 자격 요건 및 요구교육, 업무절차 등을 포함한다.", "부서장은 업무범위표에 변동이 있을 경우 즉시 수정하여 관리한다."], "ans": 2}, {"id": "10_25", "s": 10, "q": 25, "text": "인증 필수교육 및 특성화교육에 대한 설명으로 틀린 것은?", "opts": ["인증 필수교육은 전직원이 이수해야 하는 교육이다", "인증 필수교육에는 심폐소생술, 환자의 권리와 의무, 질 향상과 환자안전, 감염관 리, 폭력예방, 소방안전, 정보보호/보안 교육이 있다.", "인증 필수교육 중 심폐소생술은 2년에 1회, 나머지 교육은 입사 시 1회 이수한다.", "인증 특성화교육은 항암화학요법, 의약품관리, 진정관리, 지표관리 등 특수한 직 무를 수행하는 직원이 이수해야 하는 교육이다."], "ans": 3}, {"id": "10_26", "s": 10, "q": 26, "text": "의료정보/의무기록 관리에 대해 틀린 것은?", "opts": ["의료진은 사전 승인된 환자의 의무기록만 접근 가능하다.", "접근권한이 없는 환자의 기록에 접근 시, 사유 기록 후 HIS 비밀번호를 재입력한다.", "의무기록 사본 발급을 원하는 입원환자는 의사와 상담 후 신청서를 작성한다.", "환자의 직계가족이 의무기록 사본을 요청할 시 환자의 신분증 사본, 신청자의 신 분증, 친족관계 증명서, 환자가 자필 서명한 동의서(만 14세 미만인 경우 제외)가 필요하다."], "ans": 4}, {"id": "10_27", "s": 10, "q": 27, "text": "의료기기 안전관리 관련 틀린 것은?", "opts": ["의공학과는 연 1회(단, defibrilator, 인공심폐기는 연 2회) 의료기기 정기점검을 시 행한다.", "정기점검 후, 고위험/주요/일반 의료기기는 <예방점검 필> 스티커를 부착한다.", "의료기기 일상점검은 모든 의료기기를 대상으로 매일 점검하는 것이 원칙이나, 매일 사용하지 않는 의료기기는 사용부서에서 월 1회 이상으로 점검주기를 정할 수 있다.", "의료기기 사용자 교육은 신규장비 도입 시 또는 사용부서 요청 시 의공학과에서 시행한다."], "ans": 2}, {"id": "10_28", "s": 10, "q": 28, "text": "원내 감염 예방을 위한 병문안객 관리 내용으로 틀린 것은?", "opts": ["입원환자 병문안 시간은 평일 오후 6~8시, 휴일 오전 10~12시/오후 6~8시이다.", "감기나 인플루엔자 등 호흡기 질환이 있는 방문객은 병문안을 제한한다.", "환자별 병문안객 기록지는 필요 시 작성하고, 보관기간은 입원 후 30일간이다.", "입원환자 및 보호자 1인(단, 어린이병원은 필요시 2인까지 허용)에 한해 출입 바 코드 인식 후 병동 출입이 가능하다."], "ans": 3}, {"id": "10_29", "s": 10, "q": 29, "text": "의료폐기물 관리 관련 맞는 것은?", "opts": ["의료폐기물 전용용기를 이용하고, 폐기기한 연월일을 기록한다.", "봉투형 용기는 용량의 90% 미만으로 적재하고 폐기한다.", "격리 의료폐기물 전용용기의 도형색상은 빨간색, 위해/일반 의료폐기물 전용용기 의 도형색상은 노란색이다.", "손상성 폐기물통(주사침 통)의 사용기간은 2주 이내다."], "ans": 3}, {"id": "10_30", "s": 10, "q": 30, "text": "의료기구 세척, 소독, 멸균 관리 관련 틀린 것은?", "opts": ["사용 후 소독/멸균 예정 기구는 처치실의 싱크대에 따로 모아 보관한다.", "사용한 세트 등을 세척할 때 직원은 보호구(방수가운, shield 마스크, 장갑 등)를 착용한다.", "소독/멸균물품, 청결물품은 재오염을 예방하기 위해 청결한 장소의 물품장 내에 보관한다.", "멸균물품은 사용 전에 유효기간 및 파손, 개봉여부를 확인하고, 유효기간이 가까 운 물품을 앞에 배치하여 먼저 사용한다."], "ans": 1}, {"id": "10_31", "s": 10, "q": 31, "text": "세탁물 관리 관련 틀린 것은?", "opts": ["오염세탁물 수집 장소는 다른 시설과 분리된 별도 공간이어야 하며, 공간 분리가 불 가한 경우는 오염물실(비소독물실) 등에 4면이 막힌 수집장을 설치하여 수집한다.", "병동, 수술장, 시술장, 진료실 등 환자진료 장소에서 발생한 세탁물과 병원 직원 이 사용한 세탁물은 모두 오염세탁물로 간주한다.", "오염세탁물 중 담요는 녹색 방수천 햄퍼에, 담요 외 세탁물은 흰색 천 햄퍼에 구 분하여 수집한다.", "세탁물이 혈액, 분비물 등으로 젖은 경우 1차로 비닐백에 넣어 묶은 다음 햄퍼에 담는다."], "ans": 3}, {"id": "10_32", "s": 10, "q": 32, "text": "유해위험물질 관리 관련 틀린 것은?", "opts": ["지정된 장소에 별도 보관하고 안전보건표지를 부착한다.", "분주하여 사용하는 경우 분주 용기에는 물질안전보건 스티커가 없어도 된다.", "유해위험물질을 취급하는 부서의 관리자는 새로운 신규 물질을 사용하고자 할 경 우 [유해위험(화학)물질 등록 신청서]를 이용하여 안전보건관리팀에 통보한다.", "유해위험물질 취급장소 가까이 Spill kit와 보호구함을 비치한다."], "ans": 2}, {"id": "10_33", "s": 10, "q": 33, "text": "유해위험물질 노출 관련 틀린 것은?", "opts": ["눈에 들어갔을 때는 하던 행동을 멈추고 즉시 의사의 진찰을 받는다.", "취급장소 내 세면대/싱크대 수전 옆에 ‘눈 씻는 장치’ 표지를 부착한다.", "피부 접촉 시 오염된 피복, 신발 제거 후 15분 이상 다량의 비누와 물로 씻는다.", "노출 시 유해위험물질 노출보고서를 작성한다."], "ans": 1}, {"id": "10_34", "s": 10, "q": 34, "text": "정확한 의사소통을 위한 구두처방 제한 관련 틀린 것은?", "opts": ["구두처방은 심폐소생술(CPR) 및 수술/무균시술과 같은 응급상황에서만 허용된다.", "응급상황이라 해도 항암제, 수혈 오더는 구두처방이 허용되지 않는다.", "의사가 구두처방을 하면 간호사는 내용을 메모 및 재확인(Read-back)하여, 의사가 오더 정확성을 확인할 수 있도록 한다.", "의사는 구두처방 후 적어도 4시간 이내에 HIS에 서면오더를 입력해야 한다."], "ans": 4}, {"id": "10_35", "s": 10, "q": 35, "text": "심폐소생술(CPR) 관리 관련 틀린 것은?", "opts": ["CPR 상황이 발생하면, 즉시 원내 T.3000으로 전화해 CPR팀을 호출한다.", "제세동기는 3~4분 이내 사용가능해야 하고, 충전 및 기록지 출력 상태는 매일 점 검한다.", "Emergency Cart/Kit에는 CPR에 필요한 물품, 의약품이 구비되어 있다.", "Emergency Cart/Kit의 응급약품은 매일 확인하고 봉인 시 자물쇠 시리얼 번호를 점검표에 기록한다."], "ans": 4}, {"id": "10_36", "s": 10, "q": 36, "text": "의약품 관리 관련 틀린 것은?", "opts": ["모든 약물에는 약물명, 유효기간, 필요 시 경고문을 라벨링한다.", "약물보관상태 감사는 약제부에서 분기마다 시행한다.", "의약품 보관 냉장고의 냉장온도(2~8도)를 매일 점검하고 기록한다.", "마약은 철제 이중잠금장치 마약장에 보관하되, 사용 후 잔량반납예정인 마약은 일반약과 같이 보관한다."], "ans": 4}, {"id": "10_37", "s": 10, "q": 37, "text": "고위험의약품 관리 관련 틀린 것은?", "opts": ["고위험의약품으로 항암제, 고농도 전해질, 헤파린 주사제, 인슐린 바이알 등이 있 다.", "고농도 전해질은 다른 약물과 분리하여 단독 보관하고, 보관용기에 ‘고위험의약 품’ 표시 및 “반드시 희석 후 사용”이라고 라벨링한다.", "척수강 내 투여 항암제는 운반 시 단독 운반한다.", "척수강 내 투여 항암제는 투여 직전에 반드시 의사 2인이 함께 확인한다."], "ans": 4}, {"id": "10_38", "s": 10, "q": 38, "text": "원내 격리 Sign이다. 잘못 연결된 것은?", "opts": ["공기감염", "혈액감염", "접촉감염 ※ 원내 격리 Sign", "표준격리"], "ans": 4}, {"id": "10_39", "s": 10, "q": 39, "text": "동의서 관리 관련 틀린 것은?", "opts": ["HIS 내 전자동의서 표준 양식을 이용한다.", "수술/시술/검사/진정 동의서는 매 시행 시마다 동의서를 작성한다.", "환자가 서명을 할 수 없어 동의권자(보호자 등)가 서명을 하는 경우, 그 사유를 반드시 입력한다.", "모든 동의서는 진료행위가 끝나기 전까지 작성을 완료한다."], "ans": 4}, {"id": "10_40", "s": 10, "q": 40, "text": "소화기 사용방법 중 틀린 것은?", "opts": ["손잡이를 잡고 불 쪽으로 접근한다.", "안전핀을 뽑는다.", "호스는 불을 향하고 손잡이를 움켜쥔다.", "불길 중심부에서부터 골고루 약제를 뿌린다."], "ans": 4}, {"id": "10_41", "s": 10, "q": 41, "text": "로비나 식당 등의 공용공간에서 심폐소생술(CPR) 발생 시 대처절차이다. 틀린 것 은?", "opts": ["심정지가 확인되면 즉시 원내 T.3000으로 전화해 CPR팀을 호출하고, 주변에 있는 AED(자동제세동기)를 가져다 줄 것을 요청한다.", "가이드라인에 따라 흉부압박 : 인공호흡을 시행한다.", "AED(자동제세동기)가 도착하면 전원을 켜고 안내 멘트에 따라 패드 부착, 리듬 측정, (필요시)제세동 등을 시행한다.", "제세동 1회 시행 후 환자 의식이 돌아오는지 확인하며 CPR팀을 기다린다."], "ans": 4}, {"id": "10_42", "s": 10, "q": 42, "text": "‘환자안전법’의 내용으로 틀린 것은?", "opts": ["국가는 5년마다 환자안전활동 활성화를 위한 종합계획을 수립하고 시행한다.", "병원은 QPS센터장을 위원장으로 하는 환자안전위원회를 설치한다.", "환자안전사고 발생 시 의료인, 환자 누구나 ‘환자안전보고학습시스템’에 자율보고 할 수 있다.", "국가는 자율보고 된 환자안전사고가 환자안전에 중대한 위해가 우려되는 경우, 전국 병원에 ‘환자안전 주의경보’를 발령해야 한다."], "ans": 2}, {"id": "10_43", "s": 10, "q": 43, "text": "안전한 수혈 절차에 대한 설명으로 틀린 것은?", "opts": ["수혈 전 수혈동의서 작성 여부를 확인하고 활력징후를 측정한다.", "수혈 시작 전 의료인 2인이 ID band와 혈액백의 바코드를 스캔하여 혈액을 확인하고 수혈을 시작한다.", "수혈 시작 후 15분 이내에 활력징후를 측정하고 이상 유무를 확인 후 기록한다.", "수혈 중 이상반응이 의심되면 수혈을 모두 마친 후 의사와 상의한다."], "ans": 4}, {"id": "10_44", "s": 10, "q": 44, "text": "의료분쟁 발생 시 진료비 감면 절차에 대한 설명으로 틀린 것은?", "opts": ["병원의 명백한 귀책 사유가 있을 때, 환자의 민원으로 인한 보상일 때 모두 진료 비 감면 대상에 해당된다.", "병원측의 과실로 진료비 감면이 필요한 경우 HIS 각 직종별 메인화면 left bar에 위치한 문제사건 통합보고체계 [사건보고] 아이콘을 통하여 ‘의료분쟁 조정/진료 비 감면신청’을 한다.", "진료비 감면금액이 100만원 초과인 경우 법무팀에서 의료조정위원회를 개최하여 감면 여부를 결정한다.", "환자안전사건인 경우 문제사건 통합보고체계 [사건보고]로 환자안전보고를 갈음할 수 있다."], "ans": 1}, {"id": "10_45", "s": 10, "q": 45, "text": "2020년 개정된 환자안전법은 환자안전사고의 보고에 강화된 기준을 적용하고 있 다. 다음 중 2021년 1월 30일부터 시행된 중대한 환자안전사고 의무보고 시기에 대한 내용 중 틀린 것은?", "opts": ["다른 환자나 부위를 수술한 경우 발생한 시점으로부터 지체 없이 보건복지부 장 관에게 보고한다.", "진료 기록과 다른 의약품, 다른 용량, 다른 경로로 투여한 사고가 발생한 시점으 로부터 지체 없이 보건복지부 장관에게 보고한다.", "설명하고 동의 받은 내용과 다른 내용의 수술, 수혈, 전신마취로 인한 사고가 발 생하여 환자가 의식불명이 되었다면 의식불명 상태가 된 1개월째 되는 날로부터 지체 없이 보건복지부 장관에게 보고한다.", "의료기관 내 발생한 신체적 폭력으로 인해 환자가 장애 판정을 받은 경우 지체 없이 보건복지부 장관에게 보고한다."], "ans": 2}, {"id": "11_1", "s": 11, "q": 1, "text": "산업안전보건법의 목적에 해당되지 않는 것은?", "opts": ["산업안전보건기준의 확립", "산업재해의 예방과 쾌적한 작업환경 조성", "산업안전보건에 관한 정책의 수립 및 실시", "근로자의 안전과 보건유지·증진 산업안전보건법 제 1조(목적) 이 법은 산업안전·보건에 관한 기준을 확립하고 그 책임의 소재"], "ans": 3}, {"id": "11_2", "s": 11, "q": 2, "text": "다음 중 직원의 산업재해 예방을 위한 근로자의 의무에 대한 설명으로 틀린 것은?", "opts": ["근로자는 사업주가 실시하는 산업재해 예방을 위한 기준을 준수할 의무가 있다.", "근로자의 정기 안전보건교육 시간은 매 반기 12시간 이상 실시해야 한다.", "근로자가 안전보건교육 및 재해 예방 의무를 위반하더라도 근로자에게는 과태료 가 부과되지 않는다.", "근로자는 관계 공무원이나 안전보건공단 등이 실시하는 산업재해 예방 조치에 따 라야 한다."], "ans": 3}, {"id": "11_3", "s": 11, "q": 3, "text": "안전보건관리체계 중 경영조직에서 생산과 관련되는 해당 업무와 소속 직원을 직접 지휘·감독하는 부서의 장이나 그 직위를 담당하는 자로 지정하여야 하는 직위에 해 당하는 것은?", "opts": ["안전관리자", "보건관리자", "관리감독자", "안전보건관리책임자 산업안전보건법 제16조(관리감독자) 관리감독자(경영조직에서 생산과 관련되는 업무와 그 소 속 직원을 직접 지휘·감독하는 부서의 장 또는 그 직위를 담당하는자를 말한다)"], "ans": 3}, {"id": "11_4", "s": 11, "q": 4, "text": "근로자가 업무에 관계되는 건설물, 설비, 원재료, 가스, 증기, 분진 등에 의하거나 작 업 그 밖의 업무에 기인하여 사망 또는 부상하거나 질병에 이환되는 것은?", "opts": ["중대재해", "산업재해", "무재해", "보건재해 산업안전보건법 제2조(정의) \"산업재해\"란 노무를 제공하는 사람이 업무에 관계되는 건설물·설"], "ans": 2}, {"id": "11_5", "s": 11, "q": 5, "text": "산업재해조사의 목적에 해당되지 않는 것은?", "opts": ["동종재해 재발방지", "원인규명", "예방 자료 수집", "책임자 처벌"], "ans": 4}, {"id": "11_6", "s": 11, "q": 6, "text": "관리감독자의 업무에 대한 설명으로 틀린 것은?", "opts": ["안전보건관리 규정의 작성 및 변경에 관한 사항", "위험성평가 시 유해·위험요인 파악 및 개선조치의 시행에 대한 참여", "해당 작업장에서 발생한 산업재해에 관한 보고 및 이에 대한 응급조치", "소속된 근로자의 작업복·보호구 및 방호장치의 점검 그 사용에 관한 교육"], "ans": 1}, {"id": "11_7", "s": 11, "q": 7, "text": "안전교육의 목적을 설명한 것 중 잘못 말한 것은?", "opts": ["재해발생에 필요한 요소들을 교육하여 재해방지를 하기 위함", "생산성이나 품질의 향상에 기여하는 데 필요하기 때문", "작업자에게 안정감을 부여하고 기업에 대한 신뢰감을 부여하기 위함", "외부에 안전교육 실시를 PR하기 위하여"], "ans": 4}, {"id": "11_8", "s": 11, "q": 8, "text": "우리병원에서 실시하지 않는 안전보건교육은?", "opts": ["채용 시 안전보건교육", "근로자 정기안전보건교육", "관리감독자 정기안전보건교육", "건설업 기초안전보건교육"], "ans": 4}, {"id": "11_9", "s": 11, "q": 9, "text": "관리감독자의 정기교육 교육시간은?", "opts": ["3시간/분기 이상", "8시간/년 이상", "16시간/년 이상", "32시간/년 이상 산업안전보건법 시행규칙 제26조(교육시간 및 교육내용)"], "ans": 3}, {"id": "11_10", "s": 11, "q": 10, "text": "감전으로 인한 부상과 인공호흡에 관한 응급치료 중 옳다고 판단되는 것은?", "opts": ["심장이 정지상태이며, 인공호흡을 해야 한다.", "음료수를 준다.", "물을 준다.", "인공호흡을 하면 안 된다."], "ans": 1}, {"id": "11_11", "s": 11, "q": 11, "text": "건강장해의 근원적 예방대책이 아닌 것은?", "opts": ["작업방법을 무해화한다.", "보호구의 사용, 작업시간의 단축 등을 강구한다.", "환경을 개선하고 유해요인을 배제한다.", "작업방법을 개선하고 노동부담을 경감한다."], "ans": 2}, {"id": "11_12", "s": 11, "q": 12, "text": "TBM(Tool Box Meeting)에 관한 설명으로 틀린 것은?", "opts": ["TBM(Tool Box Meeting)이란 재해를 방지하기 위해 현장에서 작업의 상황에 맞도 록 실시하는 위험예지활동으로, ‘즉시 적응법’이라고도 한다.", "TBM의 목적은 작업계획 및 지시사항을 철저하게 지키기 위함이다.", "통상 작업이 끝난 후 약 1시간동안 시행한다", "작업 전 위험요인을 발굴하므로 문제 해결에 대한 책임감이 향상된다."], "ans": 3}, {"id": "11_13", "s": 11, "q": 13, "text": "화학물질 또는 화학물질을 함유한 제제의 명칭, 구성성분의 명칭 및 함유량, 안전/ 보건상의 취급주의사항, 건강 유해성 및 물리적 위험성 등을 포함하는 것은?", "opts": ["물질안전보건자료(MSDS)", "화학물질 정보자료", "안전물질자료", "안전보건관리규정 산업안전보건법 제110조(물질안전보건자료의 작성 및 제출)"], "ans": 1}, {"id": "11_14", "s": 11, "q": 14, "text": "화학적인자, 물리적인자, 분진 등 유해인자에 노출되는 근로자가 있는 작업장의 유 해인자를 측정하는 것은?", "opts": ["유해요인조사", "작업환경측정", "화학물질 조사", "위험성평가"], "ans": 2}, {"id": "11_15", "s": 11, "q": 15, "text": "근골격계질환 예방대책으로 옳지 않은 것은?", "opts": ["단순 반복 작업은 기계를 사용한다.", "작업순환(Job Rotation)을 실시한다.", "작업방법과 작업공간을 인간공학적으로 설계한다.", "작업속도와 작업강도를 점진적으로 강화한다."], "ans": 4}, {"id": "11_16", "s": 11, "q": 16, "text": "보호구가 갖추어야 할 구비요건 중 거리가 먼 것은?", "opts": ["착용이 간편할 것", "작업에 방해가 되지 않을 것", "유해·위험요소에 대한 방호가 완전할 것", "가격이 저렴할 것 보호구의 구비요건 가. 착용하여 작업하기 쉬울 것"], "ans": 4}, {"id": "11_17", "s": 11, "q": 17, "text": "유기화합물을 사용하는 작업환경에서 사용하여야 하는 안전보호구는?", "opts": ["방진마스크", "방독마스크", "안전그네", "귀마개 가. 방진마스크 : 분진이 심하게 발생하는 작업"], "ans": 2}, {"id": "11_18", "s": 11, "q": 18, "text": "유기용제에서 발생한 독성을 제거하기 위한 방독마스크이 흡수제로 옳은 것은?", "opts": ["호프칼라이트", "큐프라마이트", "활성탄", "소다라임 가. 호프칼라이트 : 일산화탄소용"], "ans": 3}, {"id": "11_19", "s": 11, "q": 19, "text": "중량물 취급시 근골격계 질환 예방을 위한 수칙으로 틀린 것은?", "opts": ["무릎을 굽히고 허리를 펴서 다리 힘을 이용해 들어 올린다.", "혼자 하기 힘든 무게는 동료와 함께 작업한다.", "고용노동부 가이드라인에 따른 중량물 취급 작업의 기준 무게는 5kg이다.", "물건을 몸에서 최대한 멀리 떨어뜨려 들어 올린다."], "ans": 4}, {"id": "11_20", "s": 11, "q": 20, "text": "도급사업에 있어서 사업주가 하여야 할 안전보건조치사항이 아닌 것은?", "opts": ["사업주간의 협의체 구성 및 운영", "작업장의 주1회 이상 점검", "수급인이 행하는 근로자의 안전보건교육에 대한 지도와 지원", "유해한 작업의 도급 산업안전보건법 제64조(도급에 따른 산업재해 예방조치) 제1항 도급인은 관계수급인 근로자 가 도급인의 사업장에서 작업을 하는 경우 다음 각 호의 사항을 이행하여야 한다."], "ans": 4}, {"id": "11_21", "s": 11, "q": 21, "text": "다음 중 중대재해처벌법에 대한 설명으로 올바르지 않은 것은?", "opts": ["중대재해처벌법에서 중대재해란 중대산업재해와 중대시민재해를 말한다.", "중대재해처벌법의 중대산업재해는 산업안전보건법의 산업재해를 전제로 한다.", "사업주 또는 경영책임자등에 대한 처벌 규정은 근로자를 포함한 종사자와 일반 시민의 생명과 신체를 보호하기 위한 최적의 수단이다.", "중대시민재해는 공중이용시설 또는 공중교통수단을 운영 하거나 위험한 원료 및 제조물을 취급하면서 안전ㆍ보건 확보 의무를 위반하여 인명사고가 발생한 경우 만을 대상으로 한다."], "ans": 3}, {"id": "11_22", "s": 11, "q": 22, "text": "다음 중 중대재해처벌법 상 중대산업재해에 해당하지 않은 것은?", "opts": ["사망자가 1명 이상 발생", "동일한 사고로 1년 이상 치료가 필요한 부상자가 1명 이상 발생", "동일한 사고로 6개월 이상 치료가 필요한 부상자가 2명 이상 발생", "동일한 유해요인으로 급성중독 등 대통령령으로 정하는 직업성 질병자가 1년 이 내에 3명 이상 발생 중대재해처벌법 제2조(정의) 2. “중대산업재해”란 「산업안전보건법」 제2조제1호에 따른 산업재해 중 다음 각 목의 어느 하나에 해당하는 결과를 야기한 재해를 말한다."], "ans": 2}, {"id": "11_23", "s": 11, "q": 23, "text": "다음 중 중대재해처벌법 상 중대시민재해에 해당하지 않은 것은?", "opts": ["사망자가 1명 이상 발생", "동일한 사고로 2개월 이상 치료가 필요한 부상자가 10명 이상 발생", "동일한 원인으로 3개월 이상 치료가 필요한 질병자가 10명 이상 발생", "동일한 원인으로 6개월 이상 치료가 필요한 질병자가 5명 이상 발생 중대재해처벌법 제2조(정의) 3. “중대시민재해”란 특정 원료 또는 제조물, 공중이용시설 또는 공중교통수단의 설계, 제조, 설치, 관리상의 결함을 원인으로 하여 발생한 재해로서 다음 각 목의 어느 하나에 해당하는"], "ans": 4}, {"id": "11_24", "s": 11, "q": 24, "text": "다음 중 중대재해처벌법상 안전 및 보건 확보 의무를 이행해야할 “경영책임자등” 에 해당되는 경우는?", "opts": ["중앙행정기관의 장", "「근로기준법」상의 근로자", "사업이 여러 차례의 도급에 따라 행하여지는 경우에는 각 단계의 수급인", "공무원 「근로기준법」상의 근로자와 사업이 여러 차례의 도급에 따라 행하여지는 경우에는 각 단계의 수급인은 종사자에 해당함. 공무원도 임금을 목적으로 근로를 제공하는 사람으로서 근로기준 법상 근로자로서 중대재해처벌법상 종사자에 해당하며, 중앙행정기관의 장 등 지위에 따라 경영책임자등이 될 수도 있지만 모든 공무원이 경영책임자등에 해당되지는 않음 중대재해처벌법 제2조(정의) 7. “종사자”란 다음 각 목의 어느 하나에 해당하는 자를 말한다."], "ans": 1}, {"id": "11_25", "s": 11, "q": 25, "text": "다음 중 중대재해처벌법 상 사업주와 경영책임자등의 안전 및 보건 확보의무에 해 당되지 않는 것은?", "opts": ["재해예방에 필요한 인력 및 예산 등 안전보건관리체계의 구축 및 그 이행에 관한 조치", "재해 발생 시 재발방지 대책의 수립 및 그 이행에 관한 조치", "중앙행정기관ㆍ지방자치단체가 관계 법령에 따라 개선, 시정 등을 명한 사항의 이행에 관한 조치", "안전ㆍ보건 관계 법령에 따른 의무이행에 불필요한 관리상의 조치 중대재해처벌법 제4조(사업주와 경영책임자등의 안전 및 보건 확보의무)"], "ans": 4}, {"id": "11_26", "s": 11, "q": 26, "text": "다음 중 중대재해처벌법 시행령 상 안전보건관리체계 구축 및 이행 조치를 위해 산업안전보건법에 따라 배치해야할 인력이 아닌 것은?", "opts": ["안전관리자", "소방관리자", "보건관리자", "산업보건의 중대재해처벌법 시행령 제4조(안전보건관리체계의 구축 및 이행 조치) 법 제4조제1항제1호에 따른 조치의 구체적인 사항은 다음 각 호와 같다."], "ans": 2}, {"id": "11_27", "s": 11, "q": 27, "text": "다음 중 중대재해처벌법령 상 중대산업재해에 해당할 수 있는 보건의료 종사자에 게 발생하는 직업성 질병이 아닌 것은?", "opts": ["코로나바이러스감염증", "B형 간염", "C형 간염", "후천성면역결핍증 중대재해처벌법 시행령 [별표1] 직업성질병"], "ans": 1}, {"id": "11_28", "s": 11, "q": 28, "text": "다음 중 중대재해처벌법 시행령 상 사업 또는 사업장에 중대산업재해가 발생하거 나 발생할 급박한 위험이 있을 경우를 대비하여 마련할 매뉴얼의 조치사항이 아닌 것은?", "opts": ["작업 중지, 근로자 대피 조치", "위험요인 보존 조치", "중대산업재해를 입은 사람에 대한 구호조치", "추가 피해방지를 위한 조치 중대재해처벌법 시행령 제4조(안전보건관리체계의 구축 및 이행 조치) 8. 사업 또는 사업장에 중대산업재해가 발생하거나 발생할 급박한 위험이 있을 경우를 대 비하여 다음 각 목의 조치에 관한 매뉴얼을 마련하고, 해당 매뉴얼에 따라 조치하는지"], "ans": 2}, {"id": "11_29", "s": 11, "q": 29, "text": "다음 중 안전보건관리체계의 구축 및 이행 조치 사항으로 사업 또는 사업장의 특 성에 따른 유해ㆍ위험요인을 확인하여 개선하는 업무절차를 마련하고, 해당 업무절 차에 따라 유해ㆍ위험요인의 확인 및 개선이 이루어지는지를 반기 1회 이상 점검한 것으로 간주될 수 있는 평가 제도는?", "opts": ["의료기관 인증평가", "의료질 평가", "위험성 평가", "공공기관 경영평가 중대재해처벌법 시행령 제4조(안전보건관리체계의 구축 및 이행 조치) 3. 사업 또는 사업장의 특성에 따른 유해ㆍ위험요인을 확인하여 개선하는 업무절차를 마련 하고, 해당 업무절차에 따라 유해ㆍ위험요인의 확인 및 개선이 이루어지는지를 반기 1"], "ans": 3}, {"id": "11_30", "s": 11, "q": 30, "text": "본원 안전ㆍ보건 경영방침의 목표가 아닌 것은?", "opts": ["안전을 최우선 가치로 한 안전∙보건 관리 체계 구축∙유지", "안전∙보건 관련 법규를 준수한 중대재해 발생 ZERO화", "안전 의식 확산을 통한 안전문화 조성", "병원 환자에게 최상의 안전∙보건 환경 제공"], "ans": 4}, {"id": "11_31", "s": 11, "q": 31, "text": "중대재해처벌법 적용대상이 되는 공중이용시설이 아닌 것은?", "opts": ["모든 지하역사", "철도역사의 시설 중 연면적 2천제곱미터 이상인 대합실", "「교육시설 등의 안전 및 유지관리 등에 관한 법률」 제2조제1호에 따른 교육시설", "「의료법」 제3조제2항의 의료기관 중 연면적 2천제곱미터 이상이거나 병상 수 100개 이상인 것 중대재해처벌법 제2조(정의) 4. “공중이용시설”이란 다음 각 목의 시설 중 시설의 규모나 면적 등을 고려하여 대통령령으 로 정하는 시설을 말한다. 다만, 「소상공인 보호 및 지원에 관한 법률」 제2조에 따른 소상공"], "ans": 3}, {"id": "11_32", "s": 11, "q": 32, "text": "중대산업재해 관련하여 안전보건 관리체계의 구축 및 관리상의 조치 확립에 해당 하지 않는 것은?", "opts": ["개정된 산업안전보건법령에 따른 안전보건활동 수준 점검", "컴플라이언스 활동 약화", "대표이사의 안전보건계획 수립", "안전보건 관련 명확한 상벌규정 정립 중대재해처벌법 시행령 제 4조(안전보건관리체계의 구축 및 이행 조치) 중대재해처벌법 시행령 제 5조(안전ㆍ보건 관계 법령에 따른 의무이행에 필요한 관리상의 조치)"], "ans": 2}, {"id": "11_33", "s": 11, "q": 33, "text": "재난 및 안전관리 기본법 상 다중이용시설 등의 위기상황 매뉴얼 작성•관리 및 훈 련에 관한 사항 중 올바른 것은?", "opts": ["다중이용시설 등의 소유자ㆍ관리자 또는 점유자는 대통령령으로 정하는 바에 따 라 위기상황에 대비한 매뉴얼을 작성ㆍ관리하지 않아도 된다.", "위기상황 매뉴얼을 작성ㆍ관리하는 관계인은 법 제34조의6제2항에 따라 매년 1 회 이상 위기상황 매뉴얼에 따른 훈련을 실시할 의무가 없다.", "지방자치단체의 장은 위기상황 매뉴얼의 작성ㆍ관리 및 훈련실태를 점검하거나 개선명령을 할 수 없다.", "위기상황 매뉴얼을 작성ㆍ관리하지 아니하거나 매뉴얼에 따라 훈련을 하지 아니 한 소유자ㆍ관리자 또는 점유자에게는 200만원 이하의 과태료를 부과한다."], "ans": 4}, {"id": "11_34", "s": 11, "q": 34, "text": "예비군 또는 민방위 훈련 참가시 직장보장에 관한 법률 내용 중 올바르지 않은 것 은?", "opts": ["직원이 예비군 또는 민방위 훈련 참가시 개인 휴무로 처리한다.", "직원을 민방위 교육 참가 이유로 불이익이 되는 처우를 하여서는 아니 된다.", "직원이 예비군 훈련 참가시 불리한 처우를 한 사람은 2년 이하 징역 또는 2천만 원 이하 벌금에 처한다.", "직원을 민방위 교육 참가를 이유로 불이익이 되는 처우를 행한 자는 1년 이하 징 역 또는 1천만원 이하 벌금이나 구류에 처한다."], "ans": 1}, {"id": "12_1", "s": 12, "q": 1, "text": "다음 중 용어의 정의로 옳은 것을 모두 고르시오. - 보 기 가. “공공보건의료\"란, 국가, 지방자치단체 및 보건의료기관이 지역·계층·분야에 관계 없이 국민의 보편적인 의료 이용을 보장하고 건강을 보호·증진하는 모든 활동을 말한다. 나. “공공보건의료사업”이란, 보건의료 공급이 원활하지 못한 지역 및 분야에 대한 의료 공급에 관한 사업 또는 보건의료 보장이 취약한 계층에 대한 의료 공급에 관한 사업 등을 말한다. 다. “공공보건의료기관”이란, 국가, 지방자치단체 또는 공공단체가 공공보건의료의 제공을 주요한 목적으로 하여 설립·운영하는 보건의료기관을 말한다. 라. “공공보건의료 전달체계”란, 국가 또는 지방자치단체가 공공보건의료서비스를 무상으로 제공하기 위하여 보건의료기관 간의 비용 분담 체계를 구축하는 것을 말한다.", "opts": ["가, 나", "나, 다", "가, 나, 다", "가, 다, 라 - “공공보건의료 전달체계”란, 국가 또는 지방자치단체가 공공보건의료서비스를 제공하기 위하"], "ans": 3}, {"id": "12_2", "s": 12, "q": 2, "text": "다음 중 공공보건의료에 관한 국가와 지방자치단체의 역할에 대한 설명으로 옳지 않은 것은?", "opts": ["국가와 지방자치단체는 공중보건 위기 상황에 한하여 공공보건의료사업을 추진할 수 있다.", "국가와 지방자치단체는 공공보건의료사업을 원활하게 추진하기 위하여 충분한 수의 공공보건의료 수행기관을 확보하여야 한다.", "국가와 지방자치단체는 공공보건의료기관이 양질의 의료서비스를 제공할 수 있도록 의료인의 확보에 필요한 시책을 시행할 수 있다.", "국가와 지방자치단체는 공공보건의료기관을 설치·운영하여 국민의 기본적인 보건 의료 수요를 형평성 있게 충족시킬 수 있도록 노력하여야 한다."], "ans": 1}, {"id": "12_3", "s": 12, "q": 3, "text": "다음 중 공공보건의료 기본계획 등에 대한 설명으로 옳은 것은?", "opts": ["보건복지부장관은 보건의료발전계획을 5년마다 수립하여야 한다.", "보건의료발전계획은 국회의 심의를 거쳐 확정한다.", "시·도지사는 공공보건의료 시행계획을 매년 행정안전부장관에게 제출하여야 한다.", "공공보건의료 기본계획의 수립은 보건의료발전계획과 연계할 필요가 없다."], "ans": 1}, {"id": "12_4", "s": 12, "q": 4, "text": "다음은 공공보건의료에 관한 법률 제4조의 내용이다. 빈칸에 들어갈 단어로 옳게 짝지어진 것을 고르시오. ④ - 보 기 - ○ 보건복지부장관은 국민에게 양질의 공공보건의료를 제공하기 위하여 심의를 거쳐 보건의료기본법에 따른 계획을 ㄷ ㄴ ㄱ 의 과 연계하여 공공보건의료 기본 마다 수립하여야 하고, 이를 기초로 매년 주요 시책 추진계획을 수립·시행하여야 한다.", "opts": ["ㄱ) 건강보험정책심의위원회 ㄴ) 국민건강보험종합계획 ㄷ) 3년", "ㄱ) 시·도공공보건의료위원회 ㄴ) 지역보건의료계획 ㄷ) 3년", "ㄱ) 보건의료정책심의위원회 ㄴ) 국민건강증진종합계획 ㄷ) 5년", "ㄱ) 공공보건의료정책심의위원회 ㄴ) 보건의료발전계획 ㄷ) 5년 - 보건복지부장관은 국민에게 양질의 공공보건의료를 제공하기 위하여 공공보건의료정책심의 위원회의 심의를 거쳐 보건의료기본법에 따른 보건의료발전계획과 연계하여 공공보건의료"], "ans": 4}, {"id": "12_5", "s": 12, "q": 5, "text": "다음 중 공공보건의료 기본계획에 포함되어야 하는 사항으로 옳은 것을 모두 고르 시오. ④ - 보 기 - 가. 공공보건의료 전달체계의 구축·관리 방안 나. 공공보건의료가 취약한 지역·계층·분야에 대한 지원 방안 다. 공중보건 위기 상황 시 대응 방안 라. 공공보건의료 통계 및 정보의 관리 방안", "opts": ["가, 나", "가, 나, 다", "가, 나, 라", "가, 나, 다, 라"], "ans": 4}, {"id": "12_6", "s": 12, "q": 6, "text": "다음 중 공공보건의료정책심의위원회에 대한 설명으로 옳은 것은?", "opts": ["공공보건의료에 관한 주요 시책을 심의하기 위하여 보건복지부장관 소속으로 공공보건의료정책심의위원회를 둔다.", "공공보건의료정책심의위원회는 위원장 1명을 포함한 20명 이내의 위원으로 구성 하되, 공무원인 위원이 전체 위원의 과반수 이상이 되도록 하여야 한다.", "공공보건의료정책심의위원회 위원장은 국무총리로 한다.", "공공보건의료정책심의위원회 위원은 대통령이 임명 또는 위촉한다."], "ans": 1}, {"id": "12_8", "s": 12, "q": 8, "text": "다음 중 공공보건의료기관에서 우선적으로 제공하여야 하는 사항과 거리가 먼 것은?", "opts": ["의료급여환자 등 취약계층에 대한 보건의료", "아동과 모성, 장애인, 정신질환, 응급진료 등 수익성이 낮아 공급이 부족한 보건 의료", "산업재해 예방과 산업안전 증진에 관련된 보건의료", "재난 및 감염병 등 신속한 대응이 필요한 공공보건의료"], "ans": 3}, {"id": "12_9", "s": 12, "q": 9, "text": "다음 중 공공보건의료기관의 장이 공공보건의료계획을 보건복지부장관에게 제출 하여야 하는 시기로 옳은 것은?", "opts": ["전년도 12월 31일까지", "해당 연도 1월 31일까지", "해당 연도 3월 31일까지", "해당 연도 6월 30일까지 - 공공보건의료기관의 장은 공공보건의료계획을 해당 연도 1월 31일까지 관계 중앙행정기관"], "ans": 2}, {"id": "12_10", "s": 12, "q": 10, "text": "다음 중 공공보건의료계획 시행결과 평가에 대한 설명으로 옳지 않은 것은?", "opts": ["보건복지부장관은 공공보건의료계획의 시행결과를 평가하여야 한다.", "보건복지부장관은 공공보건의료기관이 공공보건의료를 제공할 때 발생한 경영상의 손해를 평가에 불리하게 반영하여서는 아니 된다.", "보건복지부장관은 평가결과를 해당 공공보건의료기관의 장과 해당 공공보건의료 기관이 소속된 기관의 장에게 통보하여야 한다.", "보건복지부장관은 재정적·행정적 지원을 하거나 비용을 보조할 경우 공공보건의료 계획의 평가결과를 반영하여서는 아니 된다."], "ans": 4}, {"id": "12_11", "s": 12, "q": 11, "text": "다음은 공공보건의료에 관한 법률 시행규칙 제6조의 내용이다. 빈칸에 들어갈 단어로 옳게 짝지어진 것을 고르시오. ③ - 보 기 - ○ 보건복지부장관은 공공보건의료계획의 시행결과 평가를 위한 지침을 작성하여 공공 보건의료기관의 장에게 다음 해 ㄱ 까지 통보하여야 한다. ○ 공공보건의료기관의 장은 해당 연도의 공공보건의료계획 시행결과를 다음 해 ㄴ 까지 보건복지부장관에게 제출하여야 한다.", "opts": ["ㄱ) 1월 말 ㄴ) 1월 31일", "ㄱ) 1월 말 ㄴ) 3월 31일", "ㄱ) 2월 말 ㄴ) 3월 31일", "ㄱ) 3월 말 ㄴ) 6월 30일 - 보건복지부장관은 공공보건의료계획의 시행결과 평가를 위한 지침을 작성하여 관계 중앙행 정기관의 장, 공공단체의 장 및 시·도지사를 거쳐 공공보건의료기관의 장에게 다음 해 2월 말까지 통보하여야 한다."], "ans": 3}, {"id": "12_13", "s": 12, "q": 13, "text": "다음 중 의료취약지의 지정·고시 등에 대한 설명으로 옳은 것은?", "opts": ["보건복지부장관은 국민의 의료 이용 실태 및 의료자원의 분포 등에 관한 사항을 5년마다 평가·분석하여야 한다.", "시·도지사는 해당 평가·분석 결과 의료서비스의 공급이 현저하게 부족한 지역을 의료취약지로 지정·고시할 수 있다.", "보건복지부장관은 의료취약지에 대하여 보건의료 인력의 공급을 지원하거나, 의료 기관의 설립 및 운영을 위한 비용을 보조할 수 있다.", "의료취약지 거점의료기관은 공공보건의료기관만 지정받을 수 있다."], "ans": 3}, {"id": "12_15", "s": 12, "q": 15, "text": "다음 중 책임의료기관의 지정 등에 대한 설명으로 옳은 것은?", "opts": ["시·도지사는 필요한 시설·인력 및 장비를 갖추었거나 갖출 능력이 있다고 인정하는 보건의료기관 중에서 책임의료기관을 지정할 수 있다.", "책임의료기관으로 지정받으려는 보건의료기관은 의료법에 따른 상급종합병원에 해당하는 의료기관이어야 한다.", "책임의료기관은 공공보건의료사업의 수행, 기획·연구 및 조정 역할을 수행한다.", "책임의료기관의 역할을 의료기관 내 기존 부서에서 원활한 수행이 가능한 경우 전담조직을 설치할 필요가 없다."], "ans": 3}, {"id": "12_16", "s": 12, "q": 16, "text": "다음 중 공공보건의료 수행기관의 준수사항 등에 대한 설명으로 옳지 않은 것은?", "opts": ["공공보건의료 수행기관은 공공보건의료사업을 수행할 때 지역 주민의 참여를 통한 사업계획을 수립하여야 한다.", "공공보건의료 수행기관은 공공보건의료사업을 수행할 때 공익성에 기반한 성실한 사업 운영을 하여야 한다.", "공공보건의료 수행기관은 공공보건의료사업을 수행할 때 투명한 재정 운용과 회계 공개 원칙을 준수하여야 한다.", "시·도지사 및 시장·군수·구청장은 국민건강에 중대한 위해(危害)가 예상되는 경우 에는 우선적으로 관할 공공보건의료 수행기관에 그 위해의 발생 또는 확산을 억제 하기 위하여 필요한 명령을 할 수 있다."], "ans": 4}, {"id": "12_17", "s": 12, "q": 17, "text": "다음 중 공공보건의료 지원단에 대한 설명으로 옳지 않은 것은?", "opts": ["시·도지사는 공공보건의료에 관한 업무 수행을 지원하게 하기 위하여 공공보건의료 지원단을 설치·운영할 수 있다.", "공공보건의료 지원단은 관할 지역 내 공공보건의료기관의 공공보건의료사업에 관한 업무·회계 및 재산에 관한 사항을 조사하거나 관련 장부 또는 서류 등을 검사하는 업무를 수행한다.", "공공보건의료 지원단은 공공보건의료 시행계획의 수립과 시행에 대한 지원 업무를 수행한다.", "공공보건의료 지원단은 관할 지역 내 공공보건의료기관의 공공보건의료계획 수립과 시행에 대한 지원 및 공공보건의료기관과의 협력 사업을 수행한다."], "ans": 2}, {"id": "12_18", "s": 12, "q": 18, "text": "다음 중 책임의료기관 필수보건의료 협의체에 대한 설명으로 옳은 것은?", "opts": ["책임의료기관 원외 협의체는 필수보건의료 분야 사업 모델 개발 및 확대를 위한 원내 부서 간 협의·조정을 수행한다.", "책임의료기관 원외 협의체는 지방자치단체 관계자, 타 책임의료기관장, 정부지정 센터장, 소방본부장, 보건소장 등을 포함하여 협의체를 구성한다.", "책임의료기관 원내 협의체는 필수보건의료 협력모델 개발 및 실절적인 사업 수행을 위한 지역보건의료기관 간 협의·조정을 수행한다.", "책임의료기관 원내 협의체는 분기별 1회 이상 정기적인 협의체를 운영하여야 한다."], "ans": 2}, {"id": "12_19", "s": 12, "q": 19, "text": "다음 중 시·도 단위 권역책임의료기관으로 일치하지 않은 것은?", "opts": ["경기 : 분당서울대학교병원", "경북 : 경상국립대학교병원", "인천 : 가천대길병원", "충남 : 단국대학교병원"], "ans": 2}, {"id": "12_20", "s": 12, "q": 20, "text": "다음 중 서울특별시 지역책임의료기관으로 지정된 기관으로 옳은 것을 모두 고르 시오. ④ - 보 기 - 가. 서울특별시동부병원 라. 서울특별시서남병원 나. 서울특별시보라매병원 마. 서울특별시서울의료원 다. 서울특별시북부병원 바. 서울특별시서울적십자병원", "opts": ["가, 나, 다, 라", "가, 다, 라, 마", "가, 다, 라, 바", "나, 라, 마, 바"], "ans": 4}, {"id": "12_21", "s": 12, "q": 21, "text": "다음 중 서울대학교병원이 책임의료기관으로서 수행하고 있는 필수보건의료 협력 분야로 옳은 것을 모두 고르시오. ② - 보 기 - 가. 퇴원환자 지역사회 연계 사업 마. 재활의료 및 지속관리 협력 사업 나. 중증응급 이송·전원 및 진료 협력 사업 바. 산모·신생아·어린이 협력 사업 다. 감염 및 환자안전관리 협력 사업 사. 일차의료·돌봄 협력 사업 라. 정신건강증진 협력 사업", "opts": ["가, 나, 다, 라", "가, 나, 라, 바", "나, 다, 라, 마", "나, 마, 바, 사"], "ans": 2}, {"id": "12_23", "s": 12, "q": 23, "text": "다음 중 공공부문의 직제에 대한 설명으로 옳지 않은 것은?", "opts": ["공공부원장은 '공공보건의료에 관한 법률'에 따른 공공보건의료사업지원과 보건의료 정책개발 등에 관한 사항을 총괄한다.", "원장이 부득이한 사유로 직무를 수행할 수 없을 때에는 진료부원장, 소아진료부 원장, 암진료부원장, 공공부원장의 순으로 그 직무를 대행한다.", "공공부원장 밑에 공공보건의료본부를 두고, 본부 밑에 공공보건의료총괄팀을 둔다.", "공공보건의료총괄담당과 공공보건의료지원담당은 각각 공공보건의료 사업의 총괄 관리 및 병원 내 공공보건의료 관련 위탁사업 종합 지원 등에 관한 사항을 수행 한다."], "ans": 2}, {"id": "12_24", "s": 12, "q": 24, "text": "다음 중 공공부문이 수행하고 있는 업무로 옳은 것을 모두 고르시오. - 보 기 - 가. 본원과 분원, 위수탁병원 등의 공공보건의료 네트워크 구축 및 협력에 관한 사항 나. 국립대학병원-지방의료원 간 의료 협력 지원에 관한 사항 다. 재택의료, 의료·복지 통합 서비스 제공 및 공공상담체계 수행에 관한 사항 라. 공공보건의료 정책연구·개발 및 제안에 관한 사항", "opts": ["가, 나, 다", "가, 나, 라", "나, 다, 라", "가, 나, 다, 라"], "ans": 4}, {"id": "12_25", "s": 12, "q": 25, "text": "다음 중 서울특별시보라매병원 공공부문의 산하 조직으로 옳지 않은 것은?", "opts": ["공공의학과", "건강돌봄네트워크실", "지역장애인보건의료센터", "지역책임의료팀"], "ans": 1}, {"id": "12_26", "s": 12, "q": 26, "text": "다음 중 서울대학교병원 공공보건의료운영위원회규정에 따른 위원회의 심의사항으로 옳은 것을 모두 고르시오. ③ - 보 기 - 가. 공공보건의료계획 및 시행결과에 관한 사항 나. 공공보건의료 조직의 연계 및 협력 방안에 관한 사항 다. 공공임상교수요원 사업 추진·진행에 관한 사항 라. 총사업비 10억 원 이상의 외부위탁 공공보건의료 사업에 관한 사항", "opts": ["가, 나", "가, 다", "가, 나, 다", "가, 나, 라"], "ans": 3}, {"id": "12_27", "s": 12, "q": 27, "text": "다음 중 서울대학교병원 공공보건의료운영위원회규정에 따른 위원회의 구성으로 옳지 않은

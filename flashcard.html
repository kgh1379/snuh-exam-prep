<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>StudyVault Flashcard</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; --text2: #555;
  --muted: #8e8e93; --border: #e0e0e0; --primary: #4A90D9;
  --primary-light: rgba(74,144,217,0.12); --correct: #27ae60;
  --correct-bg: rgba(39,174,96,0.12); --wrong-opacity: 0.35;
  --option-bg: #f8f9fa; --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --ctrl-bg: #ffffff; --chip-bg: #e8e8ed; --chip-active: var(--primary);
  --header-bg: #ffffff; --overlay: rgba(0,0,0,0.5);
}
.dark {
  --bg: #0d1117; --card: #161b22; --text: #e6edf3; --text2: #aaa;
  --muted: #8b949e; --border: #30363d; --primary: #58a6ff;
  --primary-light: rgba(88,166,255,0.15); --correct: #3fb950;
  --correct-bg: rgba(63,185,80,0.15); --option-bg: #21262d;
  --shadow: 0 2px 8px rgba(0,0,0,0.3); --ctrl-bg: #161b22;
  --chip-bg: #30363d; --header-bg: #161b22; --overlay: rgba(0,0,0,0.7);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100dvh;height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);height:100dvh;height:100vh;overflow:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;
  -webkit-tap-highlight-color:transparent}
.view{display:none;height:100dvh;height:100vh;flex-direction:column;overflow:hidden}
.view.active{display:flex}

/* ── Header ── */
.hdr{display:flex;align-items:center;padding:12px 16px;background:var(--header-bg);
  border-bottom:1px solid var(--border);min-height:52px;gap:12px}
.hdr h1{font-size:17px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s}
.hdr-btn:active{background:var(--primary-light)}

/* ── Home ── */
.home-top{text-align:center;padding:28px 16px 20px}
.home-top h1{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.home-top p{font-size:13px;color:var(--muted);margin-top:6px}
.all-btn{display:block;margin:0 16px 16px;padding:14px;border-radius:12px;
  background:var(--primary);color:#fff;font-size:15px;font-weight:700;text-align:center;
  transition:opacity .2s}
.all-btn:active{opacity:.8}
.all-count{font-weight:400;opacity:.8;margin-left:6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 100px;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);
  transition:transform .15s;cursor:pointer;border:1px solid var(--border)}
.card:active{transform:scale(.97)}
.card-num{font-size:26px;font-weight:800;color:var(--primary)}
.card-name{font-size:12.5px;line-height:1.45;margin-top:8px;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-count{font-size:11.5px;color:var(--muted);margin-top:6px}
.nav-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--header-bg);
  border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,8px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;font-size:10px;color:var(--muted);transition:color .2s}
.nav-item.active{color:var(--primary)}
.nav-item span:first-child{font-size:20px}

/* ── Player ── */
.player-info{display:flex;align-items:center;padding:10px 16px;gap:8px;
  background:var(--header-bg);border-bottom:1px solid var(--border)}
.player-section{font-size:13px;color:var(--muted);flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.player-progress{font-size:13px;font-weight:600;color:var(--primary);white-space:nowrap}
.player-close{font-size:20px;margin-left:8px;padding:4px}
.timer-track{height:3px;background:var(--border);position:relative;flex-shrink:0}
.timer-bar{height:100%;background:var(--primary);width:100%;transition:none}
.card-area{flex:1;overflow-y:auto;padding:20px 16px 16px;-webkit-overflow-scrolling:touch}
.q-badge{display:inline-block;background:var(--primary);color:#fff;border-radius:14px;
  padding:3px 12px;font-size:12px;font-weight:700;letter-spacing:0.5px}
.q-text{font-size:15px;line-height:1.7;margin-top:14px;white-space:pre-line;word-break:keep-all}
.opts{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;border-radius:10px;background:var(--option-bg);font-size:14px;
  line-height:1.55;border:2px solid transparent;transition:all .35s;word-break:keep-all}
.opt .marker{font-weight:700;margin-right:6px}
.opt.correct{background:var(--correct-bg);border-color:var(--correct);font-weight:600}
.opt.correct .marker{color:var(--correct)}
.opt.wrong{opacity:var(--wrong-opacity)}
.controls{display:flex;align-items:center;justify-content:space-around;
  padding:10px 24px env(safe-area-inset-bottom,12px);background:var(--ctrl-bg);
  border-top:1px solid var(--border);flex-shrink:0}
.ctrl{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:22px;transition:background .2s,transform .15s}
.ctrl:active{transform:scale(.9);background:var(--primary-light)}
.ctrl.primary-bg{background:var(--primary);color:#fff;font-size:20px}
.ctrl.primary-bg:active{opacity:.8}
.ctrl.bookmarked{color:#f59e0b}
.done-overlay{position:absolute;inset:0;background:var(--overlay);display:flex;
  align-items:center;justify-content:center;z-index:10}
.done-box{background:var(--card);border-radius:20px;padding:32px 28px;text-align:center;
  max-width:300px;width:85%}
.done-box h2{font-size:22px;margin-bottom:8px}
.done-box p{font-size:14px;color:var(--muted);margin-bottom:20px}
.done-btn{display:block;width:100%;padding:12px;border-radius:10px;font-size:14px;
  font-weight:600;margin-bottom:8px;transition:opacity .2s}
.done-btn.pri{background:var(--primary);color:#fff}
.done-btn.sec{background:var(--chip-bg);color:var(--text)}

/* ── Bookmarks ── */
.bm-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.bm-empty span{font-size:48px;display:block;margin-bottom:12px}
.bm-list{overflow-y:auto;padding:12px 16px 100px;-webkit-overflow-scrolling:touch;flex:1}
.bm-item{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;
  box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:12px;cursor:pointer;
  border:1px solid var(--border);transition:transform .15s}
.bm-item:active{transform:scale(.98)}
.bm-badge{background:var(--primary-light);color:var(--primary);border-radius:8px;
  padding:4px 8px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.bm-text{flex:1;font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.bm-del{color:var(--muted);font-size:18px;padding:0 4px;flex-shrink:0}

/* ── Settings ── */
.settings-scroll{overflow-y:auto;padding:16px;flex:1;-webkit-overflow-scrolling:touch}
.st-group{margin-bottom:24px}
.st-label{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.5px;margin-bottom:10px}
.st-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 18px;border-radius:20px;background:var(--chip-bg);font-size:14px;
  font-weight:500;transition:all .2s}
.chip.active{background:var(--chip-active);color:#fff}
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border:none}
.toggle-label{font-size:15px}
.toggle{width:50px;height:28px;border-radius:14px;background:var(--chip-bg);
  position:relative;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(22px)}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.pulse{animation:pulse .3s ease}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="v-home" class="view active">
  <div class="home-top">
    <h1>StudyVault</h1>
    <p>플래시카드로 빠르게 반복 학습</p>
  </div>
  <button class="all-btn" onclick="startAll()">
    전체 문제<span class="all-count" id="total-count"></span>
  </button>
  <div class="grid" id="section-grid"></div>
  <div class="nav-bar">
    <button class="nav-item active" onclick="showView('home')"><span>📋</span>홈</button>
    <button class="nav-item" onclick="showView('bookmarks')"><span>⭐</span>북마크</button>
    <button class="nav-item" onclick="showView('settings')"><span>⚙</span>설정</button>
  </div>
</div>

<!-- ═══ PLAYER ═══ -->
<div id="v-player" class="view" style="position:relative">
  <div class="player-info">
    <span class="player-section" id="p-section"></span>
    <span class="player-progress" id="p-progress"></span>
    <button class="player-close" onclick="closePlayer()">✕</button>
  </div>
  <div class="timer-track"><div class="timer-bar" id="timer-bar"></div></div>
  <div class="card-area" id="card-area"></div>
  <div class="controls">
    <button class="ctrl" onclick="prevQ()" title="이전 (←)">◀</button>
    <button class="ctrl primary-bg" id="btn-pause" onclick="togglePause()" title="일시정지 (Space)">⏸</button>
    <button class="ctrl" onclick="nextQ()" title="다음 (→)">▶</button>
    <button class="ctrl" id="btn-bm" onclick="toggleBookmark()" title="북마크 (B)">☆</button>
  </div>
  <div class="done-overlay" id="done-overlay" style="display:none">
    <div class="done-box fade-in">
      <h2>학습 완료!</h2>
      <p id="done-msg"></p>
      <button class="done-btn pri" onclick="restartSection()">다시 시작</button>
      <button class="done-btn sec" onclick="closePlayer()">홈으로</button>
    </div>
  </div>
</div>

<!-- ═══ BOOKMARKS ═══ -->
<div id="v-bookmarks" class="view">
  <div class="hdr">
    <button class="hdr-btn" onclick="showView('home')">←</button>
    <h1>북마크</h1>
    <button class="hdr-btn" id="bm-clear-btn" onclick="clearAllBookmarks()" title="전체 삭제">🗑</button>
  </div>
  <div id="bm-content" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>
  <div class="nav-bar">
    <button class="nav-item" onclick="showView('home')"><span>📋</span>홈</button>
    <button class="nav-item active" onclick="showView('bookmarks')"><span>⭐</span>북마크</button>
    <button class="nav-item" onclick="showView('settings')"><span>⚙</span>설정</button>
  </div>
</div>

<!-- ═══ SETTINGS ═══ -->
<div id="v-settings" class="view">
  <div class="hdr">
    <button class="hdr-btn" onclick="showView('home')">←</button>
    <h1>설정</h1>
  </div>
  <div class="settings-scroll">
    <div class="st-group">
      <div class="st-label">문제 표시 시간</div>
      <div class="st-chips" id="st-qtime"></div>
    </div>
    <div class="st-group">
      <div class="st-label">정답 표시 시간</div>
      <div class="st-chips" id="st-atime"></div>
    </div>
    <div class="st-group">
      <div class="toggle-row">
        <span class="toggle-label">다크 모드</span>
        <button class="toggle" id="tgl-dark" onclick="toggleDark()"></button>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">셔플 모드</span>
        <button class="toggle" id="tgl-shuffle" onclick="toggleShuffle()"></button>
      </div>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nav-item" onclick="showView('home')"><span>📋</span>홈</button>
    <button class="nav-item" onclick="showView('bookmarks')"><span>⭐</span>북마크</button>
    <button class="nav-item active" onclick="showView('settings')"><span>⚙</span>설정</button>
  </div>
</div>

<script>

 "처분요구서 작성 처분요구서 작성은 감사종료 후 확정된 지적사항에 대하여 작성하는 문서이다."], "ans": 4}, {"id": "1_14", "s": 1, "q": 14, "text": "감사결과 처분요구 사항에 대한 설명 중 옳지 않은 것은?", "opts": ["시정 : 감사결과 위법 또는 부당하여 추징·회수·보전·환급 또는 원상복구 등이 필 요하다고 인정되는 경우에 적용한다.", "권고 : 감사결과 제도상의 모순이나 불합리한 사항이 있다고 인정되는 경우에 적 용한다.", "통보 : 감사결과 특정인 등의 비위사실이나 위법·부당사항 등을 다른 처분으로는 부적합하지만 부서장에게 알릴 필요가 있다고 인정되는 경우에 적용한다.", "경고 : 감사결과 위법 또는 부당한 행위라고 인정되나 그 정도가 징계 사유에 이 르지 아니하는 경미한 경우에 적용한다."], "ans": 2}, {"id": "1_15", "s": 1, "q": 15, "text": "다음 중 감사결과에 따른 처분(요구)에 관한 설명으로 옳지 않은 것은 ?", "opts": ["변상명령 : 「회계관계직원 등의 책임에 관한 법률」이 정하는 바에 따라 변상책임 이 있다고 인정되는 경우", "개선 : 감사결과 제도상의 모순이나 불합리한 사항이 있다고 인정되는 경우", "통보 : 시정, 주의환기에 해당하는 경우로서 감사실시 현장에서 즉시 시정되거나 시정될 가능성이 있는 경미한 사항의 경우", "시정 : 감사결과 위법 또는 부당하여 추징·회수·보전·환급 또는 원상복구 등이 필 요하다고 인정되는 경우 “통보”란 감사결과 특정인 등의 비위사실이나 위법·부당사항 등을 다른 처분으로는 부적합하"], "ans": 3}, {"id": "1_16", "s": 1, "q": 16, "text": "감사결과의 처리에 관한 설명으로 옳지 않은 것은 ?", "opts": ["감사과정에서 발견된 지적사항에 대하여 처분 및 처분요구를 병과할 수 없다.", "원장은 처분요구를 받았을 때 지체없이 조치하고 해당 조치사항을 서면보고 하여 야 한다.", "감사는 원장이 보고한 조치내용이 감사의 요구내용과 다른 경우에는 그 통보를 받은 날로부터 15일 이내에 원장에게 재조치를 요구할 수 있다.", "원장은 전항의 재조치요구를 받은 때에는 정당한 사유가 없는 한 1개월 이내에 그 요구에 응하여야 한다."], "ans": 1}, {"id": "1_17", "s": 1, "q": 17, "text": "서울대학교병원 적극행정 면책제도 운영지침에 대한 설명 중 옳지 않은 것은?", "opts": ["이 지침은 감사규정에 근거하여 2020년에 제정되었다.", "적극행정면책의 대상이 되기 위해서는 공공의 이익을 위해 적극적으로 처리한 결 과여야 하며, 고의 또는 중대한 과실이 없어야 한다.", "고의 또는 중과실이 없는 것으로 추정하기 위해서는 자체감사를 받는 자와 대상 업무 사이에 사적인 이해관계가 있어도 상관없다.", "감사는 면책 신청이 없는 경우에도 면책 처리할 수 있다."], "ans": 3}, {"id": "1_18", "s": 1, "q": 18, "text": "감사 조치결과에 대한 설명 중 옳지 않은 것은?", "opts": ["원장은 감사결과처분 요구를 받은 때에는 지체 없이 조치하여야 한다.", "원장은 감사결과 처분요구에 대한 조치결과를 서면으로 감사에게 통보하여야 한 다.", "원장은 재조치 요구를 받은 때에는 정당한 사유가 없는 한 1개월 이내에 그 요구 에 응하여야 한다.", "감사는 조치결과에 대하여 차기 감사 시에 이를 확인할 필요는 없다."], "ans": 4}, {"id": "1_19", "s": 1, "q": 19, "text": "감사결과 이의신청에 대한 설명 중 옳지 않은 것은?", "opts": ["원장은 감사의 결과처분요구에 대하여 이의를 제기할 수 없다.", "감사는 이의신청을 받았을 때에는 지체 없이 이를 심사하여 필요한 조치를 취하 여야 한다.", "원장은 이의신청에 대한 감사의 조치에 대하여 재차 이의가 있을 때에는 1개월 이내에 감사에게 재심사를 요구할 수 있다.", "감사는 재심사를 요구받았을 때에는 의견을 첨부하여 교육부장관에게 보고하여야 한다."], "ans": 1}, {"id": "1_20", "s": 1, "q": 20, "text": "감사보고에 대한 설명 중 옳지 않은 것은?", "opts": ["감사인은 정기감사와 특별감사 종료 후 20일 이내에 감사보고서를 작성하여 감사 에게 보고하여야 한다.", "감사는 불가피한 경우를 제외하고는 정기감사 결과를 2개월 이내에 원장에게 통 보하여야 한다.", "감사는 감사 결과를 2개월 이내에 이사회와 교육부장관에게 보고하여야 한다.", "감사는 외부감사 실시에 따른 조치결과에 대하여는 이사회와 교육부장관에게 보 고할 필요가 없다."], "ans": 4}, {"id": "1_21", "s": 1, "q": 21, "text": "다음 중 감사인에 관한 설명으로 옳지 않은 것은?", "opts": ["감사인은 독립된 위치에서 감사를 수행하여야 한다.", "감사인은 감사 상 필요한 때에는 최대한 많은 자료를 요구하여야 한다.", "감사인은 다른 법령에 규정된 경우를 제외하고는 교육부장관의 감독과 지시에 따 라야 한다.", "병원에서 받은 외부감사업무 중 재무 및 회계감사와 이 규정에 따른 감사의 직무 에 관련되는 업무감사의 수감업무는 감사가 총괄한다."], "ans": 2}, {"id": "1_22", "s": 1, "q": 22, "text": "다음 중 일상감사의 실시원칙에 대한 설명으로 옳지 않은 것은?", "opts": ["집행부서의 과장(팀장)은 감사규정에 의한 일상감사가 누락되지 않도록 당해 업무 의 품의(결재)시에 일상감사 대상여부 및 결재선 지정 등을 확인하여야 한다.", "일상감사 결과 의견을 제시하고자 할 때에는 위법·부당 사항 또는 예상되는 문제 점을 적시하고, 가능한 한 개선대안 또는 시정방안을 제시하여야 한다.", "일상감사 처리에 장기간 소요가 예상되는 등 불가피한 경우 집행부서의 장이 일 상감사 회부 전에 일상감사 대상서류 사본을 첨부하여 사전에 검토의뢰 하거나, 감사가 일상감사 대상서류를 제출받아 검토할 수 있다.", "일상감사 진행 시 집행부서의 의견은 배제하여야 한다."], "ans": 4}, {"id": "1_23", "s": 1, "q": 23, "text": "다음 중 일상감사의 실시 절차 및 방법으로 옳지 않은 것은?", "opts": ["일상감사 대상 업무를 처리하는 집행부서의 장은 관련서류를 구비하여 일상감사 를 의뢰하여야 한다.", "감사는 집행부서의 장이 일상감사 대상 업무에 대하여 일상감사를 의뢰하지 않은 경우 집행부서의 장 또는 최종결재권자에게 일상감사를 의뢰하도록 요구할 수 있 다.", "감사는 일상감사의 처리에 대하여는 집행부서의 장 및 그 직원에 대하여 출석 및 진술, 관련 자료의 제출 등을 요구할 수 없다.", "감사는 집행부서로부터 접수한 일상감사 대상 업무가 관련 절차 또는 서류 미흡 시 반려하거나 보완을 요구할 수 있다."], "ans": 3}, {"id": "1_24", "s": 1, "q": 24, "text": "다음 일상감사에 대한 설명 중 옳지 않은 것은?", "opts": ["일상감사를 거쳤으면, 자체감사(정기감사, 특별감사)의 면책 사유가 된다.", "일상감사는 7일 내외에 처리하여 그 결과를 집행부서에 통보하는 것을 원칙으로 한다.", "일상감사를 경유할 수 없을 만큼 긴급한 업무추진이 필요한 경우에는 집행부서의 장이 사전에 감사와 협의하여 우선 추진할 수 있다.", "감사는 집행부서의 장이 일상감사 대상 업무에 대하여 일상감사를 의뢰하지 않은 경우 집행부서의 장 또는 최종결재권자에게 일상감사를 의뢰토록 요구할 수 있 다."], "ans": 1}, {"id": "1_25", "s": 1, "q": 25, "text": "감사활동에 대한 설명으로 옳지 않은 것은?", "opts": ["감사는 이미 감사원 감사 등이 실시된 사안에 관하여는 새로운 사실이 발견되거 나 중요한 사항이 누락된 경우 등을 제외하고는 자체감사 대상에서 제외하고 종 전의 감사결과를 활용하여야 한다.", "일상감사를 거쳐 확인된 사항에 대하여는 정기감사를 생략할 수 있다.", "일상감사를 거쳐 감사가 확인한 사항에 대하여 정기감사를 실시한 후 지적사항이 발생할 경우, 일상감사의 수행여부는 지적사항 면책의 요건이 된다.", "일상감사는 집행부서의 의견을 최대한 존중하여 실시하여야 한다."], "ans": 3}, {"id": "1_26", "s": 1, "q": 26, "text": "다음 중 괄호 안에 들어갈 용어로 적절한 것은? 국민권익위원회에서 주관하는 ( )는 공공기관의 청렴수준 및 부패유발요인을 진 단하여 개선노력을 유도함으로써 공공분야의 투명성 및 청렴성을 제고하는데 그 목 적이 있다.", "opts": ["종합청렴도평가", "의료기관인증평가", "국가고객만족도 조사", "브랜드파워 조사 공공기관의 청렴수준 및 부패유발요인을 진단하여 개선을 유도하기 위하여 국민권익위원회에 서는 청렴도평가를 실시하고 있다."], "ans": 1}, {"id": "1_27", "s": 1, "q": 27, "text": "다음 중 청탁금지법 상 경조사비에 대한 설명 중 옳지 않은 것은?", "opts": ["부조금을 대신하는 화환, 조화 등은 10만원까지 가능하다.", "조의금 7만원과 3만원짜리 화환을 함께 하는 것은 가능하다.", "조의금 5만원과 5만원짜리 화환을 함께 주는 것은 가능하다.", "공직자등에 해당하지 않는 경우, 현금 5만원을 초과하여 지급할 수 있다."], "ans": 2}, {"id": "1_28", "s": 1, "q": 28, "text": "청탁금지법 상 병원 임직원이 수수 가능한 명절선물에 대한 설명 중 맞지 않는 것 은?", "opts": ["직무관련성이 있는 경우, 원칙적으로 선물 제공은 불가하다.", "직무관련성이 있는 경우, 원활한 직무수행을 위하여 사교·의례의 목적으로 제공하 는 5만원 이하의 선물은 가능하다.", "같은 기관 내 상급자가 하급자에게 주는 10만원 상당의 건어물 세트는 가능하다.", "같은 기관 내 하급자가 상급자에게 제공하는 5만원 이하의 금액상품권은 가능하다."], "ans": 4}, {"id": "1_29", "s": 1, "q": 29, "text": "청탁금지법과 임직원행동강령에서 정하고 있는 ‘외부강의등’에 대한 설명으로 옳지 않은 것은?", "opts": ["병원 임직원이 직무와 관련하여 사례금을 받는 외부강의등을 할 때에는 신고하는 것이 원칙이다.", "요청자가 국가나 지방자치단체인 경우에도 신고하여야 한다.", "시간당 상한액을 초과하여 강의료를 받은 경우, 초과분을 제공자에게 즉시 반환 하고 반환사실을 병원에 자진신고해야 한다.", "외부강의등에 대한 사례금이 없는 경우에는 병원에 신고하지 않아도 된다."], "ans": 2}, {"id": "1_30", "s": 1, "q": 30, "text": "병원 소속 임직원(학교 소속 제외)이 1시간의 외부강의를 했을 경우 사례금 상한액 은 얼마인가?", "opts": ["100만원", "80만원", "40만원", "20만원 병원 소속 임직원(학교 소속 제외)의 외부강의등 사례금 상한액(1시간당)은 직급별 구분 없이"], "ans": 3}, {"id": "1_31", "s": 1, "q": 31, "text": "다음 중 청탁금지법 상 수수를 금지하는 물품에 해당하지 않는 것은?", "opts": ["하급자가 상급자에게 제공하는 10만원 상당의 백화점 상품권", "직무관련 민원인이 병원 소속 임직원에게 제공하는 10만원 상당의 도서문화상품 권", "원활한 직무 수행을 위하여 직무관련자가 제공하는 10만원 상당의 식사", "상급자가 위로·격려·포상 등의 목적으로 하급자에게 제공하는 금품"], "ans": 4}, {"id": "1_32", "s": 1, "q": 32, "text": "다음 중 청탁금지법 상 수수 금지 금품등의 신고의 대상이 아닌 경우는?", "opts": ["임직원 자신이 수수 금지 금품등을 받은 경우", "임직원 자신이 수수 금지 금품등에 대한 약속 또는 의사표시를 받은 경우", "불특정 다수인에게 배포하기 위한 기념품을 제공받은 경우", "임직원의 배우자가 수수 금지 금품등을 제공받기로 약속한 경우"], "ans": 3}, {"id": "1_33", "s": 1, "q": 33, "text": "다음 청탁금지법 상 부정청탁의 신고 및 처리에 대한 내용 중 옳은 것은?", "opts": ["공직자등은 부정청탁을 받은 경우 거절의 의사를 표시할 필요가 없다.", "동일한 부정청탁을 3회 이상 지속하는 경우에만 신고의 의무가 있다.", "부정청탁에 관하여 신고를 받은 소속 기관장은 신고 내용이 부정청탁에 해당하는 지 신속하게 확인하여야 한다.", "소속기관장은 부정청탁의 내용 및 조치사항을 공개할 수 없다."], "ans": 3}, {"id": "1_34", "s": 1, "q": 34, "text": "다음 중 서울대학교병원 일반직 직원이 외국정부, 국제기구 등에서 요청한 외부강 의 등을 실시한 경우 1시간당 사례금 상한액은 얼마인가?", "opts": ["20만원", "40만원", "100만원", "사례금을 지급하는 자의 기준을 따른다."], "ans": 4}, {"id": "1_35", "s": 1, "q": 35, "text": "청탁금지법의 위반행위 발생 시 신고 대상에 해당하지 않는 것은 어디인가?", "opts": ["위반행위 발생 공공기관 또는 그 감독기관", "감사원 또는 수사기관", "언론사", "국민권익위원회"], "ans": 3}, {"id": "1_36", "s": 1, "q": 36, "text": "다음 중 외부강의등에 대한 설명 중 옳지 않은 것은?", "opts": ["임직원은 자신의 직무와 관련되어 요청받은 강의에 대하여 지정된 금액을 초과하 는 사례금을 받아서는 아니 된다.", "병원장은 임직원이 신고한 외부강의를 제한할 수 있다.", "사례금을 받은 외부강의등은 해당 강의를 마친 날부터 10일 이내에 신고하여야 한다.", "임직원은 지정된 금액을 초과하여 사례금을 받고 병원장에게 신고하였다면 그 초 과금액을 제공자에게 반환하지 않아도 된다."], "ans": 4}, {"id": "1_37", "s": 1, "q": 37, "text": "다음 중 임직원행동강령 상 경조사를 알릴 수 없는 대상은 누구인가?", "opts": ["친족(｢민법｣ 제767조에 따른 친족)", "현재 근무하고 있거나 과거에 근무하였던 기관의 소속 직원", "직무와 관련하여 이해관계가 있는 외부업체 직원", "자신이 소속된 종교단체 · 친목단체 등의 회원 직무관련자 또는 직무관련임직원에게 경조사를 알리는 것은 허용되지 않으며, 친족 등 제한"], "ans": 3}, {"id": "1_38", "s": 1, "q": 38, "text": "임직원행동강령 상 수수금지 금품등의 신고 및 처리 등과 관련한 설명으로 옳지 않은 것은?", "opts": ["임직원은 금품등을 반환한 경우에 소요된 반환 비용을 병원장에게 청구할 수 있 다.", "임직원은 수수한 금품등의 제공자나 제공자의 주소를 알 수 없는 경우 병원장에 게 인도하여야 한다.", "직무관련자가 금품등의 제공에 대한 의사표시만 전달한 경우에는 거부의 의사를 밝히지 않아도 된다.", "임직원은 수수 금지 금품등을 받은 경우에는 그 금품등을 제공한 자에게 지체 없 이 반환하여야 한다."], "ans": 3}, {"id": "1_39", "s": 1, "q": 39, "text": "다음 중 임직원행동강령에 따라 외부강의등에 해당하여 신고의 대상이 되는 경우 를 모두 고르시오. ① ㄱ. 외부학회에서 직무와 관련하여 요청한 강의를 사례금을 받고 2시간 동안 진행하 는 경우 ㄴ. 사립병원에서 직무의 수행과 관련하여 사례금을 받고 15분간의 강연을 진행하는 경우 ㄷ. 지방자치단체나 국가로부터 강의를 요청받아 1시간 강의를 진행한 경우 ㄹ. 원내에서 진행되는 기본교육의 강의를 진행하는 경우", "opts": ["ㄱ,ㄴ", "ㄴ,ㄷ", "ㄷ,ㄹ", "ㄱ,ㄹ 직무와 관련하여 요청받은 사례금을 받는 외부강의 등은 신고하여야 한다."], "ans": 1}, {"id": "1_40", "s": 1, "q": 40, "text": "이해충돌방지법에 따라 신고해야 하는 직무관련자와의 거래행위에 해당하지 않는 것은?", "opts": ["금전을 빌리거나 빌려주는 행위 및 유가증권을 거래하는 행위", "토지 또는 건축물 등 부동산을 거래하는 행위", "물품・용역・공사 등의 계약을 체결하는 행위", "금융회사로부터 통상적인 조건으로 금전을 빌리는 행위 금융회사로부터 통상적인 조건으로 금전을 빌리는 행위 및 유가증권을 거래하는 행위는"], "ans": 4}, {"id": "1_41", "s": 1, "q": 41, "text": "다음 중 괄호 안에 들어갈 숫자를 순서대로 알맞게 짝지은 것은?\n「서울대학교병원임직원행동강령」에 따르면 임직원이 원활한 직무수행 또는 사교ㆍ 의례 또는 부조의 목적으로 제공되는 음식물ㆍ경조사비ㆍ선물 등으로서 수수를 금 지하는 금품에 해당하지 아니하는 가액 범위를 농수산물ㆍ농수산가공품 및 농수산 물ㆍ농수산가공품 상품권의 경우 ( )만원으로 정하고, 설날ㆍ추석 전 24일부터 설 날ㆍ추석 후 5일까지의 기간 동안에는 그 가액의 범위를 ( )만원으로 정하고 있다.", "opts": ["10, 15", "15, 20", "15, 25", "15, 30 「농수산물 품질관리법」 제2조제1항제1호에 따른 농수산물 및 같은 항 제13호에 따른 농수산 가공품과 농수산물·농수산가공품 상품권, 그 밖에 이에 준하는 것의 가액범위는 15만원이나,"], "ans": 4}, {"id": "2_1", "s": 2, "q": 1, "text": "다음은 「서울대학교병원 설치법」 중 일부이다. 보기 중 ( ㉠ )에 들어갈 말로 올바 른 것은? ② 제1조(목적) 이 법은 서울대학교병원을 설치하여 ( ㉠ )에 따른 의학, 간호학 및 약 학 등에 관한 교육·연구와 진료를 통하여 의학 발전을 도모하고 국민보건 향상에 기여함을 목적으로 한다.", "opts": ["「의료법」", "「고등교육법」", "「사립학교법」", "「특수교육법」 서울대학교병원 설치법 제1조"], "ans": 2}, {"id": "2_2", "s": 2, "q": 2, "text": "「서울대학교병원 설치법」 제4조(정관) 조항에서 명시하고 있는 ‘병원의 정관에 포함 되어야 할 사항’에 해당되지 않는 것은?", "opts": ["주된 사무소의 소재지", "이사회에 관한 사항", "공공보건의료사업", "해산에 관한 사항"], "ans": 3}, {"id": "2_3", "s": 2, "q": 3, "text": "「서울대학교병원 설치법」 제6조(사업) 조항에서 명시하고 있는 사업 중 가장 최근에 개정된 조항은?", "opts": ["국립대학법인 서울대학교 의학계 학생의 임상교육", "전공의의 수련과 의료 요원의 훈련", "의학계와 이공계[이학(理學)ㆍ공학(工學)을 말한다] 등 다른 학문과 융합에 기반을 둔 응용학문(이하 “융합의학”이라 한다)의 교육 및 연구", "「공공보건의료에 관한 법률」 제2조제2호에 따른 공공보건의료사업 서울대학교병원 설치법 상 가장 최근 개정된 조항은 2022. 09. 27. 개정된 “제6조 3의2 의학"], "ans": 3}, {"id": "2_4", "s": 2, "q": 4, "text": "「서울대학교병원 정관」 제5조(사업) 조항에서 명시하고 있는 ‘병원이 수행하는 사업’ 에 해당되는 것으로 모두 고르면? ④ ㉠ 의학계 학생의 임상교육 ㉡ 의학계 관련 연구 ㉢ 진료사업 ㉣ 공공보건의료사업 ㉤ 의료해외 진출 ㉥ 의료기술의 실용화", "opts": ["㉠, ㉡, ㉢", "㉠, ㉡, ㉢, ㉣, ㉥", "㉠, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣, ㉤"], "ans": 4}, {"id": "2_5", "s": 2, "q": 5, "text": "우리 병원의 최고 의사결정 기구로 이사회를 두고 있습니다. 이사회의 장(長)은?", "opts": ["서울대학교 병원장", "서울대학교 의과대학장", "서울대학교 총장", "교육부장관"], "ans": 3}, {"id": "2_6", "s": 2, "q": 6, "text": "다음은 「서울대학교병원 설치법」 중 일부이다. 보기 중 ( ㉠ )에 들어갈 숫자로 올 바른 것은? ③ 제8조(임원) ① 대학병원에는 이사장을 포함한 이사 ( ㉠ )명과 감사 1명을 둔다.", "opts": ["7", "8", "9", "10 서울대학교병원 설치법 제8조"], "ans": 3}, {"id": "2_7", "s": 2, "q": 7, "text": "「서울대학교병원 설치법」 제8조(임원) 조항에서 명시하고 있는 ‘당연직 이사’에 해당 되지 않는 사람은?", "opts": ["보건복지부 차관", "기획예산처 차관", "서울대학교 치과대학장", "서울대학교 치과병원장"], "ans": 3}, {"id": "2_8", "s": 2, "q": 8, "text": "서울대학교병원 이사회의 구성 중 ‘당연직 이사 외의 이사’(임명직 이사)는 몇 명으 로 구성되는가?", "opts": ["1명", "2명", "3명", "4명 서울대학교병원 설치법 상 이사는 이사장을 포함한 9명이며, 7인의 당연직이사(서울대학교 총장,"], "ans": 2}, {"id": "2_9", "s": 2, "q": 9, "text": "「서울대학교병원 설치법」 제9조(이사회) 조항에서 명시하고 있는 ‘이사회 심의 사항’ 에 해당되는 것으로 모두 고르면? ③ ㉠ 정관 변경에 관한 사항 ㉡ 제규정의 제정 및 개폐에 관한 사항 ㉢ 예산·결산에 관한 사항 ㉣ 공공보건의료계획의 수립 및 시행결과 ㉤ 재산의 취득 및 처분에 관한 사항", "opts": ["㉠, ㉡, ㉢", "㉡, ㉣, ㉤", "㉠, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣, ㉤"], "ans": 3}, {"id": "2_10", "s": 2, "q": 10, "text": "매년 서울대학교병원의 정기 이사회 개최 시기는?", "opts": ["1월, 11월", "1월, 12월", "2월, 11월", "2월, 12월 서울대학교병원 이사회는 정기 이사회와 임시 이사회로 구분하며, 정기회는 매년 2월, 12월에"], "ans": 4}, {"id": "2_11", "s": 2, "q": 11, "text": "다음은 「서울대학교병원 설치법」 중 일부이다. 보기에 들어갈 말로 바르게 짝지어 진 것은? ① 제10조(대학병원장) ③ 원장은 이사회의 추천을 받아 ( ㉠ )의 제청으로 ( ㉡ )이 임 명한다.", "opts": ["교육부장관 - 대통령", "교육부차관 - 교육부장관", "보건복지부차관 - 보건복지부장관", "보건복지부장관 - 대통령"], "ans": 1}, {"id": "2_12", "s": 2, "q": 12, "text": "원장의 임기와 관련된 다음의 보기 중 맞는 설명은?", "opts": ["원장의 임기는 3년으로 하고, 연임할 수 없다.", "원장의 임기는 3년으로 하되, 한 번만 연임할 수 있다.", "원장의 임기는 3년으로 하되, 두 번까지 연임할 수 있다.", "원장의 임기는 3년으로 하고, 연임에 제한이 없다."], "ans": 2}, {"id": "2_13", "s": 2, "q": 13, "text": "「서울대학교병원 설치법」 제10조(대학병원장) 조항의 ‘원장 해임사유’에 해당하지 않는 것은?", "opts": ["설치법 또는 정관을 위반한 경우", "회계부정(會計不定)", "경영실적이 부진한 경우", "심신 장애로 직무수행이 불가능한 경우"], "ans": 3}, {"id": "2_14", "s": 2, "q": 14, "text": "「서울대학교병원 설치법 시행령」 제11조(원장의 직무대행)에 따른 직무대행 순서 로 올바른 것은?", "opts": ["진료부원장 - 소아진료부원장 - 암진료부원장 – 행정처장", "진료부원장 - 소아진료부원장 - 공공부원장 - 행정처장", "진료부원장 - 암진료부원장 - 행정처장 - 공공부원장", "진료부원장 - 행정처장 - 기획조정실장 - 소아진료부원장"], "ans": 2}, {"id": "2_15", "s": 2, "q": 15, "text": "「서울대학교병원 설치법」에서 규정하고 있는 사실 중 틀린 것은?", "opts": ["서울대학교병원(이하 병원)은 법인으로 한다.", "병원은 필요한 경우 정관으로 정하는 바에 따라 그 분원을 둘 수 있다.", "병원의 정관을 변경할 때에는 보건복지부장관의 인가를 받아야 한다.", "설치법에서 규정한 것을 제외하고는 「민법」 중 재단법인에 관한 규정을 준용한다."], "ans": 3}, {"id": "2_16", "s": 2, "q": 16, "text": "「서울대학교병원 설치법」은 서울대학교병원 또는 이와 유사한 명칭을 사용할 수 없도록 규정하고 있다. 이를 위반한 자에게 행하여질 수 있는 조치는?", "opts": ["과태료", "범칙금", "과료", "벌금 서울대학교병원 설치법 제5조(유사명칭의 사용금지)에 따라 서울대학교병원 외에는 유사명칭을"], "ans": 1}, {"id": "2_17", "s": 2, "q": 17, "text": "별도로 정한 경우를 제외하고, 일반적인 이사회 의사정족수로 올바른 것은?", "opts": ["재적이사 3분의 2이상 출석과 출석이사 과반수의 찬성", "재적이사 3분의 2이상 출석과 출석이사 3분의 2이상 찬성", "재적이사 과반수의 출석과 출석이사 3분의 2이상 찬성", "재적이사 과반수의 출석과 출석이사 과반수의 찬성 서울대학교병원 이사회는 법령이나 정관에 특별한 규정이 있는 경우를 제외하고는 재적이사 과"], "ans": 4}, {"id": "2_18", "s": 2, "q": 18, "text": "다음 중 이사회 재적이사 3분의 2이상의 찬성으로 의결이 필요한 경우가 아닌 것은?", "opts": ["예산과 결산의 승인", "조직 및 기구의 개폐", "원장 및 감사의 추천", "원장의 해임건의 이사회는 재적이사 과반수의 출석과 출석이사 과반수의 찬성으로 의결하지만, “원장 및 감사"], "ans": 2}, {"id": "2_19", "s": 2, "q": 19, "text": "다음은 「서울대학교병원 설치법」 중 일부이다. 보기 중 ( ㉠ )에 들어갈 말로 올바 른 것은? ③ 제18조(결산서의 제출) 원장은 사업연도마다 세입·세출결산서를 작성하여 ( ㉠ )까지 교육부장관에게 제출하여야 한다.", "opts": ["당해 연도 12월말", "다음 연도 1월말", "다음 연도 2월말", "다음 연도 3월말"], "ans": 3}, {"id": "2_20", "s": 2, "q": 20, "text": "「서울대학교병원 정관」에서 규정하고 있는 사실 중 틀린 것은?", "opts": ["병원의 주된 사무소는 서울특별시에 둔다.", "병원에 상근하는 임직원은 영리를 목적으로 하는 사업에 종사하지 못한다.", "감사는 이사회의 추천에 의하여 감사원장이 임명한다.", "감사의 궐위 시에는 지체 없이 이사회가 추천하여야 한다."], "ans": 3}, {"id": "2_21", "s": 2, "q": 21, "text": "다음 직책 중 「서울대학교병원 정관」이 정하고 있는 임기가 다른 하나는?", "opts": ["감사", "기획조정실장", "행정처장", "정보화실장 서울대학교병원 감사의 임기는 3년이며, 기획조정실장·행정처장·정보화실장의 임기는 각 2년임 서울대학교병원 정관 제10조, 제22조의3, 제23조, 제24조의5"], "ans": 1}, {"id": "2_22", "s": 2, "q": 22, "text": "「서울대학교병원 정관」 제22조(부원장 등)에 따른 부원장의 임기는 몇 년인가?", "opts": ["1년", "2년", "3년", "4년 서울대학교병원 정관 제22조"], "ans": 2}, {"id": "2_23", "s": 2, "q": 23, "text": "「서울대학교병원 정관」에 따라 아래에 해당하는 직책은? 원장의 명을 받아 병원내 의료기획 및 시스템 개선, 진료프로세스 개선, 환자안전과 QA 및 고객만족에 관한 사항을 분장한다.", "opts": ["행정처장", "대외협력실장", "기획조정실장", "의료혁신실장 서울대학교병원 정관 제24조의 3"], "ans": 4}, {"id": "2_24", "s": 2, "q": 24, "text": "다음 중 「서울대학교병원 정관」에서 정한 위원회가 아닌 것은?", "opts": ["인사위원회", "의사직업윤리위원회", "강남센터운영위원회", "부설 의생명연구원운영위원회"], "ans": 4}, {"id": "2_25", "s": 2, "q": 25, "text": "다음은 「이사회운영규정」 중 일부이다. 보기 중 ( ㉠ )에 들어갈 말로 올바른 것 은? ② 제16조(특별위원회) ① 이사회의 효율적 운영을 위하여, 이사회의 승인을 거쳐 특별 위원회를 둘 수 있다.\n② 특별위원회는 당연직 이사 외의 이사 ( ㉠ ) 을 포함하여 구성한다. ③ 특별위원회의 운영에 관한 사항은 이사장이 따로 정한다.", "opts": ["1인", "2인", "3인", "4인"], "ans": 2}, {"id": "2_26", "s": 2, "q": 26, "text": "병원관리위원회의 위원장은?", "opts": ["의대학장", "서울대학교병원장", "감사", "본원 진료부원장 서울대학교병원 정관 제26조"], "ans": 2}, {"id": "2_27", "s": 2, "q": 27, "text": "병원관리위원회운영규정에 따른 병원관리위원회 정기회의 개최 원칙은?", "opts": ["주 1회 개최", "월 1회 개최", "월 2회 개최", "분기 1회 개최"], "ans": 4}, {"id": "2_28", "s": 2, "q": 28, "text": "병원관리위원회운영규정에 따른 병원관리위원회 구성원을 모두 고르면? ㉠ 본원 진료부원장 ㉡ 분당서울대학교병원 진료부원장 ㉢ 서울특별시보라매병원장 ㉣ SKSH병원장 ㉤ 공공보건의료운영위원회 위원장 ㉥ 강남센터 부원장", "opts": ["㉠, ㉡, ㉢", "㉡, ㉣, ㉤", "㉠, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣, ㉤"], "ans": 3}, {"id": "2_29", "s": 2, "q": 29, "text": "병원관리위원회운영규정에 따른 의사정족수로 올바른 것은?", "opts": ["재적위원 3분의 2이상 출석과 출석위원 과반수의 찬성", "재적위원 3분의 2이상 출석과 출석위원 3분의 2이상 찬성", "재적위원 과반수의 출석과 출석위원 3분의 2이상 찬성", "재적위원 과반수의 출석과 출석위원 과반수의 찬성"], "ans": 2}, {"id": "2_30", "s": 2, "q": 30, "text": "다음 병원관리위원회운영규정의 내용 중 틀린 것은?", "opts": ["병원관리위원회의 구성위원으로 감사를 포함한다.", "원장이 필요하다고 인정하는 경우 회의를 수시 소집할 수 있다.", "병원관리위원회 회의는 정기회의와 임시회의로 구분한다.", "서면으로도 의결할 수 있다."], "ans": 1}, {"id": "2_31", "s": 2, "q": 31, "text": "다음 중 병원관리위원회 산하 각종 소위원회의 구성 및 운영과 관련된 설명 중 옳지 않은 것은?", "opts": ["법인사업의 각 주무부서 또는 소관위원회는 회의안건을 소위원회 회의개최 5일 전까지 간사에게 제출하여야 한다.", "간사는 소위원회에서 심의한 사항을 회의록으로 작성하여 각 소위원회 위원장에게 보고하여야 한다.", "중장기 발전 소위원회는 국내 위ㆍ수탁병원 협약 체결 관련 사항에 대하여 검토 및 논의한다.", "국제사업 운영 소위원회는 국제사업의 계획ㆍ운영 및 주요 정책에 관한 사항에 대하여 검토 및 논의한다."], "ans": 2}, {"id": "2_32", "s": 2, "q": 32, "text": "다음 중 병원관리위원회 산하 소위원회가 아닌 것은?", "opts": ["교육‧인사 운영 소위원회", "의료정보 통합운영 소위원회", "진료 운영 소위원회", "수익금 관리 소위원회 병원관리위원회 산하 소위원회는 중장기 발전 소위원회, 교육·인사 운영 소위원회, 국제사업"], "ans": 3}, {"id": "2_33", "s": 2, "q": 33, "text": "다음 중 본원의 직제규정 제8조(진료부문)에 속하지 않는 곳은?", "opts": ["외래간호팀", "신경과", "조직은행", "방사선안전관리센터 직제규정 제10조의3(간호부문) 간호본부장 밑에 간호행정교육팀ㆍ소아간호과ㆍ암간호과ㆍ내"], "ans": 1}, {"id": "2_34", "s": 2, "q": 34, "text": "다음 중 직제규정에서 정하고 있지 않는 직제에 해당하는 것은?", "opts": ["간호행정교육팀", "교육수련팀", "홍보팀", "발전후원팀"], "ans": 4}, {"id": "2_35", "s": 2, "q": 35, "text": "다음 중 위임전결규정에 따른 ‘전결권자의 범위’로 올바른 것은?", "opts": ["과장 및 팀장 이상 보직자", "부장 이상 보직자", "실장 이상 보직자", "부원장 이상 보직자"], "ans": 1}, {"id": "2_36", "s": 2, "q": 36, "text": "업무분장규정에 따른 ‘기사장 및 기사팀장’의 업무에 해당하지 않는 것은?", "opts": ["진료에 따른 각종 협의회에 관한 사항", "의료기사간의 협의에 관한 사항", "소관부문 의료기기, 집기, 비품의 운영 및 관리에 관한 사항", "진료항목 표준화 작업의 총괄 업무분장규정 제8조(기사장 및 기사팀장) ⓛ 진료부문 각 과의 기사장 및 기사팀장은 다음 각 호의 업무를 분장한다."], "ans": 4}, {"id": "2_37", "s": 2, "q": 37, "text": "업무분장규정에 따른 씨에스조직문화팀의 업무 분장에 해당하는 항목은?", "opts": ["환자 서비스 강화를 위한 프로세스 개선에 관한 사항", "외부인사의 안내", "의료윤리위원회 운영에 관한 사항", "제안제도운영에 관한 사항 업무분장규정 제35조(씨에스(CS)조직문화팀) 씨에스(CS)조직문화팀장은 다음 각 호의 업무를 분장한다."], "ans": 4}, {"id": "2_38", "s": 2, "q": 38, "text": "업무분장규정에 따른 다음의 업무분장에 해당하는 직책은? 1. 조직 및 정원의 관리 2. 직무의 분석 및 평가 3. 서울대학교병원운영위원회 운영에 관한 사항 4. 규정의 제정, 개폐 및 해석에 관한 사항", "opts": ["총무과장", "진료행정팀장", "기획예산팀장", "경영분석팀장 업무분장규정 제30조(기획예산팀) 기획예산팀장은 다음 각 호의 업무를 분장한다."], "ans": 3}, {"id": "2_39", "s": 2, "q": 39, "text": "업무분장규정에 따른 다음의 업무분장에 해당하는 직책은? 1. 소관 통계의 작성 및 보고에 관한 사항 2. 소관 회의체의 운영에 관한 사항 3. 타 기관 의료지원에 관한 사항 4. 진료 각과의 행정지원에 관한 사항 5. 타 부문 및 행정처 등과 업무협조에 관한 사항 6. 진료지원실장 업무 지원 및 재원 관리에 관한 사항 7. 기타 진료와 관련된 문서 등의 행정처리에 관한 사항", "opts": ["총무과장", "진료행정팀장", "진료협력팀장", "경영분석팀장 제 17 조 (진료행정팀) 진료행정팀장은 진료부문의 다음 각 호의 업무를 분장한다."], "ans": 2}, {"id": "2_40", "s": 2, "q": 40, "text": "출자회사관리규정 제3조(관리 범위) 조항에서 명시하고 있는 ‘출자회사에 대한 관 리의 범위’에 해당되는 것으로 모두 고르면? ④ ㉠ 주주총회와 이사회 의결 사항 ㉡ 예산·결산과 사업계획에 관한 사항 ㉢ 경영목표와 경영평가에 관한 사항 ㉣ 협약에 따른 병원의 관리 및 협조 사항 ㉤ 영업의 전부 또는 중요한 일부의 양수도", "opts": ["㉠, ㉡, ㉢", "㉡, ㉢, ㉣", "㉠, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣, ㉤"], "ans": 4}, {"id": "2_41", "s": 2, "q": 41, "text": "출자회사관리규정에 따른 출자회사관리위원회 위원장은?", "opts": ["원장", "진료부원장", "기획조정실장", "행정처장 출자회사관리규정 제8조"], "ans": 2}, {"id": "2_42", "s": 2, "q": 42, "text": "출자회사관리규정에 따른 출자회사관리위원회의 의사정족수로 올바른 것은?", "opts": ["재적구성원 3분의 2이상 출석과 출석구성원 과반수의 찬성", "재적구성원 3분의 2이상 출석과 출석구성원 3분의 2이상 찬성", "재적구성원 과반수의 출석과 출석구성원 3분의 2이상 찬성", "재적구성원 과반수의 출석과 출석구성원 과반수의 찬성"], "ans": 4}, {"id": "2_43", "s": 2, "q": 43, "text": "다음 출자회사관리규정의 내용 중 틀린 것은?", "opts": ["출자회사 관리업무의 관리부서는 출자회사 설립목적 등에 따라 원장이 별도로 정 한다.", "병원은 필요한 경우 출자회사 주주총회에 참석하여 의결권을 행사할 수 있다.", "\"관리부서\"란 출자회사의 고유목적사업을 주관 또는 지원하는 부서를 말한다.", "병원은 필요한 경우 출자회사 주주총회에 참석하여 의결권을 행사할 수 있으며 출자회사 주주총회 소집을 요구 할 수 있다."], "ans": 3}, {"id": "2_44", "s": 2, "q": 44, "text": "출자회사관리규정 제9조(심의사항)에 따른 출자회사관리위원회의 ‘심의사항’에 해당 되는 것을 모두 고르면? ④ ㉠ 출자회사의 경영목표 설정 및 평가에 관한 사항 ㉡ 주주총회 소집 요구 ㉢ 병원의 출자회사 이사 추천에 관한 사항 ㉣ 출자회사 임원의 선임 및 해임 건의 ㉤ 출자회사 주주총회 특별결의 사항", "opts": ["㉠, ㉡, ㉢", "㉡, ㉢, ㉣", "㉠, ㉢, ㉣, ㉤", "㉠, ㉡, ㉢, ㉣, ㉤"], "ans": 4}, {"id": "2_45", "s": 2, "q": 45, "text": "다음은 회계규정 중 일부이다. 보기에 들어갈 말로 바르게 짝지어진 것은? 제55조(예산관리자) 병원의 ( ㉠ )을 예산관리자로 하고, 병원의 각 부서의 장을 ( ㉡ )로 한다. 다만, 1개의 회계단위 내에 2개 이상의 조직단위가 있을 때에는 그 조 직단위의 장을 ( ㉡ )로 할 수 있다.", "opts": ["기획조정실장 – 부서예산관리자", "기획예산팀장 – 부서예산관리자", "기획조정실장 – 부문예산관리자", "기획예산팀장 – 부문예산관리자 회계규정 제55조(예산관리자) 병원의 기획조정실장을 예산관리자로 하고 병원의 각 부서의"], "ans": 3}, {"id": "2_46", "s": 2, "q": 46, "text": "회계규정(제3장 예산)에 의거하여 운용하고 있는 예산의 기능별 구분으로 바르게 짝지어진 것은?", "opts": ["손익예산 – 자금예산 – 투자예산 – 구매예산", "손익예산 – 자금예산 – 자본예산 – 구매예산", "손익예산 – 현금예산 – 투자예산 – 경상예산", "손익예산 – 현금예산 – 자본예산 – 경상예산"], "ans": 2}, {"id": "2_47", "s": 2, "q": 47, "text": "다음 회계규정(제3장 예산)의 내용 중 올바른 것은?", "opts": ["예산은 이사회의 승인을 받음으로써 성립된다.", "불가피한 경우에도 예산의 각 항간의 금액은 전용할 수 없다.", "주무부처에 보고를 한 후, 원장은 예비비를 사용할 수 있다.", "예산통제는 물량통제를 원칙으로 한다."], "ans": 1}, {"id": "2_48", "s": 2, "q": 48, "text": "회계규정(제3장 예산)에 따라 예산집행실적을 종합 분석하여 ( ㉠ )마다 원장에게 보고하여야 한다. ( ㉠ )로 맞는 것은?", "opts": ["매월", "매분기", "매반기", "매년 회계규정 제72조(예산집행실적 보고) ① 부문예산관리자는 매분기 말일을 기준으로 하여 예"], "ans": 2}, {"id": "2_49", "s": 2, "q": 49, "text": "회계규정(제3장 예산)에 따라 예산이 부득이한 사유로 인하여 회계연도 개시 전까 지 성립되지 않은 경우 특정한 항목에 대하여는 전년도 실적범위 내에서 집행할 수 있 는데, 이에 해당하지 않는 항목은?", "opts": ["임직원의 보수", "병원운영 기본경비", "시설의 유지비", "투자개발비 회계규정 제65조(예산불성립시의 예산집행) ① 예산이 부득이한 사유로 인하여 회계연도 개 시 전까지 성립되지 아니한 때에는 당해 회계연도 예산안에 계상된 것으로, 다음 각 호의 경우에는 전년도 실적범위 내에서 집행할 수 있다."], "ans": 4}, {"id": "2_50", "s": 2, "q": 50, "text": "다음 중 회계규정상 예산을 다음 연도에 이월하여 사용할 수 있는 경우는?", "opts": ["구매하기 전에 있는 자본예산", "구매 중에 있는 비용예산", "공사 중에 있는 자본예산", "어떠한 경우에도 이월하여 사용할 수 없다."], "ans": 3}, {"id": "2_51", "s": 2, "q": 51, "text": "다음 출연금관리규정의 내용 중 틀린 것은?", "opts": ["출연금은 특별한 사유가 있는 경우를 제외하고 이월하여 사용할 수 없다.", "출연금은 교육부장관에게 보고한 후, 출연목적 이외에 사용할 수 있다.", "원장은 출연금의 집행실적을 교육부장관에게 보고하여야 한다.", "원장은 출연금의 수입, 징수, 지출원인행위, 지출 및 출납사무를 소속직원에게 위 임할 수 있다."], "ans": 2}, {"id": "2_52", "s": 2, "q": 52, "text": "제규정관리규정(제5조 제정형식)에 따라 규정에 원칙적으로 기재하여야 하는 사항 에 해당하지 않는 것은?", "opts": ["목적", "적용범위", "시행일자", "총칙 제규정관리규정 제5조(제정형식) ① 규정에는 다음 각 호의 사항을 기재함을 원칙으로 한다."], "ans": 4}, {"id": "2_53", "s": 2, "q": 53, "text": "제규정관리규정에 따른 규정심의위원회에 대한 설명 중 틀린 것은?", "opts": ["위원회는 원장 또는 위원장이 소집한다.", "위원회의 회의는 정기회의와 임시회의로 구분하되, 정기회의는 매년 반기별로 1회 소집", "위원회는 재적위원 2분의 1이상의 출석과 출석위원 2분의 1이상의 찬성으로 의결한다.", "위원장이 필요하다고 인정할 때는 회의를 비공개로 할 수 있다."], "ans": 2}, {"id": "2_54", "s": 2, "q": 54, "text": "제규정관리규정에 따른 규정심의위원회 위원장은?", "opts": ["원장", "진료부원장", "기획조정실장", "행정처장 제규정관리규정 제10조(구성) ① 위원회는 위원장을 포함한 15인 이내의 위원으로 구성한다."], "ans": 3}, {"id": "2_55", "s": 2, "q": 55, "text": "제규정관리규정에 따른 규정심의위원회의 위원이 아닌 자는?", "opts": ["교육인재개발실장", "의료혁신실장", "기획부실장", "총무부장 제규정관리규정 제10조(구성) ① 위원회는 위원장을 포함한 15인 이내의 위원으로 구성한다."], "ans": 1}, {"id": "3_1", "s": 3, "q": 1, "text": "서울대학교병원 인사규정에서 사용하는 용어에 대한 설명이다. ( )안에 들어갈 내 용으로 옳은 것은? ③ 가. 하위직급에서 상위직급으로 임용한 것을 ( ㄱ ) 이라고 말한다. 나. 하위 자격등급에서 상위 자격등급으로 임용한 것을 ( ㄴ ) 이라고 말한다. 다. 일정한 재직기간의 경과나 그 밖의 규정에 따라 현재의 연차보다 높은 연차를 부여하는 것을 ( ㄷ ) 이라고 말한다. 라. 직원에게 직위를 부여함을 ( ㄹ ) 이라고 말한다.", "opts": ["ㄱ: 승진, ㄴ: 승급, ㄷ: 보직, ㄹ: 승급", "ㄱ: 승격, ㄴ: 승진, ㄷ: 승급, ㄹ: 보직", "ㄱ: 승진, ㄴ: 승격, ㄷ: 승급, ㄹ: 보직", "ㄱ: 승급, ㄴ: 보직, ㄷ: 승격, ㄹ: 승진"], "ans": 3}, {"id": "3_2", "s": 3, "q": 2, "text": "다음 중 법정육아휴직을 6개월 이내에서 추가로 사용할 수 있는 경우가 아닌 것은?", "opts": ["같은 자녀를 대상으로 부모가 모두 육아휴직을 각각 3개월 이상 사용한 경우의 부 또는 모", "「한부모가족지원법」 제4조제1호의 부 또는 모", "고용노동부령으로 정하는 장애아동의 부 또는 모", "한 번에 둘 이상 자녀를 출산한 경우 남녀고용평등과 일·가정 양립 지원에 관한 법률 제19조(육아휴직) ② 육아휴직의 기간은 1년 이내로 한다. 다만, 다음 각 호의 어느 하나에 해당"], "ans": 4}, {"id": "3_3", "s": 3, "q": 3, "text": "고용노동부령으로 정하는 장애아동의 부 또는 모 3. 서울대학교병원 ‘조건부 임용’ 제도에 대한 설명으로 틀린 것은?", "opts": ["신규채용된 직원은 채용될 직위에 3개월간의 조건부 기간을 거친다.", "조건부 기간 중 인사평가규정에 의한 근무성적평정표의 총점이 80점 미만일 때에 는 정규직원으로 임용될 수 없다.", "조건부 기간 중 병원의 제규정을 위반하였을 때에는 정규직원으로 임용될 수 없 다.", "인사위원회에서 서울대학교병원 직원으로서 부적당하다고 판정되었을 때에는 정 규직원으로 임용될 수 없다."], "ans": 2}, {"id": "3_4", "s": 3, "q": 4, "text": "( 조건부 기간 중, 근무성적평정표의 총점이 60점 미만일 때 정규직원으로 임용될 수 없음. 인사규정 제21조 ) 안에 들어갈 내용으로 옳은 것은? ① 근로기준법 제60조 (연차 유급휴가) ① 사용자는 1년간 80퍼센트 이상 출근한 근 로자에게 ( ㄱ )의 유급휴가를 주어야 한다.\n② 사용자는 계속하여 근로한 기간이 1년 미만인 근로자 또는 1년간 80퍼센트 미 만 출근한 근로자에게 ( ㄴ ) 개근 시 1일의 유급휴가를 주어야 한다. ③ 삭제 ④ 사용자는 3년 이상 계속하여 근로한 근로자에게는 제1항에 따른 휴가에 최초 1년을 초과하는 계속 근로 연수 매 ( ㄷ )에 대하여 1일을 가산한 유급휴가를 주 어야 한다. 이 경우 가산휴가를 포함한 총 휴가 일수는 ( ㄹ )을 한도로 한다. ① ㄱ: 15일, ㄴ: 1개월, ㄷ: 2년, ㄹ: 25일 ② ㄱ: 10일, ㄴ: 1개월, ㄷ: 2년, ㄹ: 30일 ③ ㄱ: 15일, ㄴ: 1주, ㄷ: 2년, ㄹ: 50일 ④ ㄱ: 25일, ㄴ: 1개월, ㄷ: 2년, ㄹ: 25일 근로기준법 제60조(연차 유급휴가)", "opts": ["사용자는 1년간 80퍼센트 이상 출근한 근로자에게 15일의 유급휴가를 주어야 한다.", "사용자는 계속하여 근로한 기간이 1년 미만인 근로자 또는 1년간 80퍼센트 미만 출근한 근로자에게 1개월 개근 시 1일의 유급휴가를 주어야 한다.", "<삭 제>", "사용자는 3년 이상 계속하여 근로한 근로자에게는 제1항에 따른 휴가에 최초 1년을 초과 하는 계속 근로 연수 매 2년에 대하여 1일을 가산한 유급휴가를 주어야 한다. 이 경우 가 산휴가를 포함한 총 휴가 일수는 25일을 한도로 한다."], "ans": 1}, {"id": "3_5", "s": 3, "q": 5, "text": "배우자 출산휴가에 대한 설명으로 옳지 않은 것은?", "opts": ["사업주는 근로자가 배우자의 출산을 이유로 휴가를 고지하는 경우에 20일의 휴가 를 주어야 한다", "배우자 출산휴가는 근로자의 배우자가 출산한 날부터 120일이 지나면 사용할 수 없다.", "배우자 출산휴가는 2회에 한정하여 나누어 사용할 수 있다.", "사업주는 배우자 출산휴가를 이유로 근로자를 해고하거나 그 밖의 불리한 처우를 하여서는 아니 된다"], "ans": 3}, {"id": "3_6", "s": 3, "q": 6, "text": "｢남녀고용평등과 일·가정 양립 지원에 관한 법률｣에 관한 설명 중 옳은 것(O)과 옳 지 않은 것(X)을 올바르게 조합한 것은? ① ㄱ. 근로자란 사업주에게 고용된 자를 말하므로 취업할 의사를 가진 자는 포함되지 않는다. ㄴ. 여성 근로자의 임신, 출산, 수유 등 모성보호를 위한 조치를 취하는 경우 이 법 에서 말하는 차별로 보지 아니한다. ㄷ. 이 법률과 관련한 분쟁해결에서 모든 입증책임은 근로자가 부담한다. ㄹ. 사업주 및 근로자는 성희롱 예방교육을 받아야 한다.", "opts": ["ㄱ(x), ㄴ(o), ㄷ(x), ㄹ(o)", "ㄱ(o), ㄴ(x), ㄷ(x), ㄹ(o)", "ㄱ(x), ㄴ(x), ㄷ(o), ㄹ(o)", "ㄱ(o), ㄴ(o), ㄷ(x), ㄹ(x) (ㄱ) \"근로자\"란 사업주에게 고용된 자와 취업할 의사를 가진 자를 말한다. (제2조 제4호) (ㄴ) 제2조(정의)"], "ans": 1}, {"id": "3_7", "s": 3, "q": 7, "text": "다음은 서울대학교병원 병가에 대한 설명이다. ( )에 들어갈 내용으로 옳은 것은?\n가. 병가는 연 통산 ( ㄱ )을 초과할 수 없다. 나. 병가일수가 ( ㄴ ) 이상인 경우에는 병원이 지정하는 의사의 진단서를 첨부하여야 한다.", "opts": ["ㄱ: 2개월, ㄴ: 4일", "ㄱ: 3개월, ㄴ: 5일", "ㄱ: 6개월, ㄴ: 7일", "ㄱ: 2개월, ㄴ: 5일"], "ans": 4}, {"id": "3_8", "s": 3, "q": 8, "text": "다음은 난임치료휴가에 대한 설명이다. 괄호 안에 들어갈 숫자를 모두 더한 값으로 올바른 것은? ④ 사업주는 근로자가 인공수정 또는 체외수정 등 난임치료를 받기 위하여 휴가를 청구하는 경우에 연간 ( )일 이내의 휴가를 주어야 하며, 이 경우 최초 ( )일은 유급으로 한다. 다만, 근로자가 청구한 시기에 휴가를 주는 것이 정상적인 사업 운영에 중대한 지장을 초래하는 경우에는 근로자와 협의하여 그 시기를 변경할 수 있다.", "opts": ["3", "5", "7", "8 남녀고용평등과 일·가정 양립 지원에 관한 법률 제18조의3(난임치료휴가) ① 사업주는 근로자가 인공수정 또는 체외수정 등 난임치료를 받기"], "ans": 4}, {"id": "3_9", "s": 3, "q": 9, "text": "진단서를 첨부한 경우를 제외하고, 병가가 연간 며칠을 초과한 경우에 보수를 지급 하지 않는가?", "opts": ["6일", "7일", "14일", "1개월 복무규정 제35조"], "ans": 1}, {"id": "3_10", "s": 3, "q": 10, "text": "근로시간과 휴식에 관한 설명 중 옳지 않은 것은?", "opts": ["사용자는 사업 운영에 막대한 지장이 있지 않는 한 근로자가 청구하는 시기에 연 차 유급휴가를 주어야 한다.", "사용자는 근로자대표와의 서면 합의에 따라 연장근로에 대하여 임금을 지급하는 것을 갈음하여 휴가를 줄 수 있다.", "15세 이상 18세 미만인 자의 근로시간은 1일에 6시간, 1주에 30시간을 초과하지 못하지만, 당사자 사이의 합의에 따라 1일에 1시간, 1주에 5시간을 한도로 연장 할 수 있다.", "연장근로이면서 야간근로에 해당하는 경우 연장근로수당, 야간근로수당을 각각 가산하여 지급하여야 한다."], "ans": 3}, {"id": "3_11", "s": 3, "q": 11, "text": "육아기 근로시간 단축에 관한 설명 중 옳지 않은 것은?", "opts": ["만 12세 이하 또는 초등학교 6학년 이하의 자녀를 양육하기 위하여 근로시간의 단축을 신청할 수 있다.", "단축 후 근로시간은 주당 15시간 이상 35시간 이내여야 한다.", "육아기 근로시간 단축의 기간은 1년 이내로 한다.", "육아기 근로시간 단축의 기간은 1년 이내로 한다. 다 만, 근로자가 제19조제2항 본문에 따른 육아휴직 기간 중 사용하지 아니한 기간이 있으 면 그 기간의 두 배를 가산한 기간 이내로 한다."], "ans": 4}, {"id": "3_12", "s": 3, "q": 12, "text": "서울대학교병원 복무에 대한 설명으로 옳지 않은 것은?", "opts": ["직원은 근무시간 시작 전에 출근하여 출근카드에 자신이 직접 서명 또는 날인하 여야 한다.", "상병 기타의 사유로 출근할 수 없을 때에는 미리 신고하여야 하며, 정오까지 신 고가 없을 때에는 결근한 것으로 간주한다.", "직원의 근무상황은 전자적 방법으로 관리할 수 있다.", "조퇴 및 외출로 인한 근무시간의 면제는 1일 4시간을 초과할 수 없다."], "ans": 1}, {"id": "3_13", "s": 3, "q": 13, "text": "｢근로기준법｣ 및 ｢인사규정｣ 에 관한 설명 중 틀린 것은?", "opts": ["18세 이상의 여성근로자를 오후 10시부터 오전 6시까지의 사이 및 휴일에 근로 시키고자 하는 경우에는 당해 근로자의 동의와 고용노동부장관의 동의를 얻어야 한다.", "산후 1년이 경과되지 아니한 여성은 단체협약이 있는 경우라도 1일 2시간을 초과 하는 시간외 근로를 시킬 수 없다.", "사용자는 임신 중의 여성에게 출산 전과 출산 후를 통하여 90일(미숙아를 출산한 경우에는 100일, 한 번에 둘 이상 자녀를 임신한 경우에는 120일)의 출산전후휴가 를 주어야 한다. 이 경우 휴가 기간의 배정은 출산 후에 45일(한 번에 둘 이상 자 녀를 임신한 경우에는 60일) 이상이 되어야 한다.", "임신 중인 여성 직원이 출산 이전에도 모성을 보호하기 위하여 육아휴직을 사용 할 수 있다."], "ans": 1}, {"id": "3_14", "s": 3, "q": 14, "text": "인사규정상 일반직, 운영기능직 및 환경유지지원직 승진·승격 소요 최소년수는 몇 년인가? (단체협약 이외 합의사항 미고려)", "opts": ["1년", "2년", "3년", "8년 인사규정 [별표2] 승진·승격 소요연수 2년 명시."], "ans": 2}, {"id": "3_15", "s": 3, "q": 15, "text": "서울대학교병원 휴직제도에 대한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 업무상 상병으로 6개월간의 병가 후에도 업무를 담당할 수 없다고 인정되는 때 에는 공상휴직을 명할 수 있다. ㄴ. 만 10세 이하 또는 초등학교 3학년 이하의 자녀를 양육하기 위해서 육아휴직을 신청할 수 있다. ㄷ. 조부모, 부모, 배우자, 자녀 또는 배우자의 부모(이하 “가족”이라 한다)의 질병, 사고, 노령으로 인하여 그 가족을 돌보고자 할 때 간병휴직을 신청할 수 있다. ㄹ. 난임 또는 불임으로 휴직을 신청할 수 없다.", "opts": ["ㄱ", "ㄱ,ㄷ", "ㄴ,ㄹ", "ㄴ,ㄷ,ㄹ 인사규정 제37조"], "ans": 1}, {"id": "3_16", "s": 3, "q": 16, "text": "국외유학휴직 및 자기계발휴직을 신청할 수 있는 재직기간으로 옳게 짝지어진 것은? (2022년 이후 기준)", "opts": ["국외유학휴직 10년, 자기계발휴직 13년", "국외유학휴직 10년, 자기계발휴직 11년", "국외유학휴직 8년, 자기계발휴직 9년", "국외유학휴직 8년, 자기계발휴직 5년"], "ans": 4}, {"id": "3_17", "s": 3, "q": 17, "text": "근로기준법상 임금채권의 소멸시효기간은?", "opts": ["6개월", "1년", "2년", "3년 근로기준법 제49조(임금의 시효) 이 법에 따른 임금채권은 3년간 행사하지 아니하면 시효로 소멸한다."], "ans": 4}, {"id": "3_18", "s": 3, "q": 18, "text": "근로기준법상 취업규칙에 관한 설명으로 옳지 않은 것은? (다툼이 있는 경우에는 판례에 의함)", "opts": ["취업규칙의 작성과 변경에 관한 권한은 원칙적으로 사용자에게 있다.", "사용자는 근로자에게 유리하게 취업규칙을 변경할 때도 근로자측의 의견을 들어 야 한다.", "해당 사업 또는 사업자에 근로자의 과반수로 조직된 노동조합이 없는 경우에는 노동조합 대표자와 조합원 과반수의 동의를 모두 받아야 한다.", "사용자는 취업규칙을 근로자가 자유롭게 열람할 수 있는 장소에 항상 게시하거나 갖추어 두어 근로자에게 널리 알려야 한다."], "ans": 3}, {"id": "3_19", "s": 3, "q": 19, "text": "정년 잔여기간이 1년 이내에 있는 자가 퇴직한 후 사회 적응능력 배양을 위하여 연수를 희망할 경우에는 인사위원회의 의결을 거쳐 ( 수 있다. 빈칸에 들어갈 일수는?", "opts": ["15일", "3개월", "6개월", "1년 인사규정 제52조의2 ) 이내에서 이를 허가할"], "ans": 4}, {"id": "3_20", "s": 3, "q": 20, "text": "서울대학교병원 명예퇴직에 대한 설명으로 옳지 않은 것은?", "opts": ["명예퇴직하고자 하는 자는 명예퇴직 예정일 현재 20년 이상 근속하여야 한다.", "정년퇴직일을 6개월 남긴 직원도 명예퇴직을 신청할 수 있다.", "원장은 예산상 필요한 경우에는 장기근속한 직원의 명예퇴직 대상범위를 제한할 수 있다.", "형사사건으로 기소 중인 자는 명예퇴직을 신청할 수 없다."], "ans": 2}, {"id": "3_21", "s": 3, "q": 21, "text": "｢근로기준법｣상 임산부의 보호에 관한 설명으로 옳지 않은 것은?", "opts": ["사용자는 임신 중인 여성근로자가 명시적으로 청구한 경우 시간외근로를 시킬 수 있다.", "사용자는 산후 1년이 지나지 아니한 여성에 대하여는 단체협약이 있는 경우라도 1일에 2시간, 1주일에 6시간, 1년에 150시간을 초과하는 시간외근로를 시키지 못 한다.", "사용자는 임신 중인 여성근로자의 요구가 있는 경우 쉬운 종류의 근로로 전환하 여야 한다.", "사용자는 임산부를 도덕상 또는 보건상 유해·위험한 사업에 사용하지 못한다."], "ans": 1}, {"id": "3_22", "s": 3, "q": 22, "text": "｢남녀고용평등과 일·가정 양립 지원에 관한 법률｣에 관한 설명 중 옳지 않은 것은?", "opts": ["임신 중인 여성 근로자는 모성보호를 위하여 육아휴직을 사용할 수 있으며, 이를 포함하여 3회에 한정하여 육아휴직을 나누어 사용할 수 있다.", "근로자는 육아기 근로시간 단축을 나누어 사용할 수 있으며, 나누어 사용하는 1 회의 기간은 1개월 이상이 되어야한다.", "근로자는 가족의 질병, 사고, 노령으로 인하여 그 가족을 돌보기 위하여 근로시간 단축을 사용할 수 있다.", "배우자 출산휴가 기간은 유급으로 한다."], "ans": 1}, {"id": "3_23", "s": 3, "q": 23, "text": "서울대학교병원 징계에 대한 설명으로 옳지 않은 것은?", "opts": ["강등은 1자격등급 아래로 직급 또는 자격등급을 내리고 직원신분은 보유하나 3개 월간 직무에 종사하지 못하며 그 기간 중 월정급여의 전액을 감액 지급한다.", "정직은 1개월 이상 3개월 이내로 하고 그 기간 중 직원의 신분은 보유하나 직무 에 종사하지 못하며 정직기간 중에는 월정급여의 전액을 감액 지급한다.", "감봉은 1개월 이상 3개월 이내로 하고 그 기간 중 월정급여의 3분의 1을 감액 지급한다.", "직원이 2년 이내에 2회 이상 징계될 경우에는 그 횟수에 따라 가중징계를 할 수 있다."], "ans": 3}, {"id": "3_24", "s": 3, "q": 24, "text": "서울대학교병원 직원은 자녀를 양육하기 위하여 근로시간의 단축, 즉 육아기 근로 시간 단축을 신청할 수 있다. 육아기 근로시간 단축을 허용하는 경우 단축 후 근로 시간 허용범위로 옳은 것은?", "opts": ["주당 10시간 이상 30시간 이내", "주당 10시간 이상 35시간 이내", "주당 15시간 이상 35시간 이내", "주당 15시간 이상 40시간 이내"], "ans": 3}, {"id": "3_25", "s": 3, "q": 25, "text": "임신 후 12주 이내 또는 32주 이후에 있는 직원은 1일 ( )시간의 근로시간 단 축을 신청할 수 있다. 빈칸에 들어갈 일수는?", "opts": ["1", "2", "3", "6 근로기준법 제74조(임산부의 보호) ⑦ 사용자는 임신 후 12주 이내 또는 32주 이후에 있는 여성 근로자(고용노동부령으로 정하는 유산, 조산 등 위험이 있는 여성 근로자의 경우 임신"], "ans": 2}, {"id": "3_26", "s": 3, "q": 26, "text": "승진·승격후보자 명부는 최근 3년간 개인종합평가 점수를 100점을 만점으로 하여 작성하는데, 각 연도별 반영비율은 어떻게 되는가?", "opts": ["최근 1년 이내의 점수 33% + 최근 1년 전 2년 이내의 점수 33% + 최근 2년 전 3년 이내의 점수 33%", "최근 1년 이내의 점수 50% + 최근 1년 전 2년 이내의 점수 30% + 최근 2년 전 3년 이내의 점수 20%", "최근 1년 이내의 점수 60% + 최근 1년 전 2년 이내의 점수 30% + 최근 2년 전 3년 이내의 점수 10%", "최근 1년 이내의 점수 40% + 최근 1년 전 2년 이내의 점수 30% + 최근 2년 전 3년 이내의 점수 30%"], "ans": 2}, {"id": "3_27", "s": 3, "q": 27, "text": "승진·승격후보자 명부 작성 방식 중 포상가점에 대한 설명으로 옳지 않은 것은?", "opts": ["포상이 2개 이상인 때에는 그 중 점수가 많은 것 하나만을 가산한다.", "승진·승격후보자 명부 작성 기준일로부터 4년 이내에 당해 자격등급에서 받은 것 에 한한다.", "원장표창은 2점 가산한다.", "장관표창은 3점 가산한다."], "ans": 4}, {"id": "3_28", "s": 3, "q": 28, "text": "직원이 당해 자격등급 근무기간별로 승진·승격후보자 명부에 점수를 가산하게 규정 되어 있다. 옳게 짝지어진 것은?", "opts": ["당해 자격등급 4년 이상 1점, 당해 자격등급 5년 이상 2점, 당해 자격등급 6년 이상 3점", "당해 자격등급 4년 이상 1점, 당해 자격등급 5년 이상 3점, 당해 자격등급 6년 이상 5점", "당해 자격등급 5년 이상 1점, 당해 자격등급 6년 이상 2점, 당해 자격등급 7년 이상 3점", "당해 자격등급 3년 이상 1점, 당해 자격등급 4년 이상 2점, 당해 자격등급 5년 이상 3점"], "ans": 3}, {"id": "3_29", "s": 3, "q": 29, "text": "다음 설명 중 옳지 않은 것은?", "opts": ["직원의 인사평가는 매년 12월 31일을 기준으로 연 1회 실시한다.", "직원 인사평가 기간은 당해연도 1월 1일부터 12월 31일까지로 한다.", "개인종합평가 결과는 공개하지 않는다.", "승진·승격후보자 명부는 공개하지 않는다."], "ans": 3}, {"id": "3_30", "s": 3, "q": 30, "text": "승진·승격 합격자 사정 방법으로 옳은 것은?", "opts": ["승진·승격후보자 명부의 총점 8할, 심사점수 2할을 합산한 성적에 의한 고득점자 순으로 합격자를 사정한다.", "승진·승격후보자 명부의 총점 7할, 심사점수 3할을 합산한 성적에 의한 고득점자 순으로 합격자를 사정한다.", "승진·승격후보자 명부 순으로 합격자를 사정한다.", "최근 3년 개인종합평가와 포상가점의 합산점수 5할, 필기시험의 성적 3할, 심사점 수 2할을 합산한 성적에 의한 고득점자 순으로 합격자를 사정한다."], "ans": 1}, {"id": "3_31", "s": 3, "q": 31, "text": "승진·승격 심사 대상자는 심사요구일 현재 해당 자격등급 승진·승격후보자 명부의 순위에 의하며 선발예정인원의 몇 배수 범위 안에 있는 자로 하는가?", "opts": ["1.5배수", "2배수", "3배수", "1명 5배수, 2명 4배수, 3명 이상 3배수"], "ans": 1}, {"id": "3_32", "s": 3, "q": 32, "text": "서울대학교병원 제규정상 징계사유의 시효 중 옳은 것은?", "opts": ["징계사유가 발생한 날로부터 3년 (금품 및 향응 수수, 공금의 횡령ㆍ유용, 채용비 위의 경우에는 5년)", "징계사유가 발생한 날로부터 1년 (금품 및 향응 수수, 공금의 횡령ㆍ유용, 채용비 위의 경우에는 3년)", "징계 조사일로부터 2년 (금품 및 향응 수수, 공금의 횡령ㆍ유용, 채용비위의 경우 에는 3년)", "징계 관련 사실을 알게된 날로부터 3년"], "ans": 1}, {"id": "3_33", "s": 3, "q": 33, "text": "근로기준법상 휴게와 휴일에 관한 설명 중 옳지 않은 것은?", "opts": ["사용자는 근로시간 8시간에 대하여 1시간 이상의 휴게시간을 주어야 한다.", "휴게시간은 근로자가 근로시간 도중 사용자의 지휘 또는 명령으로부터 벗어나 자 유로이 이용할 수 있는 시간을 의미한다.", "근로자가 1주간의 소정근로일수를 개근하지 않아도 사용자는 1주일에 1회 이상의 유급휴일을 부여할 의무가 있다.", "작업상의 사정으로 대기하는 시간은 근로시간에 포함된다."], "ans": 3}, {"id": "3_34", "s": 3, "q": 34, "text": "다음 중 근속기간에 산입되는 휴직은?", "opts": ["질병휴직", "요양휴직", "간병휴직", "가족돌봄휴직 인사규정 제38조"], "ans": 4}, {"id": "3_35", "s": 3, "q": 35, "text": "기간제 및 단시간근로자 보호 등에 관한 법률의 내용으로 옳은 것은?", "opts": ["노동위원회가 차별적 처우의 시정신청에 대하여 시정명령을 발하는 경우 그 시정 명령의 내용에 취업규칙, 단체협약 등의 제도개선 명령은 포함될 수 없다.", "단시간근로자에 대한 차별적 처우의 금지와 관련한 분쟁에 있어서 입증책임은 사 용자가 부담한다.", "사용자는 기간제근로자와 근로계약을 체결하는 때에는 근로일 및 근로일별 근로 시간을 서면으로 명시하여야 한다.", "사용자는 단시간근로자에 대하여 근로기준법에 따른 소정근로시간을 초과하여 근 로하게 하는 경우에는 당해 근로자의 동의를 얻으면 1주간에 12시간을 초과하여 근로하게 할 수 있다."], "ans": 2}, {"id": "3_36", "s": 3, "q": 36, "text": "남녀고용평등과 일가정 양립 지원에 관한 법령에 규정된 내용으로 옳지 않은 것 은?", "opts": ["사업주, 상급자 또는 근로자는 직장 내 성희롱을 하여서는 아니된다.", "사업주는 직장 내 성희롱 예방교육을 연 1회 이상 받아야 한다.", "사업주는 근로자가 인공수정 또는 체외수정 등 난임치료를 받기 위하여 휴가를 청구하는 경우에 연간 6일 이내의 휴가를 주어야 한다.", "사업주는 근로자가 배우자의 출산을 이유로 휴가를 청구하는 경우에 10일의 휴가 를 주어야 한다."], "ans": 4}, {"id": "3_37", "s": 3, "q": 37, "text": "인사평가에 대한 설명으로 옳지 않은 것은?", "opts": ["평가는 매년 12월 31일을 기준으로 연 1회 실시하되 그 평가기간은 당해연도 1월 1일부터 12월 31일까지로 한다.", "평가개시일 현재 근속기간이 1년 미만인 자는 평가대상에서 제외한다.", "평가기준일 현재 휴직 중인 자는 평가대상에서 제외한다.", "1차평가자와 2차평가자의 점수 반영비율은 각각 50%로 한다."], "ans": 2}, {"id": "3_38", "s": 3, "q": 38, "text": "휴직 사유별 기간에 대한 설명으로 옳지 않은 것은?", "opts": ["육아휴직의 경우, 여자 직원의 경우 자녀 1명에 대하여 3년 이내로 실시하며, 남 자 직원의 경우에는 자녀 1명에 대하여 1년 이내로 실시한다.", "간병휴직, 요양휴직, 임신휴직의 합산 기간은 재직기간 중 3년을 넘을 수 없다.", "자기계발휴직의 경우, 1년 6개월 이내로 실시한다.", "질병 또는 부상으로 장기간 직무를 수행할 수 없다고 인정하였을 때에는 1년 이 내로 휴직을 실시한다."], "ans": 1}, {"id": "3_39", "s": 3, "q": 39, "text": "서울대병원 휴가 제도에 대한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 재직기간 10년 이상 20년 미만 직원의 경우 5일, 재직기간 20년 이상 직원의 경우 7일의 장기재직휴가를 사용할 수 있다. ㄴ. 배우자 임신검진 동행휴가는 임신기간 중 최대 10일 사용 가능하며, 반드시 하루 단위로 사용하여야한다. ㄷ. 본인과 배우자의 형제, 자매 사망 시 출원에 의하여 1일의 청원휴가를 부여할 수 있다. ㄹ. 배우자의 유산, 사산 시 3일의 청원휴가를 부여하며, 1회 분할하여 사용할 수 있다.", "opts": ["ㄱ, ㄴ", "ㄴ, ㄷ", "ㄷ, ㄹ", "ㄱ, ㄹ ㄱ. 2025년 단체협약 이외 합의사항 ㄴ. 배우자 임신검진 동행휴가는 임신기간 중 최대 10일 사용 가능하며, 반일 또는 하루 단위로"], "ans": 4}, {"id": "3_40", "s": 3, "q": 40, "text": "남녀고용평등과 일·가정 양립 지원에 관한 법률상 직장 내 성희롱에 대한 설명으로 옳지 않은 것은? (다툼이 있으면 판례에 의함)", "opts": ["근로자가 직장 내의 지위를 이용하여 다른 근로자에게 성적 언동 등으로 성적 굴 욕감을 느끼게 하는 것은 직장 내 성희롱에 해당한다.", "직장 내 성희롱이 성립하기 위해서는 행위자에게 반드시 성적 동기나 의도가 있 어야 한다.", "사업주는 직장 내 성희롱 피해 발생을 주장하는 근로자에게 해고나 그 밖의 불리 한 조치를 하여서는 아니 된다.", "사업주는 직장 내 성희롱 발생이 확인된 경우 지체 없이 행위자에 대하여 징계나 그 밖에 이에 준하는 조치를 하여야 한다."], "ans": 2}, {"id": "3_41", "s": 3, "q": 41, "text": "다음 중 인사위원회에 대한 설명으로 옳지 않은 것은?", "opts": ["인사관리에 관한 기본계획과 인사규정에 규정된 인사에 관한 중요 사항을 심의하 게 하기 위하여 원장의 자문기관으로 인사위원회를 둔다.", "위원장은 진료부원장이 되고, 위원은 소아진료부원장, 행정처장, 기획조정실장, 교 육인재개발실장, 간호본부장, 총무부장, 약제부장과 원장이 임명하는 4인 이내의 위원으로 구성한다.", "위원장은 인사위원회의 공정성 제고를 위하여 필요한 경우에 변호사, 교수, 공인 노무사 및 관계 공무원 등 외부 전문가를 위원으로 위촉할 수 있다.", "인사위원회는 직원의 징계에 관하여는 재적위원 과반수의 출석과 출석위원 과반 수의 찬성으로 의결한다."], "ans": 4}, {"id": "3_42", "s": 3, "q": 42, "text": "다음 중 연장근무에 대한 설명으로 옳지 않은 것은?", "opts": ["시간외근무수당은 15분 단위로 계산하여 지급한다.", "시간외·휴일·야간근무는 연장근무명령부에 의하여 당해 부서장의 사전 결재를 얻 은 다음에 행하여야 한다.", "여비규정에 의해 출장여비를 지급받는 경우에도 연장근무수당을 지급받을 수 있다.", "시간외·휴일·야간근무수당은 전월분을 익월 보수지급일에 합산 지급한다."], "ans": 3}, {"id": "3_43", "s": 3, "q": 43, "text": "다음 중 출장에 대한 설명으로 옳지 않은 것은?", "opts": ["직원이 업무수행을 위하여 출장할 때에는 사전에 신청서를 제출하여 출장명령을 받아야 한다.", "국외출장과 국내출장 모두 위임전결규정에 따라 기본품의를 득하지 않은 경우에도 부서장 전결로 출장명령을 받을 수 있다.", "원장은 여비를 지급하지 아니할 충분한 이유가 있다고 인정될 때에는 여비의 정 액을 감하거나 여비의 전부 또는 일부를 지급하지 아니할 수 있다.", "국내출장을 마친 후 1개월 이내에, 운임과 숙박비의 세부 사용내용을 확인할 수 있는 증거서류를 갖추어 정산을 신청하여야 한다."], "ans": 2}, {"id": "3_44", "s": 3, "q": 44, "text": "다음 중 직원 채용에 대한 설명으로 옳지 않은 것은?", "opts": ["직원 채용은 공개경쟁 시험을 원칙으로 하며, 응시자의 공평한 기회 보장을 위해 성별·신체조건·용모·학력·연령 등에 대한 불합리한 제한을 두어서는 아니된다.", "채용 시 응시자와 친족관계에 있는 자는 서류전형 및 면접전형의 시험위원이 될 수 없다.", "비정규직(계약기간 1년 이상) 또는 채용형 인턴을 채용하는 경우에는 신규채용 직 원의 수 및 채용 당시 친인척이 재직하고 있는 신규채용 직원의 수를 홈페이지에 공개하지 않을 수 있다.", "비상상황에 대응하기 위하여 비상상황 종료 시까지 한시적으로 근무할 인력을 긴 급하게 채용할 필요가 있다고 판단하는 경우에는 채용 절차를 간소화할 수 있다."], "ans": 3}, {"id": "3_45", "s": 3, "q": 45, "text": "다음 중 설명으로 옳은 것은?", "opts": ["근로기준법에서 정하는 기준에 미치지 못하는 근로조건을 정한 근로계약은 그 근 로계약 전부를 무효로 한다.", "취업규칙은 법령이나 해당 사업 또는 사업장에 대하여 적용되는 단체협약과 어긋 나서는 아니 된다.", "취업규칙을 근로자에게 유리하게 변경하는 경우에도 노동조합 또는 근로자 과반 의 동의를 받아야 한다.", "취업규칙에서 정한 기준에 상회하는 근로조건을 정한 근로계약은 그 부분에 관하 여는 무효로 한다. 이 경우 무효로 된 부분은 취업규칙에 정한 기준에 따른다."], "ans": 2}, {"id": "4_1", "s": 4, "q": 1, "text": "의사직(교수직, 임상강사, 전공의 등)의 보수 지급일은?", "opts": ["5일", "15일", "17일", "25일 보수규정 제17조의 5, 전공의보수규정 제4조"], "ans": 4}, {"id": "4_2", "s": 4, "q": 2, "text": "우리 병원의 보수는 직무능력급, 직책급 및 특수급여로 구성되어 있다. 이중 직무능 력급에 해당하지 않는 항목은?", "opts": ["기본급", "능력급", "특별상여금", "상여금 보수규정 제3조 2 직무능력급은 기본급, 능력급, 상여금 및 조정급을 말한다."], "ans": 3}, {"id": "4_3", "s": 4, "q": 3, "text": "다음 중 통상임금에 해당하지 않는 항목은?", "opts": ["장기근속수당", "업무보조비", "급식보조비", "연말격려금 근로기준법시행령 제6조(통상임금)에 따르면 통상임금이란 근로자에게 정기적‧일률적으로 소"], "ans": 4}, {"id": "4_4", "s": 4, "q": 4, "text": "병원에서 지급하는 각종 수당 관련 내용이 적절하지 않은 것은?", "opts": ["겸직교원, 임상교수요원에게 지급하는 의학연구비는 교수, 부교수에 따라 차등 지 급한다.", "병원은 산전 후 휴가 기간 중 무급휴가 기간에 대한 임금차액분(통상임금과 고용 보험에서 지급하는 산전 후 휴가급여의 차액분)을 지급한다.", "직원의 복무, 인사관리 상 특히 필요하다고 인정하는 때에 병원장은 예산의 범위 내에서 지급대상을 정하여 별정수당을 지급할 수 있다.", "휴직, 직위해제 징계처분 등으로 보수가 감액 지급되는 자에게는 장기근속수당을 규정에서 정한 비율만큼 감액하여 지급한다."], "ans": 1}, {"id": "4_5", "s": 4, "q": 5, "text": "통상근무로서 야간근무를 하는 자의 야간근무수당은 매 근무시간에 대하여 통상임 금의 209분의 1의 몇 %를 지급하는가?", "opts": ["50%", "100%", "150%", "200% 보수규정 제27조"], "ans": 1}, {"id": "4_6", "s": 4, "q": 6, "text": "우리 병원은 진료에 대한 기여도에 따라 진료기여수당을 지급하고, 지급액은 전년도 의료수익의 일정 비율을 상한으로 하여 지급하도록 규정하고 있다. 다음 중, 상한의 비율은?", "opts": ["2.0%", "3.0%", "4.0%", "5.0% 보수규정 제29조의 2 ②항"], "ans": 2}, {"id": "4_7", "s": 4, "q": 7, "text": "우리 병원은 규정 개정에 따라 군 복무 경력에 대한 수당을 지급하고, 이는 전 직원 이 아닌 특정 시기 이후 임용자에 대하여 적용하고 있다. 다음 중 특정 시기에 해당 하는 날짜는?", "opts": ["2015년 7월 1일", "2017년 1월 1일", "2017년 12월 28일", "2018년 1월 1일"], "ans": 4}, {"id": "4_8", "s": 4, "q": 8, "text": "우리 병원은 규정 개정을 통해 신규 간호사의 교육기간에 대한 보수를 정규직 급여 를 일정비율로 감액한 후 지급하여, 신규 간호사에 대한 처우를 보장하고 있다. 다 음 중, 감액비율로 맞는 것은?", "opts": ["65%", "70%", "75%", "80% 보수규정 제18조의 2"], "ans": 4}, {"id": "4_9", "s": 4, "q": 9, "text": "연차수당 지급일은?", "opts": ["1월 1일", "1월 5일", "1월 10일", "1월 15일 보수규정 제28조 ①항"], "ans": 3}, {"id": "4_10", "s": 4, "q": 10, "text": "연차수당은 근무한 휴가일 1일에 대하여 통상임금, 복리후생관리내규의 가계지원비 및 명절지원비 월할액의 합계의 26.125분의 1의 몇 %를 연차수당으로 지급하는가?", "opts": ["50%", "100%", "150%", "200% 보수규정 제28조 ②항"], "ans": 2}, {"id": "4_11", "s": 4, "q": 11, "text": "우리 병원은 잔여 연차휴가가 있는 경우 다음 해 1월 10일 연차수당을 통해 이를 금액으로 보전하고 있다. 다음 중, 연차수당 금액 산정에 포함되지 않는 수당은?", "opts": ["가계지원비", "명절지원비", "초과근로수당 보수규정 제28조 ②항", "통상임금"], "ans": 3}, {"id": "4_12", "s": 4, "q": 12, "text": "우리 병원의 직원 A는 2017년 1월 6일 사무직으로 입사하여 현재 재직중이다. A가 2017년 1월에 받은 명절지원비 금액은? (A씨의 기본급은 100만원으로 가정하며, 2017년의 설날은 1월 28일이다)", "opts": ["0원", "330,000원", "500,000원", "660,000원 복리후생관리내규 제6조 ①항"], "ans": 1}, {"id": "4_13", "s": 4, "q": 13, "text": "우리 병원의 직원 A는 개인적 사정으로 가족돌봄휴직을 고려중이다. 만일 A가 2018년 8월 15일에 휴직을 시작한다면, A가 받을 수 있는 8월 가계지원비 금액 은? (A씨의 가계지원비는 1,100만원으로 가정한다)", "opts": ["0원", "500,000원", "750,000원", "1,000,000원 복리후생관리내규 제5조 ①항"], "ans": 1}, {"id": "4_14", "s": 4, "q": 14, "text": "우리 병원의 직원 A는 인사팀으로부터 상병에 의한 휴직 1개월을 인정받았다. 이 때 휴직기간 동안 A가 받을 수 있는 급여총액은? (각종 공제액은 고려하지 않으며, A의 휴직 전 급여액은 아래와 같으며, 표상의 급여항목 외의 급여는 없는 것으로 가정한다) ② 급여항목 기본급 능력급 상여금 가계지원비 교통보조비 급식보조비", "opts": ["250,000원 금 액 500,000원 400,000원 100,000원 500,000원 100,000원 100,000원", "700,000원", "1,500,000원 비 고", "1,700,000원 보수규정 제9조에서 “상병으로 인한 휴직자는 그 기간 중 직무능력급의 100분의 70을 지급한 다”고 규정되어 있다. 또한 동 규정 제3조에서 “직무능력급이라 함은 기본급, 능력급, 상여금"], "ans": 2}, {"id": "4_15", "s": 4, "q": 15, "text": "임금피크제 1년차 대상자의 급여 감액 비율은?", "opts": ["10%", "20%", "30%", "40% 보수규정 제37조2 ③항에 따라 임금피크제 대상자는 보수의 60%를 지급함으로 명시되어 있 으므로 감액 비율은 40%가 됨"], "ans": 4}, {"id": "4_16", "s": 4, "q": 16, "text": "임금피크제 적용중인 대상자가 정년퇴직(60세)을 하는 경우 퇴직급여 평균임금 산 출기준이 되는 시점은?", "opts": ["임금피크제 적용 시점 (60세)", "정년퇴직 기준일 2년 전 시점", "임금피크제 적용 직전 시점 (59세)", "사학연금가입 직전 시점"], "ans": 3}, {"id": "4_17", "s": 4, "q": 17, "text": "특별휴가 기간 중의 보수 지급 방법으로 옳지 않은 것은?", "opts": ["복무규정 제33조 제4호의 특별휴가 사용 시 월 기본급의 일액을 공제한다.", "복무규정 제33조 제4호의 특별휴가 사용 시 월정급여의 일액을 공제한다.", "미성년자 자녀가 1명인 직원의 가족돌봄휴가는 자녀 돌봄을 사유로 연간 2일까지 유급으로 한다.", "성년인 장애인 자녀가 있는 직원의 가족돌봄휴가는 자녀 돌봄을 사유로 연간 3일 까지 유급으로 한다."], "ans": 2}, {"id": "4_18", "s": 4, "q": 18, "text": "우리 병원은 복리후생관리내규를 근거로 하여 가계지원비를 지급하고 있다. 다음 중 가계지원비가 지급되지 않는 달은? (설날은 1월로, 추석은 9월로 가정)", "opts": ["2월", "5월", "8월", "10월 복리후생관리내규 제5조 ②항"], "ans": 1}, {"id": "4_19", "s": 4, "q": 19, "text": "우리 병원은 복리후생관리내규를 통하여 직원의 복리후생증진을 도모하고 있다. 하 지만 휴직기간 동안은 지급제한이 되는 항목이 존재하는데, 다음 중 휴직기간 동안 지급제한에서 제외되는 항목은?", "opts": ["자녀장학지원사업금", "경조비", "진료비감면", "맞춤형 복지제도"], "ans": 3}, {"id": "4_20", "s": 4, "q": 20, "text": "우리 병원은 원활한 진료를 위하여, 근무시간 외에 응급환자 진료를 위하여 내원하 는 직원에게 온콜교통비를 지급하고 있다. 만일 임상강사 1년차 A씨가 한달간 5번 내원하였다면, 지급받을 수 있는 금액은?", "opts": ["100,000원", "150,000원", "200,000원", "250,000원 복리후생관리내규 제12조(온콜교통비)에서 근무시간 외에 응급환자 진료를 위하여 내원하는 자에게는 내원 시마다 온콜교통비(식대포함)를 다음 각 호와 같이 지급한다."], "ans": 4}, {"id": "4_21", "s": 4, "q": 21, "text": "우리 병원의 군복무수당 지급기준으로 옳은 것은?", "opts": ["2018년 1월 1일 이후 임용된 직원 중 상근 예비역, 보충역 등을 제외한 군 복무 경력이 있는 자를 대상으로 지급한다.", "군복무수당의 월 지급액은 복무기간 24개월 기준 36,000원이다.", "1개월 미만의 복무기간은 1개월로 계산한다.", "직업군인의 경우 「병역법」 제18조제2항의 최대 복무기간을 초과하여 지급할 수 있다."], "ans": 3}, {"id": "4_22", "s": 4, "q": 22, "text": "우리 병원은 제도 변경에 따른 직원의 불이익을 막기 위하여 연차보전수당을 지급 하고 있다. 다음 중, 연차보전수당 지급대상에 해당하지 않는 직원은?", "opts": ["2000년 1월 1일에 단시간 근무자로 입사했다가 2003년 6월 1일 정규직이된 A직 원", "2002년 1월 1일 정규직으로 입사한 B직원", "2003년 1월 1일에 단시간 근무자로 입사했다가 2004년 1월 1일에 정규직으로 재 입사 한 C직원", "2005년 1월 1일 정규직으로 입사한 D직원 보수규정 제28조 3항에서 “2004년 6월 30일 현재 재직 중인 상근 임원 및 직원에게 제도변"], "ans": 4}, {"id": "4_23", "s": 4, "q": 23, "text": "직책급 지급대상자 중 지급액이 다른 대상은?", "opts": ["진료부원장", "기획조정실장 2026. UPDATE", "연구부원장 보수규정 [별표 3-1] 직책급 지급 기준", "행정처장"], "ans": 2}, {"id": "4_24", "s": 4, "q": 24, "text": "직원이 둘 이상의 직을 겸무하였을 경우 보수 지급 기준은?", "opts": ["상위 직무 하나 지급", "하위 직무 하나 지급", "둘 이상 중복 지급", "둘 이상 모두 미지급"], "ans": 1}, {"id": "4_25", "s": 4, "q": 25, "text": "명절지원비 지급 월이 아닌 달은?", "opts": ["설날이 속해있는 달", "3월", "5월", "7월 복리후생관리내규 제6조 ②항 명절지원비는 설날, 추석이 속하는 달 및 5월, 7월 보수지급일에 지급함"], "ans": 2}, {"id": "4_26", "s": 4, "q": 26, "text": "우리 병원의 명절지원비는 설, 추석이 속하는 달과 5월, 7월에 지급됩니다. 다음 중 5월 명절지원비의 금액으로 옳은 것은?", "opts": ["50만원", "100만원", "기본급의 50%", "기본급의 100% 복리후생관리내규 제6조 ①항"], "ans": 3}, {"id": "4_27", "s": 4, "q": 27, "text": "징계자의 보수 지급 방법으로 옳지 않은 것은?", "opts": ["감봉자는 감봉기간동안 월정급여의 10분의 1을 감액 지급하나, 1회 감액이 월정 급여 1일분의 2분의 1을 초과하는 경우, 월정급여의 2분의 1을 감액 지급한다.", "정직자는 그 기간동안 직책급을 포함한 월정급여 전액을 감액한다.", "강등자는 직무에 종사하지 못하는 3개월동안 직책급을 지급하지 아니한다.", "강등자는 강등된 후의 보수를 기준으로 직책급 외 월정급여의 전액을 감액 지급 한다."], "ans": 1}, {"id": "4_28", "s": 4, "q": 28, "text": "진료기여수당 지급 대상이 아닌 사람은?", "opts": ["전공의", "간호직", "겸직교수", "임상강사 보수규정 제29조의 2 ①항"], "ans": 2}, {"id": "4_29", "s": 4, "q": 29, "text": "다음 중 급여가 지급되는 휴직은?", "opts": ["질병휴직", "요양휴직", "자기계발휴직", "가족돌봄휴직 보수규정 제9조 ①항"], "ans": 1}, {"id": "4_30", "s": 4, "q": 30, "text": "명예퇴직수당 지급액 산정 시 명예퇴직자의 최대로 인정되는 정년 잔여기간은?", "opts": ["2년", "5년", "7년", "10년 보수규정 [별표6] 명예퇴직수당지급액 산정"], "ans": 4}, {"id": "4_31", "s": 4, "q": 31, "text": "퇴직급여는 퇴직 후 며칠 이내에 지급하여야 하는가?", "opts": ["7일", "14일", "21일", "28일 보수규정 제34조 ⑥항"], "ans": 2}, {"id": "4_32", "s": 4, "q": 32, "text": "만 1년 이상 근속한 보기의 직원 중 퇴사 시 퇴직급여 지급 대상이 아닌 직원은?", "opts": ["2016년 1월 입사 일반직 간호사", "2016년 12월 입사 일반직 간호사", "2016년 1월 입사 단시간 간호사", "2016년 12월 입사 단시간 간호사 보수규정 제 34조 ③항"], "ans": 2}, {"id": "4_33", "s": 4, "q": 33, "text": "퇴직금 중간정산의 총재원은 전년도 발생 퇴직급여 충당금액의 몇% 재원 이내로 가능한가?", "opts": ["10%", "12%", "13%", "15% 퇴직금 중간정산 운영 지침 제2조"], "ans": 2}, {"id": "4_34", "s": 4, "q": 34, "text": "퇴직금 중간정산 관련 내용이 적절하지 않은 것은?", "opts": ["중간정산은 연 4회 실시하며, 매분기 마지막 말일까지 지급한다.", "중간정산 신청자의 3개월(신청 전년도 말일 기준)간의 변동 수당금액이 현저히 증 가한 경우라도 병원은 근로자퇴직급여 보장법에 의하여 퇴직금을 지급해야 할 의 무가 있으므로 중간정산 대상자에서 제외할 수 없다.", "중간정산의 단위기간 산정시, 1년미만은 월할 계산하고, 월미만은 절사한다.", "중간정산이 결정된 직원 중 재정보증 징구대상에 해당되는 직원은 본원을 피보험 자로 하는 재정보증보험에 가입하여야 한다."], "ans": 2}, {"id": "4_35", "s": 4, "q": 35, "text": "퇴직금 중간정산은 근로자 퇴직급여보장법 2항 사유에 해당하는 직원만 신청할 수 있다. 다음 중 그 사유에 해당하지 않는 것은?", "opts": ["무주택자인 근로자가 본인 명의로 주택을 구입하거나, 주거를 목적으로 전세금 혹은 보증금을 부담하는 경우", "근로자 혹은 자녀의 결혼비용을 근로자가 부담하는 경우", "근로자 본인 혹은 배우자, 부양가족의 질병이나 부상에 대한 요양 비용을 근로자 가 부담하는 경우", "사용자가 기존의 정년을 연장하거나 보장하는 조건으로 단체협약 및 취업규칙 등 을 통하여 일정나이, 근속시점 또는 임금액을 기준으로 임금을 줄이는 제도를 시행하는 경우 근로자 퇴직급여보장법 시행령 제3조(퇴직금의 중간정산 사유) 1. 무주택자인 근로자가 본인 명의로 주택을 구입하는 경우 2. 무주택자인 근로자가 주거를 목적으로 보증금을 부담하는 경우 3. 6개월 이상 요양을 필요로 하는 사람의 질병이나 부상에 대한 요양 비용을 근로자가 부담 하는 경우 4. 퇴직금 중간정산을 신청하는 날부터 역산하여 5년 이내에 근로자가 「채무자 회생 및 파산"], "ans": 2}, {"id": "4_36", "s": 4, "q": 36, "text": "우리 병원의 일반직 직원 A는 2014년 1월 1일에 입사하여 2018년 3월 1일자 퇴직 예정이다. A가 병원에서 지급받게 될 퇴직금 산정 시 퇴직금 계산 기간으로 옳은 것은?", "opts": ["2014. 1. 1. ~ 2018. 3. 1.", "2014. 1. 1. ~ 2016. 2. 29.", "2016. 3. 1. ~ 2018. 3. 1.", "2014. 1. 1. ~ 2016. 3. 1."], "ans": 2}, {"id": "4_37", "s": 4, "q": 37, "text": "명예퇴직 관련 내용이 적절하지 않은 것은?", "opts": ["명예퇴직일은 매월 말일로 하되 파트장급 이상 직책수행자의 명예퇴직일은 별도 로 정하지 아니한다.", "명예퇴직을 신청하고자 하는 자는 소속장의 추천을 받아 신청서를 인사주무부서 에 제출하여야 한다.", "명예퇴직신청자가 명예퇴직결정전에 자의로 퇴직하거나 사망한 경우와 임금피크 제에 해당하는 직원은 명예퇴직의 대상자가 될 수 없다.", "명예퇴직자의 정년 잔여기간 계산은 퇴직하는 다음 달부터 계산하며, 퇴직위로금 은 별도로 지급하지 아니한다."], "ans": 3}, {"id": "4_38", "s": 4, "q": 38, "text": "서울대학교병원의 사학연금 가입일은?", "opts": ["2015년 7월 1일", "2016년 1월 1일", "2016년 3월 1일", "2016년 7월 1일"], "ans": 3}, {"id": "4_40", "s": 4, "q": 40, "text": "2025년도 사학연금 개인부담금 부담요율은?", "opts": ["8.00%", "8.25%", "9.00% 2026. UPDATE", "8.75% 사학연금은 매월 기준소득월액의 9.00%를 납부하며 부담률은 2020년 이후 현재까지 9%로 동일하게 유지되고 있음"], "ans": 3}, {"id": "4_41", "s": 4, "q": 41, "text": "사학연금 가입직원의 경우, 육아휴직급여 지급 주체 기관은?", "opts": ["서울대학교병원", "고용센터", "노동청", "보건복지부 보수규정 제9조 ②항"], "ans": 1}, {"id": "4_42", "s": 4, "q": 42, "text": "우리 병원의 일반직 직원 A는 2015년 9월 1일부터 2016년 8월 31일까지 육아휴직 (1년차)에 들어갔다. 병원에서 A에게 고용보험의 육아휴직급여 절차에 따라 육아휴 직 급여를 지급해야 하는 기간으로 옳은 것은?", "opts": ["2015. 9. 1. ~ 2016. 8. 31.", "2015. 9. 1. ~ 2016. 2. 29.", "2016. 3. 1. ~ 2016. 8. 31.", "병원에서 지급해야 할 의무 없음 보수규정 제9조 ②항"], "ans": 3}, {"id": "4_43", "s": 4, "q": 43, "text": "우리 병원은 보수규정에 따라 산전후 휴가급여 보전수당을 지급하고 있다. 고용보 험에서 지급한 산전후 휴가 급여가 100만원, 통상임금이 200만원이라고 가정했을 때, 산전후 휴가급여 보전수당 금액은?", "opts": ["100만원", "150만원", "50만원", "200만원 산전후 휴가급여 보전수당은 통상임금과 산전후 휴가급여의 차액분을 지급한다."], "ans": 1}, {"id": "4_44", "s": 4, "q": 44, "text": "우리 병원은 1주간의 소정 근무시간이 동종업무에 종사하는 통상근로자의 근무시 간보다 짧은 단시간근로자를 고용하고 있다. 단시간근로자의 근무 조건에 대한 설 명으로 다음 중 옳지 않은 것은?", "opts": ["연차휴가를 사용할 수 있다.", "퇴직시 병원에서 퇴직금을 지급받는다.", "계약기간 만료 후 재임용 가능하다.", "연장근무는 어떠한 경우에도 불가하다."], "ans": 4}, {"id": "4_45", "s": 4, "q": 45, "text": "우리 병원 단시간근로자의 급여 공제 대상이 아닌 항목으로 옳은 것은?", "opts": ["건강보험", "사학연금", "고용보험", "국민연금 단시간근로자는 사학연금 미가입 대상자임"], "ans": 2}, {"id": "4_46", "s": 4, "q": 46, "text": "우리 병원은 단시간근로자관리규정에 근거하여 월 근무시간별로 단시간근로자를 고용하고 있다. 다음 중 단시간근로자의 월 근무시간으로 옳지 않은 것은?", "opts": ["170시간", "150시간", "190시간", "100시간 단시간근로자관리규정 제 12조"], "ans": 3}, {"id": "4_47", "s": 4, "q": 47, "text": "우리 병원은 단시간근로자관리규정에 따라 단시간근로자에게 특별휴가 제도를 운 영하고 있다. 다음 중 단시간근로자 특별휴가에 대한 설명으로 옳지 않은 것은?", "opts": ["여성근로자의 생리휴가", "근로계약 후 1개월 내 본인 결혼", "산전후 휴가", "근로계약 후 6개월 후 부모의 사망 단시간근로자관리규정 제27조(특별휴가)"], "ans": 2}, {"id": "4_48", "s": 4, "q": 48, "text": "건강보험료는 전년도 소득을 기준으로 우선 부과한 후, 연말정산 확정소득을 신고 받아 건강보험료를 확정하여 그 차액을 추가 또는 반환하게 된다. 다음 중 병원 일 반직원의 건강보험 정산월은?", "opts": ["2월", "4월", "7월", "12월 직장가입자의 건강보험료는 전년도 보수를 기준으로 납부되며, 당해연도의 보수 변동에 따른 차액은 이듬해 4월에 정산됨"], "ans": 2}, {"id": "4_49", "s": 4, "q": 49, "text": "우리 병원 직원 중에서 사학연금에 가입되어 있지 않은 직원은?", "opts": ["정규직 임금피크대상자", "촉탁간호직", "레지던트", "임상교수요원"], "ans": 2}, {"id": "4_50", "s": 4, "q": 50, "text": "우리 병원은 근로자퇴직급여보장법 상의 퇴직급여제도를 운용하고 있다. 다음중 병 원에서 가입하고 있는 퇴직연금제도는?", "opts": ["확정급여형(DB)", "확정기여형(DC)", "개인형퇴직연금(기업형IRP)", "개인형퇴직연금(개인형IRP)"], "ans": 1}, {"id": "5_1", "s": 5, "q": 1, "text": "직원 및 직원 가족 진료비 감면 적용 관련하여 잘못된 내용은 무엇인가?", "opts": ["직원 본인은 진료 접수비, 보험, 비보험, 비급여 진료비 각 50%를 감면 받을 수 있고, 직원 배우자는 보험, 비보험, 비급여 진료비만 50%를 감면 받는다.", "직원의 형제 자매는 진료비 감면 혜택 대상에서 제외된다.", "분당서울대병원, 치과병원에서도 진료비 감면을 적용받을 수 있다.", "가족의 진료비 감면 적용을 위해 반드시 진료 전에 감면 신청을 완료해야 한다."], "ans": 1}, {"id": "5_2", "s": 5, "q": 2, "text": "다음 직원 가족의 본원 진료비 감면 신청 방법 중 옳지 않은 방법은 무엇인가?", "opts": ["HIS 시스템 내에서 직원 본인이 신청가능하다.", "“진료비 감면 신청서” 및 “증빙자료”(가족관계증명서 또는 등본)를 노사협력과 또 는 각 원무과(외래원무, 암원무, 소아원무)로 제출하여 신청한다.", "“진료비 감면 신청서” 및 “증빙자료”(가족관계증명서 또는 등본)를 팩스 또는 메일 을 통해 제출하여 신청가능하다.", "직원 가족은 먼저 진료 받은 후 감면 신청/등록하면 진료비 감면 소급적용이 가 능하다."], "ans": 4}, {"id": "5_3", "s": 5, "q": 3, "text": "다음 중 맞춤형 복지포인트 배정금액이 잘못 짝지어진 것은 무엇인가?", "opts": ["출산축하포인트(첫째) : 100만원", "근속 포인트 : 근속 1년당 1만원 (근속연수 최대 30년까지 배정)", "가족(배우자) 포인트 : 10만원", "자녀 학자금 포인트 : 대상 자녀(만 16세 ~ 만 22세 자녀) 1인당 100만원 자녀학자금포인트는 2017년 노사 합의를 통해 신설되었으며 2018년부터 지급. (만 16세 ~ 만 22세 자녀 대상으로 1인당 120만원 지급) ※ 맞춤형 복지 포인트 배정"], "ans": 4}, {"id": "5_4", "s": 5, "q": 4, "text": "맞춤형 복지 포인트 사용 범위 중 잘못 짝지어진 것은 무엇인가?", "opts": ["복지 카드 차감 : 신용카드 사용액을 포인트로 차감하여 익월 환급", "온라인 몰 이용 : 복지 포인트 홈페이지에서 판매하는 상품을 포인트로 구매", "자녀 학자금 상환 : 복지 포인트로 사학연금 학자 대여금 상환 신청", "모바일 복지관 이용 : 모바일 복지관 전용 어플리케이션을 통해 포인트 사용"], "ans": 3}, {"id": "5_5", "s": 5, "q": 5, "text": "맞춤형 복지 포인트는 매년 1월 1일 재직자를 대상으로 배정됩니다. 다음 중 포인트 를 지급받을 수 없는 사람은 누구인가?", "opts": ["1월 1일 발령 신규 입사자 및 복직자", "1월 1일 발령 육아 휴직자", "1월 1일 발령 질병 휴직자", "1월 1일 발령 요양 휴직자"], "ans": 4}, {"id": "5_6", "s": 5, "q": 6, "text": "노사협력과에서 복리후생을 위해 지원하는 제도의 내용 중 잘못 기재된 것은 무엇 인가?", "opts": ["직원 제안톡톡 운영 및 관리", "휴양소 및 콘도 운영", "직원 근무복 세탁 (여사무원복, 환자이송원복 등 직원 근무복 세탁 지원)", "주말농장 운영"], "ans": 1}, {"id": "5_7", "s": 5, "q": 7, "text": "직원 경조사 발생 시 병원에서 지원하는 내용 중 병원에서 지원하지 않는 항목은 무엇인가?", "opts": ["본인 결혼 시 경조금 30만원 지급", "배우자 출산 시 10일 휴가 지급", "부모 사망 시 경조화환 및 장례용 물품 지급", "직원 가족 사망 시 장례식장 무료 이용"], "ans": 4}, {"id": "5_8", "s": 5, "q": 8, "text": "병원 직원의 경조사 발생 시 지급되는 경조화환 및 장례용 물품에 관한 설명 중 옳 지 않은 것은 무엇인가?", "opts": ["장례용 물품은 신청자 본인(혹은 대리인)이 본원 장례식장에서 직접 수령해야 한 다.", "정년퇴직자의 경우에도 경조화환을 지급받을 수 있다.", "경조화환 및 장례용 물품은 신청자 1인당 1개씩만 신청 가능하다.", "해당 직원 본인이 직접 신청하지 않더라도 소속 부서에서 경조화환 및 장례용 물 품을 신청할 수 있다."], "ans": 1}, {"id": "5_9", "s": 5, "q": 9, "text": "노사협력과에서는 지급한 근무복에 대해 외부 업체를 통해 정기적으로 근무복 세탁 서비스를 제공하고 있다. 근무복 세탁 관련하여 다음 중 틀린 내용은 무엇인가?", "opts": ["근무복 세탁은 주 1회 주기로 시행된다(병동 간호직 근무복 제외).", "세탁이 필요한 근무복은 부서별로 수합해 두면 업체에서 직접 방문하여 수거한 다.", "세탁이 완료된 근무복은 개별 신청 직원 혹은 부서 대표자 1인이 직접 지정된 장 소로 방문하여 회수한다.", "근무복 단추 떨어짐, 밑단 바느질, 실밥 풀림 등 간단한 수선 서비스도 제공된다."], "ans": 3}, {"id": "5_10", "s": 5, "q": 10, "text": "노동조합 및 노동관계조정법령상 단체협약 내용을 위반한 경우 형사처벌의 대상이 아닌것은?", "opts": ["임금 및 복리후생비에 관한 사항", "근로 및 휴게시간, 휴일, 휴가에 관한 사항", "안전보건에 관한 사항", "교섭창구 단일화에 관한 사항 노조법 제92조(벌칙) 다음 각호의 1에 해당하는 자는 1천만원 이하의 벌금에 처한다."], "ans": 4}, {"id": "5_11", "s": 5, "q": 11, "text": "병원 직원의 육아를 지원하기 위해 운영하는 본원 직장어린이집에 대한 설명 중 틀린 내용은 무엇인가?", "opts": ["서울대병원 직장어린이집은 병원계 최초로 1995년에 개원하였다.", "서울대병원 직장어린이집은 원외(대학로 일석기념관)에 위치하고 있다.", "사단법인 아해누리와 협약을 체결하여 운영하고 있다.", "본원 교직원이 아니면 어린이집 이용을 할 수 없다."], "ans": 2}, {"id": "5_12", "s": 5, "q": 12, "text": "다음 중 병원 직장 어린이집 이용 관련하여 틀린 내용은 무엇인가?", "opts": ["어린이집 이용 직원은 CMI 주차장 우선 배정권을 부여 받을 수 있다.", "원아 등하원 시간대에 셔틀버스를 이용할 수 있다.", "어린이집 이용 원아에게 석식이 제공된다.", "3교대 근무자의 경우 본인 출근 시간에 맞추어 원아 보육을 맡길 수 있다."], "ans": 2}, {"id": "5_13", "s": 5, "q": 13, "text": "노사협력과에서는 본원 근무자들을 대상으로 근무복 및 근무화를 지급하고 있다. 다음 중 노사협력과에서 지급하는 복제가 아닌 것은 무엇인가?", "opts": ["여사무직 근무복", "운동화, 일반화(간호직), 여사무원화(구두) 등 근무화", "의사직, 보건직 가운", "환자이송원복 본원 근무 직원들을 대상으로 지급하는 근무복은 노사협력과, 중앙공급과에서 관장하고 있으"], "ans": 3}, {"id": "5_14", "s": 5, "q": 14, "text": "직원 상호간 친목 도모 및 체력증진을 위하여 결성된 원내동호회를 대상으로 노사 협력과에서는 매년 지원금을 지급하는 등 적극 지원하고 있다. 다음 중 원내 동호 회 운영과 관련하여 틀린 내용은 무엇인가?", "opts": ["원내 동호회는 늘 신규 회원 유치에 힘쓰고 활동 실적에 대해 그룹웨어 게시판을 통해 적극 홍보할 필요가 있다.", "각 동호회는 규모에 따른 인원수 제한이 있다.", "동호회로 지급되는 지원금은 병원 예산으로 지출되는 만큼 각 동호회별로 철저히 관리해야 한다.", "병원 개원 기념 특별 행사를 계획하는 동호회를 위해서는 별도 지원금이 지급된 다."], "ans": 2}, {"id": "5_15", "s": 5, "q": 15, "text": "병원 직원들의 휴양 편의를 위해 노사협력과에서는 콘도 이용을 지원하고 있다. 다 음 중 콘도 신청 및 이용 관련하여 맞는 내용은 무엇인가?", "opts": ["콘도 이용은 별도 신청서 송부 없이 담당직원의 유선통화를 통해 신청가능하다.", "콘도 예약 완료 후 대명, 한화, 리솜 리조트는 이용일자로부터 10일 이전에 예약 을 취소하게 되면 취소할 경우 병원에 벌점이 부여되며, 해당 직원은 2년간 콘도 이용이 제한된다.", "콘도 예약 후 예약한 병원직원이 아닌 직원의 지인(친구 등)만 방문해도 이용에 지장이 없다.", "병원에서 제공하는 콘도는 객실요금(회원가) 전액을 부담하여야 한다."], "ans": 4}, {"id": "5_16", "s": 5, "q": 16, "text": "우리 병원의 단체협약 총칙의 내용 중 옳지 않은 것은?", "opts": ["유니온숍 적용은 조합원수가 근로자의 2분의 1이상이 된 후 10일 이내에 병원과 조합이 협의하여 결정한다.", "단체협약 중 근로기준법에 미달되는 조항은 법정기준에 따른다.", "단체협약을 갱신체결 할 때에는 기존협약의 기준보다 저하시킬 수 없다.", "단체협약의 효력기간이 경과되어도 협약이 갱신 체결될 때 까지 기존협약의 효력 이 지속된다."], "ans": 1}, {"id": "5_17", "s": 5, "q": 17, "text": "다음 중 본원 단체협약 및 노동조합에 대한 내용으로 잘못된 것은?", "opts": ["직원과 병원간 체결한 개별 근로계약은 병원 단체협약에 우선한다.", "단체협약 중 근로기준법에 미달되는 조항은 법정기준을 따른다.", "병원은 관리자를 통하여 조합원에게 조합 탈퇴를 종용할 수 없다.", "본원은 현재 유니온숍 사업장에 해당하지 않는다."], "ans": 1}, {"id": "5_18", "s": 5, "q": 18, "text": "다음 중 옳지 않은 것은?", "opts": ["단체협약은 개별 직원과의 근로계약보다 우선한다.", "단체협약 중 근로기준법에 미달하는 조항은 법정 기준에 따른다.", "병원은 조합활동의 자유를 보장하며 조합활동을 이유로 불이익한 처우를 하지 못 한다.", "근로시간면제해제 및 전임해제 된 경우 병원의 판단 하에 적절한 부서로 복귀시 키는 것을 원칙으로 한다."], "ans": 4}, {"id": "5_19", "s": 5, "q": 19, "text": "다음 중 본원 단체협약(단체협약 이외 합의사항 포함) 내용과 다른 것은?", "opts": ["시설지원직, 응급의학과, 환자이송 등 3교대 근무자에 대하여 누적 30일의 야간 근무마다 리커버리데이 1개를 부여한다.", "공로연수자의 대체인력은 공로연수 1주일 전에 정규직으로 충원한다.", "온콜 대기자의 온콜대기수당은 1만원을 지급한다.", "직원들의 법적 상시 건강검진을 위해 검진당일 유급휴가 1일을 부여한다."], "ans": 1}, {"id": "5_20", "s": 5, "q": 20, "text": "노동조합 활동 관련 내용 중 옳은 것은?", "opts": ["노동조합의 대의원대회는 사전에 병원과 협의하여 정한다.", "대의원대회 참석범위는 대의원과 부·차장 이상 간부 전원으로 한다.", "병원은 조합원에게 근무시간 중 분기에 1일씩 연간 4일 교육할 수 있는 시간을 조합에게 부여한다.", "전국공공운수사회서비스노동조합 대의원대회는 연2회까지 인정함."], "ans": 3}, {"id": "5_21", "s": 5, "q": 21, "text": "다음 빈칸에 들어갈 숫자로 옳은 것은? 서울대학교병원의 근로시간 면제 한도는 ( Ⓐ ) 시간을 보장하며, 풀타임 근로시간면 제자 ( Ⓑ )명을 인정한다. 단, 파트타임으로 사용할 경우 ( Ⓒ )명 이내로 사용할 수 있다.", "opts": ["Ⓐ : 12,000 / Ⓑ : 5 / Ⓒ : 15", "Ⓐ : 10,000 / Ⓑ : 5 / Ⓒ : 10", "Ⓐ : 12,000 / Ⓑ : 6 / Ⓒ : 12", "Ⓐ : 10,000 / Ⓑ : 3 / Ⓒ : 9"], "ans": 3}, {"id": "5_22", "s": 5, "q": 22, "text": "노동조합 활동 관련 내용 중 옳지 않은 것은?", "opts": ["노동조합 간부에 대하여 근무시간 중 1주에 1시간 또는 2개월에 8시간의 조합활 동 시간을 부여한다.", "간부의 범위는 임원, 각부 부장 및 차장, 조직위원, 지도위원으로 하며 40인 이내 로 한다.", "병원에서 노동조합에게 컴퓨터, TV 등 집기시설을 제공하는 것은 부당노동 행위 에 해당한다.", "노동조합은 유인물을 배포할 수 있으며, 일정한 장소에 현수막을 부착할 수 있다."], "ans": 3}, {"id": "5_23", "s": 5, "q": 23, "text": "다음 중 본원 단체협약 상 보장하고 있는 노동조합 활동 내용 관련하여 잘못된 것 은?", "opts": ["노동조합의 대의원은 대의원대회 참석 시 본인의 연차휴가를 사용하여야 한다.", "근로시간면제적용자의 임금기준은 전임 직전의 평균임금으로 지급한다.", "병원은 조합원에게 분기에 1일씩 교육할 수 있는 시간을 조합에게 부여하되, 일 정은 병원과 협의하여 정한다.", "조합은 일정한 장소에 현수막을 부착할 수 있다."], "ans": 1}, {"id": "5_24", "s": 5, "q": 24, "text": "본원 단체협약 상 인사원칙과 맞지 않는 것은?", "opts": ["조합원은 정당한 조합활동을 이유로 인사원칙에서 차별되지 아니한다.", "모든 인사는 객관적이고 공정하게 실시하며 직원의 적성 등을 최대한 고려한다.", "간호본부 간호운영기능직 배치전환 시 야간근무에 15년 이상 배치하지 않는 것을 원칙으로 한다. (단, 희망자는 예외)", "병원은 비정규직 관련 법령에 따라 정규직과의 차별적 처우를 하지 않는다."], "ans": 3}, {"id": "5_25", "s": 5, "q": 25, "text": "단체협약에 의거한 인사운영으로 옳지 않은 것은?", "opts": ["조합원은 정당한 조합활동을 이유로 인사원칙에 차별하지 않는다.", "조합간부 및 대의원에 대한 인사는 노동조합과 합의 한다.", "병원은 신설 병원 개원 시 지원을 강제하지 않는다.", "퇴직에 따른 인력을 바로 충원한다."], "ans": 2}, {"id": "5_26", "s": 5, "q": 26, "text": "단체협약에 의거한 자기계발 휴직에 관하여 옳지 않은 것은?", "opts": ["자기계발휴직은 최대 1회로 분할하여 사용할 수 있다.", "자기계발휴직은 1년 이내로 사용할 수 있다.", "자기계발휴직은 2022년 이후부터는 5년 이상 재직시 사용할 수 있다.", "자기계발휴직은 직무향상을 그 목적으로 한다."], "ans": 1}, {"id": "5_27", "s": 5, "q": 27, "text": "본원 단체협약 상 휴직과 관련된 설명으로 잘못된 것은?", "opts": ["육아휴직 기간은 최대 3년 6개월로 남∙녀 직원에게 공통으로 적용된다.", "직무 향상을 위한 자기계발휴직은 6개월 또는 1년 단위로 사용 가능하다.", "모든 휴직의 휴직기간은 원칙적으로 근속기간에 산입한다.", "부모 또는 배우자 부모의 사고나 질병 등으로 인하여 그 가족을 돌보고자 할 때 병원은 휴직을 명할 수 있다."], "ans": 3}, {"id": "5_28", "s": 5, "q": 28, "text": "단체협약에 의거한 근로시간에 관하여 옳지 않은 것은?", "opts": ["간호부 야간근무(Night근무)는 월7일을 초과하지 아니하며, 월8일 이상일 경우 1 일의 리커버리데이를 부여한다.", "근로시간에는 조회, 교육(의무보수 교육 포함), 각종회의 시간도 포함된다.", "온콜 근무시 출퇴근시간 2시간에 대하여 근무시간으로 인정한다.", "휴게시간은 자유로이 이용할 수 있으며, 휴게시간에 회의, 교육 등 실시하지 못한 다."], "ans": 1}, {"id": "5_29", "s": 5, "q": 29, "text": "임신기 근로시간 단축에 관한 사항으로 잘못된 것은?", "opts": ["임신 후 12주 이내 또는 32주 이후에 있는 여성 직원이 1일 2시간의 근로시간 단축을 신청할 수 있다.", "병원은 임신기 근로시간 단축 대상자에게 주단위로 적치(1일 8시간)하여 사용하 게 할 수 있다.", "일 근로시간이 8시간 미만 근로자의 경우에도 2시간의 근로시간 단축을 신청할 수 있다.", "임신기 근로시간 단축을 이유로 임금을 삭감하지 않는다."], "ans": 3}, {"id": "5_30", "s": 5, "q": 30, "text": "교대근무자에 대한 사항으로 잘못된 것은?", "opts": ["간호본부 교대근무자 근무를 N-OFF-9A로 편성하지 않는 것을 원칙으로 하되, 9A 교육(보수 및 병원 필수교육)은 예외로 한다.", "교대근무자의 근로시간은 1주 40시간으로 하며, 가능한 주 2일 연속 휴일이 되도 록 한다.", "암, 중증, 희귀질환 진단 직원에 대하여는 야간근무에서 제외하는 것을 원칙으로 한다.", "간호본부 교대근무자의 야간근무가 불가피하게 월8일 이상인 경우 1일의 리커버 리데이를 부여한다."], "ans": 4}, {"id": "5_31", "s": 5, "q": 31, "text": "연장·휴일근로 관련하여 다음 <보기> 중 단체협약과 일치하는 것을 모두 고르시 오. ③ ㉠ 연장근로는 근로자와 합의로 1일 2시간, 1주 10시간의 범위 내 실시가 원칙 ㉡ 부득이한 경우 연장근로는 1일 2시간을 초과할 수 있다. 다만, 1주 12시간을 초 과하지 아니한다. ㉢ 시간외근로수당은 10분 단위로 계산하여 지급한다.", "opts": ["㉠", "㉡", "㉠, ㉡", "㉠, ㉡, ㉢ (단체협약 제34조) 연장·휴일근로는 근로자가 거부 가능하며, 단체협약은 1주 10시간까지 연"], "ans": 3}, {"id": "5_32", "s": 5, "q": 32, "text": "본원 단체협약 상 휴게시간 및 연장근로에 대한 내용으로 잘못된 것은?", "opts": ["연장근로는 부득이한 경우에도 1주 12시간을 초과하지 않는다.", "연장근로 수당의 시급 계산 방법은 통상임금 x 1/184로 한다.", "통상 근무시간 중 1시간의 휴게시간을 두되, 휴게시간은 정오로부터 1시간으로 한다.", "휴게시간은 자유로이 이용할 수 있으며, 휴게시간에는 회의, 교육 등을 실시하지 않는 것을 원칙으로 한다."], "ans": 2}, {"id": "5_33", "s": 5, "q": 33, "text": "본원 단체협약 상 근로조건에 대한 내용으로 잘못된 것은?", "opts": ["근로시간에는 조회, 교육 및 회의시간 등도 포함된다.", "40세 이상의 간호부 교대근무자에 대하여 야간근무에 배치하지 않는 것을 원칙으 로 한다.", "온콜 근무시 1회당 3만원의 온콜교통비를 지급한다.", "근무시간의 변경이 있을 경우 소속직원의 의견을 반영한다."], "ans": 3}, {"id": "5_34", "s": 5, "q": 34, "text": "단체협약에 의거한 휴가 운영으로 옳은 것은?", "opts": ["연차휴가 중 사용하지 않은 일수에 대해서는 다음해 1월 급여일에 지급함.", "생리휴가는 필요 시 그 일자를 관리자가 변경 가능함.", "생리휴가 사용 시 서면 또는 구두로 통보하며 당일 또는 사전에 통보하여야함.", "연차휴가 산정 시 산전후 휴가(출산휴가)는 근무하지 않은 것으로 간주함."], "ans": 3}, {"id": "5_35", "s": 5, "q": 35, "text": "다음 중 본원의 연차휴가 및 생리휴가에 대한 설명으로 잘못된 것은?", "opts": ["연차휴가는 본인의 청구에 의하여 필요한 시기에 분할 사용할 수 있다.", "연차휴가를 사용하지 않은 일수에 대해서는 다음해 1월에 평균임금을 지급한다.", "연차유급휴가는 2년마다 1일을 가산하되 한도를 25일로 한다.", "생리휴가 사용 시 기본급의 일액의 8/10을 공제한다."], "ans": 4}, {"id": "5_36", "s": 5, "q": 36, "text": "본원 단체협약 상 특별휴가에 대한 내용으로 잘못된 것은?", "opts": ["병원은 정년퇴직자에게 퇴직 전 업무에 지장이 없는 범위 내에서 사전 승인하에 공로연수를 부여한다.", "공로연수는 최대 6개월 부여할 수 있다.", "공로연수자 대체인력은 공로연수 시점에서 1주일 전에 충원한다.", "폭언, 폭행 등에 의하여 병원이 휴가가 필요하다고 인정한 경우 특별 유급휴가를 부여한다."], "ans": 2}, {"id": "5_37", "s": 5, "q": 37, "text": "다음 중 단협 상 유급휴일에 해당되지 않는 것은?", "opts": ["주휴일", "토요일", "“관공서의 공휴일에 관한 규정”에 정한 공휴일", "근로자의 날"], "ans": 2}, {"id": "5_38", "s": 5, "q": 38, "text": "임산부와 관련하여 단체협약 상 내용과 다른 것은?", "opts": ["임신 중인 직원에게 본인이 청구한 날로부터 산전후 90일(다태아의 경우 120일) 의 유급휴가를 주어야 하며, 산후에 45일(다태아일 경우 60일) 이상이 보장되도록 하여야 한다.", "임신 중인 직원은 정기검진을 위한 휴가를 부서장에게 알린 후 월 1일 사용할 수 있다.", "임신부와 산후 1년 미만인 산부는 야간근무가 금지된다.", "병원은 분만휴가 시 대체인력을 배치한다."], "ans": 2}, {"id": "5_39", "s": 5, "q": 39, "text": "다음 빈칸에 들어갈 숫자로 옳은 것은? 간호본부 배치전환시 아래와 같이 교육을 실시한다. - 간호직은 동일계열 간호단위로 이동인 경우는 ( Ⓐ )일간, 이종계열로 이동인 경 우는 ( Ⓑ )일간 교육을 실시하며, 간호운영기능직은 교대근무일 경우 각 듀티별 ( Ⓒ )일씩, 교대근무가 아닌 경우 ( Ⓓ )일간 교육을 실시한다.", "opts": ["Ⓐ : 2 / Ⓑ : 5 / Ⓒ : 1 / Ⓓ : 2", "Ⓐ : 2 / Ⓑ : 5 / Ⓒ : 2 / Ⓓ : 3", "Ⓐ : 3 / Ⓑ : 6 / Ⓒ : 1 / Ⓓ : 2", "Ⓐ : 3 / Ⓑ : 6 / Ⓒ : 2 / Ⓓ : 3 (단체협약 제18조) <간호본부 배치전환시 교육>"], "ans": 3}, {"id": "5_40", "s": 5, "q": 40, "text": "다음 중 본원의 통상임금 항목에 포함되지 않는 것은?", "opts": ["기준기본급", "능력급", "장기근속수당", "가족수당 (단체협약 제44조)"], "ans": 4}, {"id": "5_41", "s": 5, "q": 41, "text": "본원 연차수당 산정 시, 포함되지 않는 임금 항목은?", "opts": ["근속가산기본급", "능력급", "상여금", "시간외수당 (단체협약 제36조)"], "ans": 4}, {"id": "5_42", "s": 5, "q": 42, "text": "본원 단체협약 상 임금 및 퇴직금에 대한 설명으로 잘못된 것은?", "opts": ["근속가산기본급 및 명절지원비 계산 시, 조정급의 1/2을 가산한다.", "2016.03.01. 이후 사학연금에 가입한 직원의 퇴직금은 사학연금 가입일 전일까지 의 근속연수와 퇴직 직전(만59세 이후 퇴직자는 만59세 직전) 통상임금으로 계산 하여 퇴직 시에 지급한다.", "사학연금에 가입한 직원 중 출산전후휴가자 및 육아휴직자에 대하여는 각각의 급 여를 고용보험에서 정하는 지급기준에 따라 지급한다.", "5년 이상 근속한 직원에게 장기근속수당이 지급된다."], "ans": 2}, {"id": "5_43", "s": 5, "q": 43, "text": "다음 중 노사협의회 협의사항이 아닌 것은?", "opts": ["병원 발전방향 및 조합원의 복지증진에 관한 사항", "조합원의 교육, 훈련에 관한 사항", "노사분쟁 예방에 관한 사항", "장단기 경영계획에 관한 사항"], "ans": 4}, {"id": "5_44", "s": 5, "q": 44, "text": "다음 <보기> 중 노사협의회 보고사항으로 짝지어진 것은? ㉠ 인력계획에 관한 사항 ㉡ 분기별 경영방침 및 실적에 관한 사항 ㉢ 조합원의 인사 등 고충처리에 관한 사항 ㉣ 조합원의교육, 훈련에 관한 사항 ㉤ 장단기 경영계획에 관한 사항 ㉥ 조합원의 복지증진에 관한 사항", "opts": ["㉠, ㉣, ㉤", "㉠, ㉡, ㉤", "㉡, ㉢, ㉥", "㉢, ㉣, ㉥ (단체협약 제83조 및 제84조)"], "ans": 2}, {"id": "5_45", "s": 5, "q": 45, "text": "단체협약에 의거한 노사협의회 운영으로 옳은 것은?", "opts": ["노사협의회 위원은 노사 각 4명으로 한다.", "의장은 노사가 합의하여 정한다.", "노사협의회 위원은 협의 당일 공가처리 한다.", "노사협의회는 매년 2회(6월, 12월) 정기적으로 개최한다."], "ans": 3}, {"id": "5_46", "s": 5, "q": 46, "text": "본원 단체협약 상 유효기간 및 갱신 관련하여 옳지 않은 것은?", "opts": ["단체협약의 유효기간은 체결일로부터 1년으로 한다.", "단체협약의 유효기간이 만료되어도 갱신 체결을 위한 교섭이 진행 중이면 기존 단체협약의 효력이 지속된다.", "노동조합은 단체협약을 갱신하고자 할 때에는 유효기간 만료 30일전에 갱신안을 제출하고 단체교섭을 요구하여야 한다.", "병원은 단체협약 갱신을 요구할 수 없다."], "ans": 4}, {"id": "5_47", "s": 5, "q": 47, "text": "본원 단체협약 상 단체교섭 관련하여 다음 중 옳지 않은 것은?", "opts": ["단체교섭은 병원 또는 노동조합이 장소, 안건 등 문서로 명시하여 요구한다.", "단체교섭의 대상 사항은 조합원의 근로조건, 처우 등에 관한 사항으로 한다.", "단체교섭의 교섭위원은 병원과 조합이 각 8인 이내로 한다.", "노동조합에서 단체교섭을 요구한 경우 병원은 30일 이내에 응하여야 한다."], "ans": 4}, {"id": "5_48", "s": 5, "q": 48, "text": "본원의 단체교섭 및 단체협약에 대한 설명으로 옳은 것은?", "opts": ["병원과 조합 중 어느 일방이 안건, 명단 등을 명시하지 않고 단체교섭을 요구할 수 있다.", "교섭위원은 병원과 조합 각 10인으로 한다.", "노동조합의 교섭위원은 근로시간면제적용자가 우선 참가하여야 한다.", "단체협약의 유효기간은 체결일로부터 2년이다."], "ans": 3}, {"id": "5_49", "s": 5, "q": 49, "text": "노동조합 파업시 필수유지업무 관련 옳지 않은 것은?", "opts": ["필수유지업무 비율은 부서별로 서로 다르다.", "응급의료센터 및 중환자실은 파업시에도 80% 이상 업무를 유지 하여야 한다.", "노동조합에서 필수유지업무 근로자를 통보하지 않은 경우 병원에서 지정할 수 있 다.", "필수유지업무 근로자로 지정된 직원이 파업 참가시 무단결근에 해당한다."], "ans": 2}, {"id": "5_50", "s": 5, "q": 50, "text": "노동조합 파업시 부서의 근태관리 방안으로 옳지 않은 것은?", "opts": ["파업중이라도 출산 후 1년 미만인 근로자의 연장근로는 1일 2시간, 1주 6시간 이 내로 제한된다.", "근무 중 오후에만 파업에 참가한 경우, 오전 근무 시간만큼 임금을 지급하여야 한다.", "파업 중 생리휴가를 신청한 조합원에게 생리휴가를 부여하지 않을 수 있다.", "파업중이라도 임신 중인 근로자에게 연장근로를 시킬 수 없다."], "ans": 3}, {"id": "5_51", "s": 5, "q": 51, "text": "단체협약 이외 합의 사항에 의거 시행되고 있는 내용으로 잘못된 내용은? ④ 2026. UPDATE", "opts": ["장기근속자 포상으로 10년 근속 시 10만원, 20년 근속 시 10만원, 30년 근속 시 10만원을 지급한다.", "배우자 임신기간 임신검진 동행휴가 10일을 부여한다.", "2016.03.01. 이후 사학연금에 가입한 직원의 퇴직금은 사학연금가입일 전일까지의 근속연수와 퇴직 직전 평균임금으로 계산하여 퇴직 시에 지급한다.", "2018년 이후 입사자의 군경력에 대해 직급연차에 산입한다."], "ans": 4}, {"id": "5_52", "s": 5, "q": 52, "text": "2015년 신취업규칙 도입 관련 노사 합의사항으로 잘못된 것은?", "opts": ["2015년 새로운 취업규칙 도입 후, 임금 총액(법정수당 및 자녀학자금 제외)이 기 존 임금체계에 따른 2015년 임금총액에 미달할 경우 그 차액을 지급한다.", "병원은 통상임금 범위에 새로운 보수규정의 상여금을 포함한다.", "무기계약직에 대한 임금체계와 인사제도는 정규직과 동일하게 적용하는 것을 원 칙으로 한다(근무시간에 따른 비례 적용 등).", "운영기능직의 자동 승격 및 승진 연수는 A1등급은 4년, A2등급 및 A3등급은 8년 으로 한다."], "ans": 4}, {"id": "5_53", "s": 5, "q": 53, "text": "다음 중 단체협약에 관한 사항 중 옳지 않은 것은?", "opts": ["단체협약은 취업규칙 및 개별 근로계약서에 우선하여 적용된다.", "서면으로 작성되지 않은 단체협약도 협약으로서의 효력이 인정된다.", "단체협약 체결 이후 노동청에 신고하지 않아도 효력이 발생한다.", "단체협약 이외 합의사항도 단체협약으로 효력을 갖는다."], "ans": 2}, {"id": "5_54", "s": 5, "q": 54, "text": "리프레시 지원비 사용 범위 중 잘못 짝지어진 것은 무엇인가?", "opts": ["체력 단련을 위한 헬스장 이용권 비용", "지식 및 정서함양을 위한 도서 구입 비용", "외국어 학원 수강비용", "국내여행 숙박비용"], "ans": 4}, {"id": "6_1", "s": 6, "q": 1, "text": "다음 중 「남녀고용평등과 일·가정 양립 지원에 관한 법률」(이하 ‘남녀고용평등법’)의 내용으로 틀린 것은?", "opts": ["직장 내 성희롱이란 “사업주(회사)·상급자 또는 근로자가 직장 내의 지위를 이용 하거나 업무와 관련하여 다른 근로자에게 성적 언동 등으로 성적 굴욕감 또는 혐 오감을 느끼게 하거나 성적 언동 또는 그 밖의 요구 등에 따르지 아니하였다는 이유로 근로조건 및 고용에서 불이익을 주는 것”이다.", "남녀고용평등법은 고객에 의한 성희롱 관해서는 규율하고 있지 않다.", "남녀고용평등법은 사업주(회사), 상급자 또는 근로자의 성희롱을 금지하고 있다.", "남녀고용평등법은 출산휴가, 육아휴직 등 모성보호와 일·가정의 양립을 위한 조항 들을 두고 있다."], "ans": 2}, {"id": "6_2", "s": 6, "q": 2, "text": "다음 중 성희롱의 성립 요건에 대한 설명으로 맞는 것은?", "opts": ["성희롱 성립 여부는 당사자의 관계, 행위가 행해진 장소 및 상황, 행위에 대한 상 대방의 명시적 또는 추정적인 반응의 내용, 행위의 내용 및 정도, 행위가 일회적 또는 단기간의 것인지 아니면 계속적인 것인지 여부 등의 구체적 사정을 참작하 여 판단해야 한다.", "성희롱이 성립하려면 행위자의 성적 의도가 있어야 하기 때문에, 성적 의도가 없 는 신체 접촉 행위는 성희롱에 해당되지 않는다.", "성희롱의 전제요건인 ‘성적언동 등’에는 언어적 행위만 포함되며 육체적 행위는 포함되지 않는다.", "‘성적 굴욕감 또는 혐오감’이란 피해자가 느끼는 불쾌한 감정을 뜻하므로 성희롱 성립 여부는 오직 피해자의 주관적인 감정에 달려있다."], "ans": 1}, {"id": "6_3", "s": 6, "q": 3, "text": "남녀고용평등법상 성희롱 발생 시 사업주(회사)가 취해야할 조치에 관한 설명으로 틀린 것은?", "opts": ["사업주(회사)는 성희롱 발생 사실의 신고를 받거나 인지한 경우 사실관계를 조사 하여야 한다.", "성희롱 사실이 완전히 확인되기 전까지는 피해 근로자를 보호하기 위한 적절한 조치(근무장소의 변경, 유급휴가 명령 등)를 취해서는 안 된다.", "사업주(회사)는 성희롱이 확인된 때에는 지체 없이 성희롱 행위를 한 사람에 대하 여 징계 등 필요한 조치를 하여야 한다.", "사업주(회사)는 직장 내 성희롱 신고 근로자 및 피해 근로자 등에게 징계, 부당 인사조치, 성과평가 등 차별, 따돌림 등의 불리한 처우를 하여서는 아니 된다."], "ans": 2}, {"id": "6_4", "s": 6, "q": 4, "text": "성희롱에 관한 국가인권위원회 또는 판례의 태도로 맞는 것은?", "opts": ["성희롱 사건의 양 당사자(행위자, 피해자) 주장이 엇갈리는 경우에는 성희롱 사실 을 절대 인정할 수 없으니 엇갈리는 주장에 대해 더 자세히 조사해야 한다.", "동성(同性)간에는 성희롱이 성립할 수 없다.", "피해자가 없는 자리에서 다른 동료들끼리 피해자를 성적 대상화하여 발언한 경우 에도 경우에 따라 성희롱이 인정될 수 있다.", "가해자로 지목된 자가 술에 취해 기억나지 않는다고 주장하는 경우에는 성희롱 사실이 있었다고 인정하여서는 안 된다."], "ans": 3}, {"id": "6_5", "s": 6, "q": 5, "text": "성희롱이 발생한 경우 사업주(회사)의 손해배상책임에 관한 설명으로 틀린 것은?", "opts": ["회사는 근로자의 근무환경에 대해 배려해야 하고, 성희롱 등 근로자의 인격적 존 엄을 해치고 노무제공에 중대한 지장을 초래하는 사건을 방지해야 할 의무가 있 다.", "직장 내 성희롱 발생 시 경우에 따라서는 회사가 가해자의 사용자로서 피해 근로 자에 대해 손해배상책임을 지게 될 수 있다.", "회사가 피해 근로자에게 ‘불리한 조치’(징계, 부당 인사조치, 성과평가 등 차별, 따 돌림 등)를 한 경우에는 손해배상책임을 지게 될 수 있다.", "회사가 피해 근로자의 성희롱 이의제기 과정을 도와준 동료 근로자에게 불리한 조치를 한 경우에, 동료 근로자는 남녀고용평등법 상 보호 대상이 아니므로 사업 주의 손해배상 책임이 발생할 여지는 없다."], "ans": 4}, {"id": "6_6", "s": 6, "q": 6, "text": "다음 중 성희롱 성립요건으로 틀린 것은?", "opts": ["성희롱이 성립하기 위해서는 행위자 및 피해자에 해당되는지 여부를 파악해야 한 다.", "업무수행과 관련성이 있으나 직장 내 공간이 아니라면 성희롱은 성립되지 않는 다.", "피해자에게 성적 굴욕감을 유발했는지는 반드시 파악해야 한다.", "성적 요구에 대한 불응 이유로 고용상 불이익이 있었는지 파악해야 한다."], "ans": 2}, {"id": "6_7", "s": 6, "q": 7, "text": "다음 내용 중 성희롱의 유형으로 맞는 것을 모두 고르시오. 가. 안마를 해준다며 어깨를 만지는 행위 나. 업무를 보고 있는데 의자를 끌어와 몸을 밀착시키는 행위 다. “여자가 그렇게 뚱뚱해서 어떤 남자가 좋아하겠어?”라는 언급 라. 거래처 접대를 위해 원치 않는 식사, 술자리 참석을 강요하는 행위 마. 야한 사진이나 농담 시리즈를 카톡, 메신저 등을 통해 전송하는 행위", "opts": ["가, 다", "나, 라", "가, 나, 다", "가, 나, 다, 라, 마"], "ans": 4}, {"id": "6_8", "s": 6, "q": 8, "text": "성 평등한 조직 문화를 형성하기 위해 조직 구성원들의 역할로 틀린 것은?", "opts": ["업무 관계에서 외모에 대한 언급은 되도록 하지 않는 것이 좋다.", "여성에게는 부드럽고 애교스런 여성적 태도를 요구하고 남성에게는 씩씩한 남성 적 태도를 요구할 수 있다.", "직권 남용 방지를 위한 성평등에 대한 구체적 가이드라인을 시행한다.", "여성다움, 남성다움을 기대하지 않고 남성이나 여성에게 적합한 성역할을 굳이 찾아 주려고 하지 않는다."], "ans": 2}, {"id": "6_9", "s": 6, "q": 9, "text": "다음 중 성희롱 판단 시 유의사항으로 틀린 것은?", "opts": ["원치 않는 행위는 반드시 반복적, 계속적일 필요는 없다.", "양 당사자의 합의에 의한 것은 성희롱이 아니다.", "성희롱 행위는 피해자가 명시적인 거부 의사 표시를 해야 성립된다.", "원치 않는 행위에 의한 피해는 성희롱 행위자의 의도나 동기가 아니라 피해자의 관점을 기초로 문제된 행위가 원했던 것인지 아닌지의 여부에 대한 판단을 해야 한다."], "ans": 3}, {"id": "6_10", "s": 6, "q": 10, "text": "우리 조직 내에서 성희롱, 성폭력 발생 시 2차 피해 예방을 위한 가이드라인으로 적절하지 않은 것은?", "opts": ["피해자의 신원, 사건 내용에 대한 추측/캐묻기 등은 삼가한다.", "사건이 종결되기 전에 사건에 대해 판단하는 발언은 삼가한다.", "피해자의 대응 태도에 대해 평가하는 것은 개인의 판단이므로 괜찮다.", "가해자에 대한 징계 보다는 인식 개선을 통해 예방하는 것이 중요하다."], "ans": 3}, {"id":
